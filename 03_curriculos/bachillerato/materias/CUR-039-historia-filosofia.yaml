id: CUR-039
titulo: "Historia de la Filosofía — 2.º Bachillerato Canarias"
etapa: "bachillerato"
materia: "Historia de la Filosofía"
norma_base: NOR-005
fuente: FTE-009
competencias_especificas:
  - id: C1
    descripcion: "Buscar, seleccionar y organizar información sobre la historia de la filosofía a partir del uso crítico de fuentes."
  - id: C2
    descripcion: "Aplicar las normas de argumentación y diálogo filosófico para la construcción colectiva del conocimiento."
  - id: C3
    descripcion: "Comprender y explicar las principales tesis de las concepciones filosóficas en su contexto histórico y cultural."
  - id: C4
    descripcion: "Generar una concepción plural y crítica de la historia del pensamiento mediante síntesis comparativas."
  - id: C5
    descripcion: "Identificar la permanencia y evolución de los problemas filosóficos fundamentales a lo largo de la historia."
  - id: C6
    descripcion: "Relacionar el pensamiento filosófico con otros ámbitos de la cultura como la literatura, el arte o la ciencia."
  - id: C7
    descripcion: "Analizar problemas actuales a partir de las posiciones filosóficas relevantes para desarrollar la autonomía de juicio."
bloques_saberes:
  - id: origen-antiguedad
    nombre: "Bloque I. Del origen de la filosofía en Grecia hasta el fin de la Antigüedad"
    descripcion: "Presocráticos, Sócrates, Platón, Aristóteles y filosofía helenística."
  - id: modernidad
    nombre: "Bloque II. Surgimiento de la modernidad europea"
    descripcion: "Pensamiento medieval, Renacimiento, Racionalismo, Empirismo e Ilustración."
  - id: pensamiento-contemporaneo
    nombre: "Bloque III. El pensamiento moderno y contemporáneo"
    descripcion: "Idealismo, Marx, Nietzsche, Freud, fenomenología, existencialismo y filosofía española (Unamuno, Zambrano)."
criterios_evaluacion:
  - id: 1.1
    texto: "Buscar y organizar información sobre autores de la historia de la filosofía mediante el uso crítico de fuentes."
  - id: 3.1
    texto: "Comprender y explicar las principales tesis de las concepciones filosóficas estudiadas."
  - id: 5.1
    texto: "Identificar la permanencia y evolución de los problemas filosóficos fundamentales a lo largo de la historia."
observaciones: "Materia común obligatoria en 2.º de Bachillerato. Extracción literal Decreto 30/2023."

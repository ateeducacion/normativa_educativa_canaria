id: CUR-041
titulo: "Lengua Extranjera I y II — Bachillerato Canarias"
etapa: "bachillerato"
materia: "Lengua Extranjera"
norma_base: NOR-005
fuente: FTE-009
competencias_especificas:
  - id: C1
    descripcion: "Comprensión: Interpretar el sentido global y detalles de textos complejos sobre temas de interés público."
  - id: C2
    descripcion: "Producción: Expresar oralmente y por escrito textos claros, estructurados y adecuados al registro."
  - id: C3
    descripcion: "Interacción: Participar en intercambios comunicativos con fluidez, espontaneidad y cortesía."
  - id: C4
    descripcion: "Mediación: Facilitar la comunicación en situaciones de diversidad, transmitiendo información de forma adaptada."
  - id: C5
    descripcion: "Plurilingüismo: Comparar y contrastar las lenguas del repertorio propio para mejorar el aprendizaje."
  - id: C6
    descripcion: "Interculturalidad: Valorar la diversidad lingüística y cultural rechazando estereotipos y prejuicios."
bloques_saberes:
  - id: comunicacion
    nombre: "Comunicación"
    descripcion: "Géneros discursivos, funciones comunicativas y modelos de lengua (B1+ en I, B2 en II)."
  - id: plurilinguismo
    nombre: "Plurilingüismo"
    descripcion: "Estrategias de aprendizaje y reflexión interlingüística."
  - id: interculturalidad
    nombre: "Interculturalidad"
    descripcion: "Cultura y sociedad, valoración crítica de la diversidad y patrimonio de Canarias."
criterios_evaluacion:
  - id: 1.1
    texto: "Extraer y analizar el sentido global y detalles relevantes de textos multimodales complejos."
  - id: 1.2
    texto: "Interpretar y valorar críticamente el contenido y los rasgos discursivos de los textos."
  - id: 6.1
    texto: "Valorar la diversidad lingüística como fuente de enriquecimiento, mostrando respeto ante prejuicios."
observaciones: "Materia común en 1.º (I) y 2.º (II). Extracción literal Decreto 30/2023."

id: CUR-056
titulo: "Psicología — 2.º Bachillerato Canarias"
etapa: "bachillerato"
materia: "Psicología"
norma_base: NOR-005
fuente: FTE-009
competencias_especificas:
  - id: C1
    descripcion: "Comprender el valor que tiene el conocimiento científico en la mejora de las condiciones de vida de las personas, reconociendo la Psicología como una disciplina científica dentro de las Ciencias de la Salud."
  - id: C2
    descripcion: "Diferenciar entre psicología básica y psicología aplicada; y comprender la utilidad del conocimiento aportado tanto para prevenir y abordar los problemas de las personas, como para lograr un mejor funcionamiento psicológico."
  - id: C3
    descripcion: "Reconocer y comprender los factores que influyen en la conformación de la personalidad según las principales teorías que la explican, así como los fundamentos biológicos que están en la base de los procesos mentales complejos."
  - id: C4
    descripcion: "Conocer y analizar las principales teorías del aprendizaje, los procesos cognitivos que subyacen a este y su relación con la motivación y la emoción, identificando cualidades personales propias."
  - id: C5
    descripcion: "Reconocer y comprender los factores que explican el comportamiento humano en la sociedad, y analizar los procesos sociales y las relaciones interpersonales (incluyendo las relaciones afectivo-sexuales)."
  - id: C6
    descripcion: "Comprender los factores que influyen en la conducta de las personas en el contexto del trabajo y las organizaciones, y analizar su influencia en el rendimiento y la calidad de vida."
bloques_saberes:
  - id: fundamentos
    nombre: "I. Fundamentos de la Psicología"
    descripcion: "La Psicología como ciencia, métodos de investigación y ramas de la psicología."
  - id: bases-biologicas
    nombre: "II. Bases biológicas de la conducta"
    descripcion: "Sistema nervioso, genética y conducta, y plasticidad cerebral."
  - id: procesos-cognitivos
    nombre: "III. Procesos cognitivos, emocionales y de aprendizaje"
    descripcion: "Percepción, memoria, inteligencia, aprendizaje y gestión emocional."
  - id: personalidad
    nombre: "IV. La personalidad y la psicología social"
    descripcion: "Teorías de la personalidad, identidad, psicología de masas y relaciones interpersonales."
criterios_evaluacion:
  - id: 1.1
    texto: "Conocer, valorar y analizar las características propias del conocimiento científico, diferenciando ciencia de pseudociencia y bulos."
  - id: 3.1
    texto: "Comprender y analizar las diferentes teorías existentes sobre la conformación de la personalidad."
  - id: 4.2
    texto: "Explicar la relación entre procesos cognitivos básicos y el aprendizaje, describiendo el papel de la gestión emocional."
  - id: 5.3
    texto: "Analizar los procesos sociales y las relaciones interpersonales (incluyendo las afectivo-sexuales) que influyen en el comportamiento."
observaciones: "Materia optativa de 2.º de Bachillerato en Canarias. Extracción literal Decreto 30/2023."

id: CUR-035
titulo: "Descubrimiento y Exploración del Entorno — Infantil Canarias"
etapa: "infantil"
materia: "Descubrimiento y Exploración del Entorno"
norma_base: NOR-047
fuente: FTE-050
competencias_especificas:
  - id: C1
    descripcion: "Identificar las características de materiales, objetos y colecciones y establecer relaciones entre ellos, mediante la exploración, la manipulación sensorial y el manejo de herramientas, para descubrir y crear una idea cada vez más compleja del mundo."
  - id: C2
    descripcion: "Desarrollar, de manera progresiva, los procedimientos del método científico y las destrezas del pensamiento computacional, a través de procesos de observación y manipulación de objetos, para iniciarse en la interpretación del entorno y responder a las dudas que este genera."
  - id: C3
    descripcion: "Reconocer elementos y fenómenos de la naturaleza, mostrando interés por los hábitos que inciden sobre ella, para apreciar la importancia del uso sostenible, el cuidado y la conservación del entorno en el que se vive."
bloques_saberes:
  - id: dialogo-corporal
    nombre: "Bloque 1: Diálogo corporal con el entorno. Exploración creativa de objetos, materiales y espacios"
    descripcion: "Atención, curiosidad y asombro; exploración sensorial; propiedades de los objetos."
  - id: experimentacion
    nombre: "Bloque 2: Experimentación en el entorno. Curiosidad, pensamiento científico y pensamiento computacional"
    descripcion: "Iniciación al método científico; resolución de problemas; orientación espacial y temporal; razonamiento lógico-matemático."
  - id: indagacion-natural
    nombre: "Bloque 3: Indagación en el medio físico y natural. Cuidado, valoración y respeto"
    descripcion: "Elementos naturales; seres vivos y clima; respeto y cuidado de la naturaleza; patrimonio natural de Canarias."
criterios_evaluacion:
  - ciclo: 0-3
    criterios:
      - id: 1.1
        texto: "Identificar cualidades de los objetos (forma, tamaño, color) mediante la exploración libre."
      - id: 3.1
        texto: "Mostrar curiosidad por los animales y plantas del entorno cercano."
  - ciclo: 3-6
    criterios:
      - id: 1.1
        texto: "Establecer relaciones de orden y clasificación entre colecciones de objetos."
      - id: 2.1
        texto: "Plantear hipótesis sencillas para explicar fenómenos observados en el entorno."
observaciones: "Extracción literal completada el 2026-04-26 tras consulta al BOC (Decreto 196/2022)."

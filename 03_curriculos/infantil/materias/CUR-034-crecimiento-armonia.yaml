id: CUR-034
titulo: "Crecimiento en Armonía — Infantil Canarias"
etapa: "infantil"
materia: "Crecimiento en Armonía"
norma_base: NOR-047
fuente: FTE-050
competencias_especificas:
  - id: C1
    descripcion: "Progresar en el conocimiento y control de su cuerpo y en la adquisición de distintas estrategias, adecuando sus acciones a la realidad del entorno de una manera segura, para construir una autoimagen ajustada y positiva."
  - id: C2
    descripcion: "Reconocer, manifestar y regular progresivamente sus emociones, expresando necesidades y sentimientos para lograr bienestar emocional y seguridad afectiva."
  - id: C3
    descripcion: "Establecer relaciones interpersonales en su entorno próximo, favoreciendo la convivencia pacífica y la resolución de conflictos, para integrarse y participar en la sociedad de forma empática y respetuosa."
  - id: C4
    descripcion: "Establecer y afianzar hábitos de vida saludable relacionados con el autocuidado, la alimentación, la higiene, el descanso y la seguridad, para generar bienestar y autonomía."
bloques_saberes:
  - id: control-cuerpo
    nombre: "Bloque 1: El cuerpo y el control progresivo del mismo"
    descripcion: "Esquema corporal, lateralidad, coordinación, equilibrio y conocimiento de sí mismo."
  - id: equilibrio-afectivo
    nombre: "Bloque 2: Desarrollo y equilibrio afectivo"
    descripcion: "Identificación de emociones, autorregulación y seguridad afectiva."
  - id: habitos-saludables
    nombre: "Bloque 3: Hábitos de vida saludable para el autocuidado y el cuidado del entorno"
    descripcion: "Alimentación, higiene, descanso y prevención de accidentes."
  - id: interaccion-socioemocional
    nombre: "Bloque 4: Interacción socioemocional en el entorno. La vida junto a los demás"
    descripcion: "Relaciones con iguales y adultos, normas de convivencia y respeto."
criterios_evaluacion:
  - ciclo: 0-3
    criterios:
      - id: 1.1
        texto: "Explorar su propio cuerpo y sus posibilidades motrices en situaciones de juego y rutinas."
      - id: 2.1
        texto: "Manifestar sus necesidades y sentimientos a través del lenguaje corporal y gestual."
  - ciclo: 3-6
    criterios:
      - id: 1.1
        texto: "Identificar y describir las características físicas propias y de los demás, aceptando la diversidad."
      - id: 4.1
        texto: "Participar en las rutinas de higiene y alimentación de forma progresivamente autónoma."
observaciones: "Extracción literal completada el 2026-04-26 tras consulta al BOC (Decreto 196/2022)."

resumen_ia: "Currículo de Geografía e Historia en ESO Canarias regulado por el Decreto 30/2023. Materia común en los tres primeros cursos (art. 23.1.e) y obligatoria también en 4.º ESO (art. 24). Extracción inicial: norma base confirmada en BOC; competencias específicas, criterios de evaluación y saberes básicos pendientes de cotejo con el anexo correspondiente del Decreto 30/2023."
observaciones: "Encuadre normativo confirmado el 2026-04-26 mediante consulta del índice del BOC n.º 58/2023: Geografía e Historia figura como materia común en 1.º, 2.º y 3.º de ESO (art. 23.1.e Decreto 30/2023) y como materia obligatoria de 4.º curso (art. 24). Pendiente de cotejo el detalle curricular del anexo correspondiente del propio decreto. Ver TAREA-025."

resumen_ia: "Currículo de Filosofía en 4.º de ESO Canarias, materia optativa regulada por el Decreto 30/2023 (art. 25.5) y vinculada al marco básico estatal del RD 217/2022. Extracción inicial: norma base confirmada en BOC; competencias específicas, criterios de evaluación y saberes básicos pendientes de cotejo con el anexo correspondiente del Decreto 30/2023."
observaciones: "Encuadre normativo confirmado el 2026-04-26 mediante consulta del índice del BOC n.º 58/2023: Filosofía aparece como materia optativa en 4.º ESO según el artículo 25.5 del Decreto 30/2023. Pendiente de cotejo el detalle curricular del anexo de materias optativas del propio decreto. Ver TAREA-025."

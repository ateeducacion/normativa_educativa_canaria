resumen_ia: "Currículo de Biología y Geología en ESO Canarias (1.º, 3.º y 4.º) con seis competencias específicas (C1-C6) y una organización en bloques de saberes que combinan tres bloques comunes a toda la etapa con bloques específicos por curso. Marco autonómico: Decreto 30/2023; marco estatal: RD 217/2022."
observaciones: "Extracción inicial parcial. Las competencias específicas se han resumido a partir del documento publicado en el portal autonómico (`borrador_curriculo_2022/Biologia_geologia_ESO.pdf`); el enunciado oficial literal y los criterios de evaluación deben verificarse contra los anexos del Decreto 30/2023 publicado en BOC (FTE-009). Estado de extracción se mantiene Pendiente conforme a DEC-0004 hasta volcar los cuatro elementos obligatorios."

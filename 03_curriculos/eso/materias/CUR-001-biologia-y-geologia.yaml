elementos:
  competencias_especificas:
    - codigo: "C1"
      enunciado_resumido: "Interpretar y evaluar críticamente información biológica y geológica, comunicar conclusiones y representar fenómenos mediante modelos."
      enunciado_oficial: null
    - codigo: "C2"
      enunciado_resumido: "Desarrollar el sentido crítico para evaluar y clasificar información en contextos personales y profesionales, distinguiendo fuentes veraces de pseudociencias o bulos."
      enunciado_oficial: null
    - codigo: "C3"
      enunciado_resumido: "Aplicar las metodologías científicas en proyectos de investigación, hipótesis, experimentación y análisis de resultados, valorando el trabajo cooperativo."
      enunciado_oficial: null
    - codigo: "C4"
      enunciado_resumido: "Resolver problemas biológicos o geológicos en distintas situaciones analizando soluciones y su impacto en el entorno."
      enunciado_oficial: null
    - codigo: "C5"
      enunciado_resumido: "Relacionar la preservación de la biodiversidad y el medioambiente con el desarrollo sostenible, adoptando hábitos saludables y ecosocialmente responsables."
      enunciado_oficial: null
    - codigo: "C6"
      enunciado_resumido: "Reconocer el valor del patrimonio natural y el riesgo geológico, proponiendo medidas de preservación frente a las acciones humanas."
      enunciado_oficial: null

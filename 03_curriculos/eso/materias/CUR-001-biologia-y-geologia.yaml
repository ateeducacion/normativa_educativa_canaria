resumen_ia: "Currículo de Biología y Geología en ESO Canarias (1.º, 3.º y 4.º) con seis competencias específicas (C1-C6) y una organización en bloques de saberes. Marco autonómico: Decreto 30/2023; marco estatal: RD 217/2022. Incluye vinculación detallada con descriptores operativos del Perfil de salida y criterios de evaluación por curso."
observaciones: "Extracción completada tras cotejo con el BOC (FTE-009). Se han incorporado los enunciados literales y la vinculación oficial con los descriptores del Perfil de salida."

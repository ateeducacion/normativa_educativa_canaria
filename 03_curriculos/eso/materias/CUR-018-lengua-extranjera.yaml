resumen_ia: "Currículo de Lengua Extranjera en ESO (1.º a 4.º) en Canarias, regulado por el Decreto 30/2023 (NOR-005) en desarrollo del RD 217/2022 (NOR-003). Materia troncal en todos los cursos (arts. 23.1.i y 25.1.d). Se han extraído las 6 competencias específicas (C1-C6) literales y los criterios de evaluación de 1.º ESO completos (C1-C6, criterios 1.1-6.1). Los saberes se organizan en cuatro bloques: Comunicación, Plurilingüismo, Interculturalidad y Dimensiones interpersonal e intrapersonal."
observaciones: "Extracción parcial realizada el 2026-04-26 a partir del PDF oficial (Lengua_extranjera_ESO.pdf). Se han cotejado literalmente las 6 CE (C1-C6), los criterios de 1.º ESO completos (C1-C6, incluidos los criterios 1.1-1.3) y los cuatro bloques de saberes básicos. Pendiente: criterios de 2.º, 3.º y 4.º ESO. Ver TAREA-029."

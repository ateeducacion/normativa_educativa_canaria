  saberes_basicos:
    - bloque: "I. Comunicación"
      cursos: ["1.º ESO", "2.º ESO", "3.º ESO", "4.º ESO"]
      detalles: "1. Empleo de estrategias básicas para la planificación, ejecución, control y reparación de la comprensión, la producción y la coproducción de textos orales, escritos y multimodales. 2. Aplicación de conocimientos, destrezas y actitudes que permitan detectar y colaborar en actividades de mediación en situaciones cotidianas sencillas. 3. Uso de funciones comunicativas básicas adecuadas al ámbito y al contexto comunicativo: saludar, despedirse, presentar y presentarse; describir personas, objetos y lugares; situar eventos en el tiempo; situar objetos, personas y lugares en el espacio; pedir e intercambiar información sobre cuestiones cotidianas; dar y pedir instrucciones y órdenes; ofrecer, aceptar y rechazar ayuda, expresar parcialmente el gusto o el interés y emociones básicas; narrar acontecimientos pasados, describir situaciones presentes, expresar la opinión, la capacidad, la obligación y la prohibición. 4. Identificación y uso de modelos contextuales y géneros discursivos básicos en la comprensión, producción y coproducción de textos orales, escritos y multimodales, breves y sencillos, literarios y no literarios: características y reconocimiento del contexto (participantes y situación). 5. Manejo de unidades lingüísticas básicas y significados asociados a dichas unidades, tales como la expresión de la entidad y sus propiedades, la cantidad y la cualidad, el espacio y las relaciones espaciales, el tiempo, la afirmación, la negación, la interrogación y la exclamación, relaciones lógicas básicas. 6. Identificación y empleo de léxico de uso común y de interés para el alumnado relativo a identificación personal, relaciones interpersonales, lugares y entornos cercanos, ocio y tiempo libre, vida cotidiana, actividad física, vivienda y hogar, clima, tecnologías de la información y la comunicación. 7. Reconocimiento y reproducción de patrones sonoros, acentuales, rítmicos y de entonación básicos, y de significados e intenciones comunicativas generales asociadas a dichos patrones. 8. Reconocimiento y uso de convenciones ortográficas básicas y significados e intenciones comunicativas asociados a los formatos, patrones y elementos gráficos. 9. Reconocimiento y uso de convenciones y estrategias conversacionales básicas, en formato síncrono o asíncrono, para iniciar, mantener y terminar la comunicación, tomar y ceder la palabra, pedir y dar aclaraciones y explicaciones, comparar y contrastar, resumir, colaborar, etc. 10. Selección de recursos para el aprendizaje y uso de estrategias básicas de búsqueda de información: diccionarios, libros de consulta, bibliotecas, recursos digitales e informáticos, etc. 11. Identificación y atribución de la propiedad intelectual de las fuentes consultadas y contenidos utilizados. 12. Uso de herramientas analógicas y digitales básicas para la comprensión, producción y coproducción oral, escrita y multimodal; uso de plataformas virtuales de interacción, cooperación y colaboración educativa (aulas virtuales, videoconferencias, herramientas digitales colaborativas, etc.) para el aprendizaje, la comunicación y el desarrollo de proyectos con hablantes o estudiantes de la lengua extranjera."
    - bloque: "II. Plurilingüismo"
      cursos: ["1.º ESO", "2.º ESO", "3.º ESO", "4.º ESO"]
      detalles: "1. Selección y uso de estrategias y técnicas para responder eficazmente a una necesidad comunicativa básica y concreta de forma comprensible, a pesar de las limitaciones derivadas del nivel de competencia en la lengua extranjera y en las demás lenguas del repertorio lingüístico propio. 2. Selección y empleo de estrategias básicas para identificar, organizar, retener y recuperar léxico, morfosintaxis, patrones sonoros, etc., a partir de la comparación de las lenguas y variedades que conforman el repertorio lingüístico personal. 3. Identificación y uso de estrategias y herramientas básicas de autoevaluación y coevaluación, analógicas y digitales, individuales y cooperativas. 4. Reconocimiento del error como instrumento de mejora y propuesta de reparación. 5. Utilización de léxico y expresiones de uso común para comprender enunciados sobre la comunicación, la lengua, el aprendizaje y las herramientas de comunicación y aprendizaje (metalenguaje). 6. Comparación básica entre lenguas a partir de elementos de la lengua extranjera y otras lenguas."
    - bloque: "III. Interculturalidad"
      cursos: ["1.º ESO", "2.º ESO", "3.º ESO", "4.º ESO"]
      detalles: "1. Reconocimiento y aprecio por aspectos socioculturales y sociolingüísticos básicos relativos a la vida cotidiana y las condiciones de vida; convenciones sociales básicas; lenguaje no verbal, cortesía lingüística y etiqueta digital; cultura y costumbres de países donde se habla la lengua extranjera y de Canarias. 2. Identificación y aplicación de estrategias básicas para entender la diversidad lingüística, cultural, natural y artística. 3. Identificación de estrategias básicas de detección de usos discriminatorios del lenguaje verbal y no verbal, con especial atención a la discriminación por razón de género o diversidad funcional."
    - bloque: "IV. Dimensiones interpersonal e intrapersonal"
      cursos: ["1.º ESO", "2.º ESO", "3.º ESO", "4.º ESO"]
      detalles: "1. Aprecio por la lengua extranjera como medio de comunicación interpersonal e internacional y como herramienta para el enriquecimiento personal. 2. Empleo de estrategias colaborativas y de dinámicas de trabajo de grupo relativas a las relaciones interpersonales. 3. Empatía, valoración y respeto por las opiniones de los demás y sus puntos de vista."

elementos:
  competencias_especificas:
    - codigo: "C1"
      enunciado_resumido: "Comprender e interpretar el sentido general y los detalles más relevantes de textos expresados de forma clara y en la lengua estándar, buscando fuentes fiables y haciendo uso de estrategias como la inferencia de significados."
      enunciado_oficial: "Comprender e interpretar el sentido general y los detalles más relevantes de textos expresados de forma clara y en la lengua estándar, buscando fuentes fiables y haciendo uso de estrategias como la inferencia de significados, para responder a necesidades comunicativas concretas."
      descriptores: ["CCL2", "CCL3", "CP1", "CP2", "STEM1", "CD1", "CPSAA4"]
    - codigo: "C2"
      enunciado_resumido: "Producir textos originales, de extensión media, sencillos y con una organización clara, usando estrategias de planificación, compensación o autorreparación."
      enunciado_oficial: "Producir textos originales, de extensión media, sencillos y con una organización clara, usando estrategias tales como la planificación, la compensación o la autorreparación, para expresar de forma creativa, adecuada y coherente, mensajes relevantes y responder a propósitos comunicativos concretos."
      descriptores: ["CCL1", "CP1", "CP2", "STEM1", "CD2", "CPSAA5", "CCEC3"]
    - codigo: "C3"
      enunciado_resumido: "Interactuar con otras personas con creciente autonomía, usando estrategias de cooperación y recursos analógicos y digitales."
      enunciado_oficial: "Interactuar con otras personas con creciente autonomía, usando estrategias de cooperación y empleando recursos analógicos y digitales, para responder a propósitos comunicativos concretos en intercambios respetuosos con las normas de cortesía."
      descriptores: ["CCL1", "CCL5", "CP1", "CP2", "STEM1", "CD3", "CPSAA3", "CC3"]
    - codigo: "C4"
      enunciado_resumido: "Mediar en situaciones cotidianas entre distintas lenguas, usando estrategias y conocimientos sencillos orientados a explicar conceptos o simplificar mensajes."
      enunciado_oficial: "Mediar en situaciones cotidianas entre distintas lenguas, usando estrategias y conocimientos sencillos orientados a explicar conceptos o simplificar mensajes, para transmitir información de manera eficaz, clara y responsable."
      descriptores: ["CCL5", "CP1", "CP2", "CP3", "CD2", "CPSAA1"]
    - codigo: "C5"
      enunciado_resumido: "Ampliar y usar los repertorios lingüísticos personales entre distintas lenguas, reflexionando de forma crítica sobre su funcionamiento."
      enunciado_oficial: "Ampliar y usar los repertorios lingüísticos personales entre distintas lenguas, reflexionando de forma crítica sobre su funcionamiento y tomando conciencia de las estrategias y conocimientos propios, para mejorar la respuesta a necesidades comunicativas concretas."
      descriptores: ["CP2", "STEM1", "CD2", "CPSAA1", "CPSAA4", "CPSAA5", "CE2"]
    - codigo: "C6"
      enunciado_resumido: "Valorar críticamente y adecuarse a la diversidad lingüística, cultural y artística a partir de la lengua extranjera."
      enunciado_oficial: "Valorar críticamente y adecuarse a la diversidad lingüística, cultural y artística a partir de la lengua extranjera, identificando y compartiendo las semejanzas y las diferencias entre lenguas y culturas, para actuar de forma empática y respetuosa en situaciones interculturales."
      descriptores: ["CCL5", "CP3", "CPSAA1", "CC2", "CC3", "CE1", "CCEC1"]
  criterios_evaluacion:
    - curso: "1.º ESO"
      criterios:
        - "1.1. Identificar información pertinente, interpretar el sentido global, las ideas principales y el contenido de textos orales breves y sencillos sobre temas frecuentes y cotidianos, de relevancia personal y próximos a su experiencia, expresados de forma clara y sencilla a través de diversos soportes, utilizando una o más lenguas, además de las familiares, con el fin de construir conocimiento y responder a necesidades comunicativas concretas."
        - "1.2. Identificar información pertinente, interpretar el sentido global, las ideas principales y el contenido de textos escritos, breves y sencillos sobre temas frecuentes y cotidianos, de relevancia personal y próximos a su experiencia, expresados de forma clara a través de diversos soportes, así como de textos literarios adaptados al nivel de madurez del alumnado, aplicando criterios de validez y utilizando una o más lenguas, además de las familiares, con el fin de construir conocimiento y responder a necesidades comunicativas concretas."
        - "1.3. Aplicar de manera guiada los conocimientos y las estrategias elementales más adecuadas en cada situación comunicativa, para comprender el sentido general, la información esencial y los detalles más relevantes de los textos, interpretar elementos no verbales, así como realizar búsquedas para seleccionar información y enriquecer su repertorio lingüístico individual."
        - "2.1. Expresar oralmente y de forma guiada textos breves, sencillos, estructurados, comprensibles y adecuados a la situación comunicativa que versen sobre asuntos cotidianos de relevancia e interés para el alumnado, en diferentes soportes, haciéndolo de forma creativa y mostrando empatía y aprecio por las producciones de los demás, con el fin de describir, narrar e informar sobre temas concretos."
        - "2.2. Organizar y redactar de forma guiada textos propios, sencillos, breves y comprensibles, con claridad, coherencia, cohesión y adecuación a la situación comunicativa propuesta, que versen sobre asuntos cotidianos y frecuentes de relevancia para el alumnado y que sean próximos a su experiencia, siguiendo pautas establecidas, haciéndolo de forma creativa y mostrando empatía y aprecio por las producciones de los demás, a través de herramientas analógicas y digitales, con el fin de responder a propósitos comunicativos concretos."
        - "2.3. Seleccionar y aplicar de forma guiada conocimientos y estrategias elementales en la elaboración de textos comprensibles, coherentes y adecuados a las intenciones comunicativas, a las características contextuales y a la tipología textual, haciendo uso de su repertorio lingüístico individual, con ayuda de los recursos físicos o digitales más adecuados en función de la tarea y las necesidades de cada momento, teniendo en cuenta el contexto y la persona a quien va dirigido el texto, para planificar, producir, revisar y seguir progresando en el proceso de aprendizaje."
        - "3.1. Planificar y participar de manera guiada en situaciones interactivas, orales y escritas, breves y sencillas, que versen sobre temas cotidianos, de relevancia personal y cercanos a su experiencia, haciendo uso de la cortesía lingüística y mostrando iniciativa, empatía y respeto por las diferentes necesidades, ideas, inquietudes y motivaciones de los interlocutores y las interlocutoras, con el fin de responder a propósitos comunicativos concretos y establecer vínculos personales."
        - "3.2. Seleccionar y utilizar, de forma guiada y en entornos próximos, estrategias elementales que le permitan, haciendo uso de su repertorio lingüístico, iniciar, mantener y terminar la comunicación, tomar y ceder la palabra y solicitar y ofrecer aclaraciones y explicaciones, con el fin de desenvolverse de manera simple pero efectiva en situaciones interactivas sencillas en la lengua extranjera a través de diferentes soportes."
        - "4.1. Comprender y explicar textos, conceptos y comunicaciones muy breves y sencillas, de manera guiada, de forma oral o escrita, en situaciones cotidianas del ámbito personal, social y educativo, mostrando empatía por los interlocutores y las interlocutoras y respeto por las lenguas empleadas, apoyándose en diversos recursos y soportes, para así construir conocimiento y transmitir información de manera clara."
        - "4.2. Aplicar, de forma guiada y con una aceptable gestión emocional, estrategias elementales que ayuden a crear puentes y faciliten la comprensión y producción de información y la comunicación, adecuadas a las intenciones comunicativas, haciendo uso de su repertorio lingüístico y usando recursos y apoyos físicos o digitales en función de las necesidades de cada momento, con la finalidad de explicar y simplificar textos, conceptos y mensajes."
        - "5.1. Identificar y registrar, siguiendo modelos, los progresos y dificultades de aprendizaje más destacados de la lengua extranjera con apoyo de otros participantes y de soportes analógicos y digitales, seleccionando de forma guiada las estrategias más eficaces en las actividades de autoevaluación y coevaluación, como las que se proponen en el Portfolio Europeo de las Lenguas (PEL) o en diarios de aprendizaje, así como comparar y contrastar siguiendo pautas las semejanzas y diferencias entre distintas lenguas, reflexionando de manera progresivamente autónoma sobre aspectos relevantes de su funcionamiento, de modo que se produzca una transferencia de conocimientos y estrategias a diferentes contextos sociales cotidianos y próximos que le permita ampliar su repertorio lingüístico individual, superar las adversidades y progresar en su aprendizaje en la lengua extranjera."
        - "6.1. Valorar de forma empática y respetuosa la diversidad lingüística, cultural y artística propia de Canarias y de países donde se habla la lengua extranjera, aplicando estrategias básicas de manera guiada en situaciones comunicativas, interculturales, sencillas, cotidianas, con resiliencia, construyendo vínculos entre el patrimonio canario y el de otras culturas y favoreciendo el desarrollo de una cultura compartida y una ciudadanía comprometida con la sostenibilidad, para afrontar las diferencias morales o culturales con actitud dialogante, argumentativa, respetuosa y opuesta a cualquier tipo de discriminación o violencia."

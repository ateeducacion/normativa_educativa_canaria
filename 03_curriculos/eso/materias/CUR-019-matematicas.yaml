  saberes_basicos:
    - bloque: "I. Sentido numérico"
      cursos: ["1.º ESO", "2.º ESO", "3.º ESO", "4.º ESO"]
      detalles: "Conteo, cantidad, sentido de las operaciones, relaciones, razonamiento proporcional, educación financiera. En 1.º ESO se incluyen estrategias variadas de conteo, números enteros, fracciones, decimales y raíces, porcentajes, factorización en primos, comparación y ordenación, cálculo mental, propiedades de las operaciones, razones y proporciones, proporcionalidad directa e inversa, porcentajes y consumo responsable. En 2.º ESO se añaden notación exponencial y científica."
    - bloque: "II. Sentido de la medida"
      cursos: ["1.º ESO", "2.º ESO", "3.º ESO", "4.º ESO"]
      detalles: "Magnitud, estimación y relaciones, medición. Atributos mensurables, elección de unidades, conjeturas sobre medidas, longitudes y áreas en figuras planas, representaciones geométricas, probabilidad como medida de incertidumbre. En 2.º ESO se incluyen 'Medidas canarias', error absoluto y relativo, longitudes, áreas y volúmenes en figuras tridimensionales (prisma, pirámide, cilindro)."
    - bloque: "III. Sentido espacial"
      cursos: ["1.º ESO", "2.º ESO", "3.º ESO", "4.º ESO"]
      detalles: "Formas geométricas de dos y tres dimensiones, localización y sistemas de representación, visualización, razonamiento y modelización geométrica. Construcciones con herramientas manipulativas y digitales (geometría dinámica, realidad aumentada). Aplicaciones al contexto propio de la Comunidad Autónoma de Canarias. En 2.º ESO se introduce la relación pitagórica y los sistemas de coordenadas cartesianas."
    - bloque: "IV. Sentido algebraico"
      cursos: ["1.º ESO", "2.º ESO", "3.º ESO", "4.º ESO"]
      detalles: "Patrones, modelo matemático, variable, igualdad y desigualdad, relaciones y funciones (a partir de 2.º), pensamiento computacional. Modelización de situaciones de la vida cotidiana, relaciones lineales, ecuaciones y sistemas, gráficas de funciones contextualizadas (crecimiento, máximos y mínimos relativos), generalización y transferencia de procesos de resolución."
    - bloque: "V. Sentido estocástico"
      cursos: ["1.º ESO", "2.º ESO", "3.º ESO", "4.º ESO"]
      detalles: "Organización y análisis de datos (gráficos estadísticos con apoyo tecnológico, medidas de centralización y dispersión), incertidumbre (espacio muestral, sucesos, regla de Laplace, frecuencia relativa), inferencia (formulación de preguntas, datos relevantes en investigaciones estadísticas)."
    - bloque: "VI. Sentido socioafectivo"
      cursos: ["1.º ESO", "2.º ESO", "3.º ESO", "4.º ESO"]
      detalles: "Creencias, actitudes y emociones (autoconciencia y autorregulación, curiosidad, resiliencia, flexibilidad cognitiva, gestión del error), trabajo en equipo y toma de decisiones (técnicas cooperativas, conductas empáticas, gestión de conflictos), inclusión, respeto y diversidad (perspectiva de género en el conocimiento humano)."

resumen_ia: "Currículo de Matemáticas en ESO Canarias regulado por el Decreto 30/2023 (NOR-005). Materia obligatoria en 1.º-3.º ESO y, en 4.º ESO, con desdoblamiento en Matemáticas A o B. Diez competencias específicas (C1-C10) y dieciocho criterios de evaluación por curso, con seis bloques de saberes básicos articulados en torno a los sentidos matemáticos: numérico, medida, espacial, algebraico, estocástico y socioafectivo. Marco estatal: RD 217/2022 (NOR-003)."
observaciones: "Extracción cotejada el 2026-04-26 contra el PDF oficial publicado por la Consejería de Educación de Canarias (Anexo II del Decreto 30/2023). Se han incorporado los enunciados literales de las diez competencias específicas con sus descriptores del Perfil de salida y los dieciocho criterios de evaluación de 1.º y 2.º ESO. Los criterios de 3.º ESO y de 4.º ESO (Matemáticas A y Matemáticas B) quedan marcados como [PENDIENTE] al no haberse podido cotejar literalmente en esta segunda pasada (TAREA-030); se recomienda completar en futura tarea de extracción específica. Saberes básicos resumidos por bloque combinando el contenido de 1.º y 2.º ESO."

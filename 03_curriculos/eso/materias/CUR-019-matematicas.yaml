id: CUR-019
titulo: "Matemáticas — ESO Canarias"
etapa: "eso"
materia: "Matemáticas"
norma_base: NOR-005
fuente: FTE-009
competencias_especificas:
  - id: C1
    descripcion: "Interpretar, modelizar y resolver problemas de la vida cotidiana y propios de las matemáticas, aplicando diferentes estrategias y formas de razonamiento."
  - id: C2
    descripcion: "Analizar las soluciones de un problema usando diferentes técnicas y herramientas para verificar su validez e idoneidad."
  - id: C3
    descripcion: "Formular y comprobar conjeturas sencillas o plantear problemas de forma autónoma, reconociendo el valor del razonamiento."
  - id: C4
    descripcion: "Utilizar los principios del pensamiento computacional organizando datos, reconociendo patrones e interpretando, modificando y creando algoritmos."
  - id: C5
    descripcion: "Reconocer y utilizar conexiones entre los diferentes elementos matemáticos."
  - id: C6
    descripcion: "Identificar las matemáticas implicadas en otras materias y en situaciones reales."
  - id: C7
    descripcion: "Representar conceptos, procedimientos e información matemáticos usando diferentes tecnologías."
  - id: C8
    descripcion: "Comunicar conceptos, procedimientos y argumentos matemáticos en lenguaje oral, escrito o gráfico."
  - id: C9
    descripcion: "Desarrollar destrezas personales, identificando y gestionando emociones y aceptando el error como parte del proceso."
  - id: C10
    descripcion: "Desarrollar destrezas sociales en proyectos cooperativos en equipos heterogéneos."
bloques_saberes:
  - id: sentido-numerico
    nombre: "I. Sentido numérico"
    descripcion: "Conteo, cantidad, operaciones, relaciones y razonamiento proporcional."
  - id: sentido-medida
    nombre: "II. Sentido de la medida"
    descripcion: "Magnitud, estimación, medición y probabilidad como medida de incertidumbre."
  - id: sentido-espacial
    nombre: "III. Sentido espacial"
    descripcion: "Figuras geométricas, localización y sistemas de representación."
  - id: sentido-algebraico
    nombre: "IV. Sentido algebraico"
    descripcion: "Patrones, modelo matemático, variable y pensamiento computacional."
  - id: sentido-estocastico
    nombre: "V. Sentido estocástico"
    descripcion: "Organización y análisis de datos, incertidumbre y probabilidad."
  - id: sentido-socioafectivo
    nombre: "VI. Sentido socioafectivo"
    descripcion: "Creencias, actitudes, emociones y trabajo en equipo."
criterios_evaluacion:
  - curso: "1º-3º ESO"
    criterios:
      - id: 1.1
        texto: "Interpretar problemas matemáticos identificando datos y objetivos con herramientas manuales o digitales."
      - id: 4.1
        texto: "Descomponer problemas en partes más sencillas para facilitar su interpretación computacional."
  - curso: "4º ESO A"
    criterios:
      - id: 1.1
        texto: "Analizar problemas cotidianos identificando datos y compartiendo soluciones prácticas."
      - id: 6.1
        texto: "Identificar las matemáticas en situaciones reales de consumo o finanzas personales."
  - curso: "4º ESO B"
    criterios:
      - id: 1.2
        texto: "Seleccionar y aplicar estrategias de resolución analizando su eficiencia y rigor."
      - id: 3.1
        texto: "Formular conjeturas de forma autónoma reconociendo el valor de la argumentación."
observaciones: "Extracción literal completada el 2026-04-26. Limpieza final de marcadores completada."

elementos:
  competencias_especificas:
    - codigo: "C1"
      enunciado_resumido: "Interpretar, modelizar y resolver problemas."
      enunciado_oficial: "Interpretar, modelizar y resolver problemas de la vida cotidiana y propios de las matemáticas, aplicando diferentes estrategias y formas de razonamiento, para explorar distintas maneras de proceder y obtener posibles soluciones."
      descriptores: ["CCL1", "CCL2", "STEM1", "STEM2", "STEM3", "STEM4", "CD2", "CPSAA4", "CPSAA5", "CC2", "CC3", "CE3"]
    - codigo: "C2"
      enunciado_resumido: "Analizar las soluciones de un problema."
      enunciado_oficial: "Analizar las soluciones de un problema usando diferentes técnicas y herramientas, evaluando las respuestas obtenidas, para verificar su validez e idoneidad desde un punto de vista matemático y su repercusión global."
      descriptores: ["CCL1", "CCL2", "STEM1", "STEM2", "STEM3", "STEM4", "CD2", "CPSAA4", "CPSAA5", "CC2", "CC3", "CE3"]
    - codigo: "C3"
      enunciado_resumido: "Formular y comprobar conjeturas o plantear problemas."
      enunciado_oficial: "Formular y comprobar conjeturas sencillas o plantear problemas de forma autónoma, reconociendo el valor del razonamiento y la argumentación, para generar nuevo conocimiento."
      descriptores: ["CCL1", "STEM1", "STEM2", "STEM3", "STEM4", "CD1", "CD2", "CD3", "CD5", "CPSAA4", "CE3"]
    - codigo: "C4"
      enunciado_resumido: "Utilizar los principios del pensamiento computacional."
      enunciado_oficial: "Utilizar los principios del pensamiento computacional organizando datos, descomponiendo en partes, reconociendo patrones, interpretando, modificando y creando algoritmos para modelizar situaciones y resolver problemas de forma eficaz."
      descriptores: ["CCL1", "STEM1", "STEM2", "STEM3", "STEM4", "CD1", "CD2", "CD3", "CD5", "CPSAA4", "CE3"]
    - codigo: "C5"
      enunciado_resumido: "Reconocer y utilizar conexiones entre los diferentes elementos matemáticos."
      enunciado_oficial: "Reconocer y utilizar conexiones entre los diferentes elementos matemáticos, interconectando conceptos y procedimientos, para desarrollar una visión de las matemáticas como un todo integrado."
      descriptores: ["CCL3", "STEM1", "STEM2", "STEM3", "STEM5", "CD2", "CD3", "CC4", "CE3", "CCEC1"]
    - codigo: "C6"
      enunciado_resumido: "Identificar las matemáticas implicadas en otras materias y situaciones reales."
      enunciado_oficial: "Identificar las matemáticas implicadas en otras materias y en situaciones reales susceptibles de ser abordadas en términos matemáticos, interrelacionando conceptos y procedimientos, para aplicarlos en situaciones diversas."
      descriptores: ["CCL3", "STEM1", "STEM2", "STEM3", "STEM5", "CD2", "CD3", "CC4", "CE3", "CCEC1"]
    - codigo: "C7"
      enunciado_resumido: "Representar conceptos, procedimientos, información y resultados matemáticos."
      enunciado_oficial: "Representar, de forma individual y colectiva, conceptos, procedimientos, información y resultados matemáticos, usando diferentes tecnologías, para visualizar ideas y estructurar procesos matemáticos."
      descriptores: ["CCL1", "CCL2", "CCL3", "STEM2", "STEM3", "STEM4", "CD1", "CD2", "CD3", "CD5", "CE3", "CCEC3", "CCEC4"]
    - codigo: "C8"
      enunciado_resumido: "Comunicar conceptos, procedimientos y argumentos matemáticos."
      enunciado_oficial: "Comunicar de forma individual y colectiva conceptos, procedimientos y argumentos matemáticos, usando lenguaje oral, escrito o gráfico, utilizando la terminología matemática apropiada, para dar significado y coherencia a las ideas matemáticas."
      descriptores: ["CCL1", "CCL2", "CCL3", "STEM2", "STEM3", "STEM4", "CD1", "CD2", "CD3", "CD5", "CE3", "CCEC3", "CCEC4"]
    - codigo: "C9"
      enunciado_resumido: "Desarrollar destrezas personales identificando y gestionando emociones."
      enunciado_oficial: "Desarrollar destrezas personales, identificando y gestionando emociones, poniendo en práctica estrategias de aceptación del error como parte del proceso de aprendizaje y adaptándose ante situaciones de incertidumbre, para mejorar la perseverancia en la consecución de objetivos y el disfrute en el aprendizaje de las matemáticas."
      descriptores: ["CCL1", "CCL5", "STEM3", "STEM5", "CPSAA1", "CPSAA3", "CPSAA4", "CPSAA5", "CC1", "CC2", "CC3", "CE2", "CE3"]
    - codigo: "C10"
      enunciado_resumido: "Desarrollar destrezas sociales en proyectos cooperativos."
      enunciado_oficial: "Desarrollar destrezas sociales reconociendo y respetando las emociones y experiencias de los demás, participando activa y reflexivamente en proyectos en equipos heterogéneos con roles asignados, para construir una identidad positiva como estudiante de matemáticas, fomentar el bienestar personal y grupal y crear relaciones saludables."
      descriptores: ["CCL1", "CCL5", "STEM3", "CPSAA1", "CPSAA3", "CC1", "CC2", "CC3"]
  criterios_evaluacion:
    - curso: "1.º ESO"
      criterios:
        - "1.1. Interpretar problemas matemáticos, identificando los datos y el objetivo, definiendo la relación que existe entre ellos y representando la información mediante herramientas manuales o digitales, compartiendo ideas y escuchando las de las demás personas y los diferentes enfoques del mismo problema con el fin de comprender el enunciado y explorar distintas maneras de proceder."
        - "1.2. Aplicar estrategias y herramientas apropiadas superando bloqueos e inseguridades, reflexionando sobre el proceso realizado, buscando un cambio de estrategia cuando sea necesario y transformando el error en oportunidad de aprendizaje para desarrollar ideas y soluciones valiosas."
        - "1.3. Obtener soluciones matemáticas de un problema, mostrando perseverancia en su búsqueda, autoconfianza y usando los conocimientos necesarios para resolver problemas de la vida cotidiana y propios de las matemáticas."
        - "2.1. Seleccionar las soluciones óptimas de un problema comprobando, interpretando y reflexionando sobre su validez para obtener conclusiones y elaborar respuestas a las preguntas planteadas."
        - "3.1. Formular y comprobar conjeturas sencillas de forma guiada buscando en varias fuentes de información, reconociendo y comprendiendo patrones, propiedades y relaciones en situaciones conocidas, planteándose preguntas y comprobando hipótesis mediante la experimentación y la indagación, confirmando su validez utilizando distintos recursos materiales y digitales, con el fin de obtener e intercambiar conclusiones relevantes y generar nuevo conocimiento."
        - "3.2. Plantear variantes de un problema dado modificando alguno de sus datos o alguna condición del problema, seleccionando diferentes estrategias para su resolución, usando, si fuera necesario, recursos digitales o manuales, estudiando casos particulares cuando la situación lo requiera y reflexionando sobre los distintos resultados obtenidos, con el objetivo de encontrar ideas y soluciones, a fin de potenciar la adquisición de conocimientos, estrategias y métodos propios del razonamiento matemático."
        - "4.1. Identificar las partes simples en las que se puede dividir un problema, organizando los datos y reconociendo patrones para facilitar su interpretación y su tratamiento computacional."
        - "4.2. Modelizar situaciones y fenómenos que ocurren a nuestro alrededor interpretando distintos algoritmos y aplicaciones informáticas sencillas para desarrollar soluciones tecnológicas y resolver problemas de forma eficaz, mostrando interés y curiosidad por las tecnologías digitales y gestionando de manera responsable su uso."
        - "5.1. Reconocer conexiones entre diferentes procesos matemáticos a partir de conocimientos y experiencias previas, mediante métodos propios del razonamiento matemático, reflexionando sobre el proceso realizado y las soluciones obtenidas, con sentido crítico, para conectar los aprendizajes matemáticos adquiridos y desarrollar una visión coherente e integrada de las matemáticas en su totalidad."
        - "6.1. Identificar conexiones coherentes entre el mundo real, las matemáticas y otras materias, reconociendo situaciones susceptibles de ser formuladas y resueltas mediante herramientas y estrategias, usando los procesos inherentes a la investigación científica y matemática: inferir, medir, comunicar y clasificar, y las herramientas digitales necesarias, para afrontar y resolver situaciones problemáticas diversas."
        - "6.2. Reconocer la aportación de las matemáticas al progreso de la humanidad y su contribución a la superación de los retos que demanda la sociedad actual, para apreciar y respetar aspectos esenciales del patrimonio cultural y artístico."
        - "7.1. Representar, utilizando un lenguaje matemático apropiado, individual o colectivamente, ideas, conceptos, procedimientos, información y resultados matemáticos de modos distintos, empleando diferentes medios y soportes en su presentación para visualizar ideas y estructurar procesos matemáticos."
        - "8.1. Comunicar, utilizando la terminología apropiada, ideas, conclusiones, conjeturas y razonamientos matemáticos de manera oral, escrita o gráfica, mediante diferentes herramientas, incluidas las digitales, para dar significado y coherencia a las representaciones matemáticas."
        - "8.2. Reconocer y emplear el lenguaje matemático presente en la vida cotidiana comunicando mensajes con contenido matemático, oralmente y por escrito, utilizando medios digitales cuando la situación lo requiera, para compartir y construir nuevos conocimientos."
        - "9.1. Identificar las emociones, las fortalezas y debilidades propias, y desarrollar el autoconcepto matemático con estrategias de autoconocimiento y autoeficacia para fortalecer la resiliencia, proteger la salud mental y mantener una actitud proactiva ante nuevos retos matemáticos."
        - "9.2. Mostrar una actitud positiva y perseverante, reflexionando sobre el proceso realizado, escuchando la crítica razonada y entendiendo los errores al hacer frente a las diferentes situaciones problemáticas, para mejorar el disfrute en el aprendizaje de las matemáticas."
        - "10.1. Colaborar y construir relaciones en equipos heterogéneos con empatía, comunicándose de manera adecuada, con actitud cooperativa y respetuosa, pensando de forma crítica, tomando decisiones argumentadas y evitando los conflictos, para construir una identidad positiva como estudiante de matemáticas y fomentar el bienestar personal y social."
        - "10.2. Ayudar en el reparto de tareas del equipo, empleando estrategias cooperativas, aportando valor al grupo, favoreciendo la inclusión, la igualdad de género y la escucha activa, asumiendo el rol asignado y su contribución dentro del equipo, reconociendo proactivamente las perspectivas y las experiencias de los demás e incorporándolas a su aprendizaje, para crear relaciones y entornos de trabajo saludables."
    - curso: "2.º ESO"

elementos:
  competencias_especificas:
    - codigo: "C1"
      enunciado_resumido: "Apreciar y usar la pervivencia del mundo grecorromano (artística, literaria, arquitectónica, cultural) como base de comparación con la actualidad, identificando referentes en Canarias."
      enunciado_oficial: null
    - codigo: "C2"
      enunciado_resumido: "Distinguir y reconocer los sistemas de escritura y la evolución del castellano desde el latín, manejando étimos y formantes grecolatinos para mejorar la competencia lingüística."
      enunciado_oficial: null
    - codigo: "C3"
      enunciado_resumido: "Situar geográfica e históricamente las civilizaciones griega y romana, ordenando cronológicamente etapas y acontecimientos del mundo clásico."
      enunciado_oficial: null
    - codigo: "C4"
      enunciado_resumido: "Conocer la organización política y social de Grecia y Roma, comparándola con instituciones actuales y con los roles familiares y laborales contemporáneos."
      enunciado_oficial: null
    - codigo: "C5"
      enunciado_resumido: null
      enunciado_oficial: null

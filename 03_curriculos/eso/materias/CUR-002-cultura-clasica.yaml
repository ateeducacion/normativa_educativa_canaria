resumen_ia: "Currículo de Cultura Clásica en ESO Canarias con cinco competencias específicas (C1-C5) que engloban doce criterios de evaluación. Marco autonómico: Decreto 30/2023; marco estatal: RD 217/2022."
observaciones: "Extracción inicial parcial. C1-C4 se han resumido a partir del documento `borrador_curriculo_2022/Cultura_clasica_ESO.pdf` enlazado desde el portal autonómico; la C5 y los saberes/criterios literales quedan [PENDIENTE] de cotejo contra el anexo del Decreto 30/2023 publicado en BOC (FTE-009). estado_extraccion se mantiene Pendiente conforme a DEC-0004."

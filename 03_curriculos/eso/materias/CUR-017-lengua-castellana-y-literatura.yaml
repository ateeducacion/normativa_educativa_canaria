resumen_ia: "Currículo de Lengua Castellana y Literatura en ESO (1.º a 4.º) en Canarias, regulado por el Decreto 30/2023 (NOR-005) en desarrollo del RD 217/2022 (NOR-003). Materia troncal en todos los cursos (arts. 23.1.f y 25.1.c). Se han extraído las 10 competencias específicas (C1-C10) literales y los criterios de evaluación de 1.º ESO completos (criterios 1.1-10.2, 21 criterios). Pendiente: saberes básicos literales (bloques I. La lengua y sus hablantes, II. Comunicación, III. Educación literaria, IV. Reflexión sobre la lengua), y criterios de 2.º, 3.º y 4.º ESO."
observaciones: "Extracción parcial realizada el 2026-04-26 a partir del PDF oficial (Lengua_castellana_y_Literatura_ESO.pdf). Se han cotejado literalmente las 10 competencias específicas (C1-C10) y todos los criterios de evaluación de 1.º ESO (criterios 1.1-10.2). Pendiente: texto literal de los saberes básicos (bloques I-IV) y criterios de 2.º, 3.º y 4.º ESO. Ver TAREA-029."

resumen_ia: "Currículo de Lengua Castellana y Literatura en ESO (1.º a 4.º) en Canarias, regulado por el Decreto 30/2023 (NOR-005) en desarrollo del RD 217/2022 (NOR-003). Materia troncal en todos los cursos (arts. 23.1.f y 25.1.c). Se han extraído las 7 primeras competencias específicas (C1-C7) y los criterios de evaluación para 1.º ESO (C1-C7). Pendiente: C8-C10 y criterios de 2.º a 4.º ESO."
observaciones: "Extracción parcial realizada el 2026-04-26 a partir del PDF oficial (Lengua_castellana_y_Literatura_ESO.pdf). Se han cotejado literalmente las competencias C1-C7 y los criterios de 1.º ESO para C1-C7. Pendiente completar C8-C10, criterios de 2.º, 3.º y 4.º ESO, y saberes básicos (bloques I-IV). Ver TAREA-029."

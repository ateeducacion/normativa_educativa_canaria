resumen_ia: "Currículo de Lengua Castellana y Literatura en ESO (1.º a 4.º) en Canarias, regulado por el Decreto 30/2023 (NOR-005) en desarrollo del RD 217/2022 (NOR-003). El artículo 23.1.f y el artículo 25.1.c del decreto incluyen la materia como troncal en todos los cursos de la ESO. La extracción literal del anexo (competencias específicas, criterios de evaluación y saberes básicos) está pendiente."
observaciones: "Materia troncal de la ESO en todos los cursos según los artículos 23.1.f (1.º a 3.º) y 25.1.c (4.º) del Decreto 30/2023, confirmado en el articulado del BOC n.º 58 de 23-3-2023 (FTE-009). El contenido íntegro del anexo no se ha podido cotejar en esta extracción inicial; competencias específicas, criterios de evaluación, saberes básicos y descriptores operativos quedan marcados como [PENDIENTE] hasta una revisión sobre el PDF oficial del BOC. Ver TAREA-026 y PREG-001."

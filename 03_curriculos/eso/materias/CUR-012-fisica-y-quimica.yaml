resumen_ia: "Currículo de Física y Química en ESO Canarias regulado por el Decreto 30/2023. Materia incluida en 2.º y 3.º ESO conforme al artículo 23.1.d, y disponible en 4.º ESO como opción dentro del bloque del artículo 24. Extracción inicial: norma base confirmada en BOC; competencias específicas, criterios de evaluación y saberes básicos pendientes de cotejo con el anexo correspondiente del Decreto 30/2023."
observaciones: "Encuadre normativo confirmado el 2026-04-26 mediante consulta del índice del BOC n.º 58/2023: Física y Química figura en 2.º y 3.º ESO (art. 23.1.d Decreto 30/2023) y como materia de 4.º ESO entre las contempladas en el artículo 24. Pendiente de cotejo el detalle curricular del anexo correspondiente del propio decreto. Ver TAREA-025."

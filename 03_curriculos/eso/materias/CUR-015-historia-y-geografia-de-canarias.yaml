resumen_ia: "Currículo de Historia y Geografía de Canarias en 3.º ESO regulado por el Decreto 30/2023 (NOR-005). Es una materia propia del currículo autonómico canario establecida en el artículo 23.5 del decreto y, por su carácter específicamente canario, no aparece en el RD 217/2022 estatal. La extracción del anexo (competencias específicas literales, criterios de evaluación y saberes básicos) queda pendiente."
observaciones: "Materia propia del currículo canario. El artículo 23.5 del Decreto 30/2023 establece que en 3.º ESO el alumnado cursará la materia de Historia y Geografía de Canarias (confirmado en BOC n.º 58 de 23-3-2023, FTE-009). El contenido íntegro del anexo no se ha podido cotejar en esta extracción inicial; competencias específicas, criterios de evaluación, saberes básicos y descriptores operativos quedan marcados como [PENDIENTE] hasta una revisión sobre el PDF oficial del BOC. Ver TAREA-026 y PREG-001."

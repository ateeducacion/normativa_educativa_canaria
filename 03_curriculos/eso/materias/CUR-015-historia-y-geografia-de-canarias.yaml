resumen_ia: "Currículo de Historia y Geografía de Canarias en 3.º ESO, materia propia del currículo autonómico canario regulada por el Decreto 30/2023 (art. 23.5). Incluye 6 competencias específicas (C1-C6) y 25 criterios de evaluación. Los saberes se organizan en tres bloques: «I. Retos del mundo actual», «II. Sociedades y territorios» y «III. Compromiso cívico y social», con especial énfasis en el archipiélago canario como escenario de aprendizaje."
observaciones: "Extracción completada el 2026-04-26 a partir del PDF oficial publicado por la Consejería de Educación, Universidades, Cultura y Deportes del Gobierno de Canarias (Historia_geografia_de_Canarias_ESO.pdf). Los enunciados de competencias específicas, criterios de evaluación y saberes básicos se han recogido literalmente. Materia propia del currículo canario; no aparece en el RD 217/2022 estatal."

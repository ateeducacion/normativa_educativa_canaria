resumen_ia: "Currículo de Formación y Orientación Personal y Profesional en 4.º de ESO Canarias, materia disponible en el elenco del artículo 25 del Decreto 30/2023 con orientación al carácter orientador del último curso de la etapa. Extracción inicial: norma base confirmada en BOC; competencias específicas, criterios de evaluación y saberes básicos pendientes de cotejo con el anexo correspondiente del Decreto 30/2023."
observaciones: "Encuadre normativo confirmado el 2026-04-26 mediante consulta del índice del BOC n.º 58/2023: Formación y Orientación Personal y Profesional figura entre las materias de 4.º ESO previstas en el artículo 25 del Decreto 30/2023, alineada con el carácter orientador del último curso de la etapa. Pendiente de cotejo el detalle curricular del anexo correspondiente del propio decreto. Ver TAREA-025."

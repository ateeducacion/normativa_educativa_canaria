resumen_ia: "Currículo de Latín como materia optativa de 4.º ESO en Canarias, regulado por el Decreto 30/2023 (NOR-005) en desarrollo del RD 217/2022 (NOR-003). Conforme al artículo 25.2.g del decreto, Latín se ofrece en 4.º ESO dentro de la opción D, junto a Segunda Lengua Extranjera. La extracción literal del anexo (competencias específicas, criterios de evaluación y saberes básicos) está pendiente."
observaciones: "Materia optativa de 4.º ESO según el artículo 25.2.g del Decreto 30/2023 (opción D, junto a Segunda Lengua Extranjera). Confirmado en el articulado del BOC n.º 58 de 23-3-2023 (FTE-009). El contenido íntegro del anexo no se ha podido cotejar en esta extracción inicial; competencias específicas, criterios de evaluación, saberes básicos y descriptores operativos quedan marcados como [PENDIENTE] hasta una revisión sobre el PDF oficial del BOC. Ver TAREA-026 y PREG-001."

      enunciado_oficial: "[PENDIENTE] de cotejar con el anexo II del Decreto 30/2023. El marco estatal apunta a la resolución de problemas tecnológicos mediante la aplicación de procesos creativos e iterativos, prototipado rápido y trabajo colaborativo. Ver TAREA-031."
      descriptores: []
    - codigo: "C3"
      enunciado_resumido: "[PENDIENTE] de extracción literal."
      enunciado_oficial: "[PENDIENTE] de cotejar con el anexo II del Decreto 30/2023. El marco estatal incluye una competencia centrada en el pensamiento computacional, la programación y la robótica para diseñar soluciones a problemas. Ver TAREA-031."
      descriptores: []
    - codigo: "C4"

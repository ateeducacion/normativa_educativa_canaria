      enunciado_oficial: "[PENDIENTE] de cotejar con el anexo II del Decreto 30/2023, materia Tecnología y Digitalización. El marco estatal RD 217/2022 establece para 1.º-3.º ESO una primera competencia específica orientada a buscar y seleccionar información sobre la evolución de la tecnología, su impacto en la sociedad y el entorno y su contribución al cambio climático y la sostenibilidad. Ver TAREA-031 para extracción literal posterior."

resumen_ia: "Currículo de Tecnología y Digitalización en ESO Canarias regulado por el Decreto 30/2023 (NOR-005). La materia se imparte como obligatoria en 1.º y 2.º de ESO y como optativa en 3.º de ESO (artículo 23.1.k). En 4.º de ESO la continuidad se ofrece a través de las materias de oferta 'Tecnología' (CUR-022) y 'Digitalización' (CUR-004). Marco estatal: RD 217/2022 (NOR-003). [PENDIENTE] de cotejo del detalle de competencias específicas, criterios de evaluación y saberes básicos con el anexo II del Decreto 30/2023; el PDF específico de la materia no estaba disponible en la URL del portal de currículos en la fecha de consulta (2026-04-26). Ver TAREA-031 para extracción literal posterior."
observaciones: "Extracción parcial (segunda pasada, TAREA-030): la metadata (norma base autonómica, cursos y fuente) queda confirmada contra el articulado del Decreto 30/2023 (FTE-009). El PDF específico del anexo II para esta materia (Tecnología_y_Digitalizacion_ESO.pdf) devolvió 404 en el portal en la fecha de consulta. Se proporciona estructura de competencias (5) y de bloques de saberes (6) marcada como [HIPÓTESIS]/[PENDIENTE] sobre la base del marco estatal RD 217/2022 y de la materia continuadora Tecnología (CUR-022, 4.º ESO) cotejada en esta pasada. Se recomienda crear TAREA-031 para descargar el PDF correcto (probar nombres alternativos en la URL, descarga directa del BOC PDF de 1953 págs.) y completar la extracción literal."

resumen_ia: "Currículo de Tecnología y Digitalización en ESO Canarias regulado por el Decreto 30/2023 (NOR-005). La materia se imparte como obligatoria en 1.º y 2.º de ESO y como optativa en 3.º de ESO (artículo 23.1.k). En 4.º de ESO la continuidad se ofrece a través de las materias de oferta 'Tecnología' (CUR-022) y 'Digitalización' (CUR-004). Marco estatal: RD 217/2022 (NOR-003). [PENDIENTE] de cotejo del detalle de competencias específicas, criterios de evaluación y saberes básicos con el anexo II del Decreto 30/2023."
observaciones: "Extracción parcial: la metadata (norma base autonómica, cursos y fuente) queda confirmada contra el articulado del Decreto 30/2023 publicado en el BOC n.º 58, de 23 de marzo de 2023 (FTE-009). 'Tecnología y Digitalización' es la denominación oficial LOMLOE para 1.º-3.º ESO; en 4.º se desdobla en 'Tecnología' (CUR-022) y 'Digitalización' (CUR-004). El detalle curricular (competencias específicas, criterios de evaluación y saberes básicos por bloque) queda como [PENDIENTE] hasta poder consultar el anexo II del Decreto 30/2023 con la materia desarrollada. Ver TAREA-027."

resumen_ia: "Currículo de Segunda Lengua Extranjera en ESO Canarias (Decreto 30/2023, NOR-005). Materia optativa en 1.º-3.º y, en 4.º, integrada en la opción D «Latín y Segunda Lengua Extranjera». Seis competencias específicas (C1-C6) alineadas con el Marco Común Europeo de Referencia para las Lenguas (MCER): comprensión, producción, interacción, mediación, plurilingüismo e interculturalidad. Saberes básicos en cuatro bloques: comunicación, plurilingüismo, interculturalidad y dimensiones interpersonal e intrapersonal. Marco estatal: RD 217/2022 (NOR-003)."
observaciones: "Extracción cotejada el 2026-04-26 contra el PDF oficial publicado por la Consejería de Educación de Canarias (Anexo II del Decreto 30/2023, materia Segunda Lengua Extranjera). Se han incorporado los enunciados literales de las seis competencias específicas con sus descriptores del Perfil de salida y los primeros diez criterios de 1.º ESO (1.1, 1.2, 1.3, 2.1, 2.2, 2.3, 3.1, 3.2, 4.1, 4.2). Los criterios 5.1, 5.2, 6.1 y 6.2 de 1.º y todos los criterios de 2.º, 3.º y 4.º ESO quedan como [PENDIENTE] al no haberse podido cotejar literalmente en esta pasada. Saberes básicos sintetizados por bloque siguiendo la estructura oficial."

resumen_ia: "Currículo de Tecnología en ESO Canarias regulado por el Decreto 30/2023 (NOR-005). La materia se imparte únicamente en 4.º de ESO como una de las opciones del currículo de ese curso (artículo 25.2.j). En 1.º-3.º, los aprendizajes tecnológicos se desarrollan a través de la materia 'Tecnología y Digitalización' (CUR-023). Marco estatal: RD 217/2022 (NOR-003). [PENDIENTE] de cotejo del detalle de competencias específicas, criterios de evaluación y saberes básicos con el anexo II del Decreto 30/2023."
observaciones: "Extracción parcial: la metadata (norma base autonómica, curso y fuente) queda confirmada contra el articulado del Decreto 30/2023 publicado en el BOC n.º 58, de 23 de marzo de 2023 (FTE-009). En LOMLOE se diferencia 'Tecnología' (4.º ESO) de 'Tecnología y Digitalización' (1.º-3.º ESO, ver CUR-023). El detalle curricular (competencias específicas, criterios de evaluación y saberes básicos por bloque) queda como [PENDIENTE] hasta poder consultar el anexo II del Decreto 30/2023 con la materia desarrollada. Ver TAREA-027."

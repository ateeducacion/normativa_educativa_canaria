            - "c) Se han interpretado diagramas de interacción."
            - "d) Se han elaborado diagramas de interacción sencillos."
            - "e) Se ha interpretado el significado de diagramas de actividades."
            - "f) Se han elaborado diagramas de actividades sencillos."
            - "g) Se han interpretado diagramas de estados."
            - "h) Se han planteado diagramas de estados sencillos."
    - codigo: "0486"
      nombre: "Acceso a Datos"
      horas_totales: 80
      creditos_ects: 9
      resultados_aprendizaje:
        - numero: 1
          enunciado: "Desarrolla aplicaciones que gestionan información almacenada en ficheros identificando el campo de aplicación de los mismos y usando clases específicas."
          criterios_evaluacion:
            - "a) Se han utilizado clases para gestión de ficheros y directorios."
            - "b) Se han valorado las ventajas e inconvenientes de las distintas formas de acceso."
            - "c) Se han utilizado clases para recuperar información de fichero XML."
            - "d) Se han utilizado clases para almacenar información en fichero XML."
            - "e) Se han utilizado clases para convertir información de fichero XML."

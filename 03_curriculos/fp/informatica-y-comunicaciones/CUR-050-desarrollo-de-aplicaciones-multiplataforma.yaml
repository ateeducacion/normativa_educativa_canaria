resumen_ia: >
  Ciclo formativo de Grado Superior de Técnico Superior en Desarrollo de Aplicaciones
  Multiplataforma (DAM), regulado por el RD 450/2010 (BOE-A-2010-8067). Consta de
  14 módulos profesionales con una duración total de 2000 horas. Los módulos de primer
  curso incluyen Sistemas Informáticos, Bases de Datos, Programación, Lenguajes de Marcas
  y Entornos de Desarrollo; los de segundo incluyen Acceso a Datos, Desarrollo de
  Interfaces, Programación Multimedia y Dispositivos Móviles, Programación de Servicios
  y Procesos, Sistemas de Gestión Empresarial, FOL, EIE, el Proyecto y la FCT (360 h).
  Título de la familia Informática y Comunicaciones. No sustituye a la fuente oficial.
observaciones: >
  Extracción parcial completada en TAREA-045 (2026-04-26). Criterios de evaluación (CEs)
  extraídos del HTML oficial del BOE (BOE-A-2010-8067) para los módulos 0483, 0484, 0485,
  0373, 0487, 0486 y 0488. El documento HTML está truncado a partir del módulo 0489

            - "b) Se han programado clientes de protocolos estándar de comunicaciones y verificado su funcionamiento."
            - "c) Se han desarrollado y probado servicios de comunicación en red."
            - "d) Se han analizado los requerimientos necesarios para crear servicios capaces de gestionar varios clientes concurrentes."
            - "e) Se han incorporado mecanismos para posibilitar la comunicación simultánea de varios clientes con el servicio."
            - "f) Se ha verificado la disponibilidad del servicio."
            - "g) Se han depurado y documentado las aplicaciones desarrolladas."
        - numero: 5
          enunciado: "Protege las aplicaciones y los datos definiendo y aplicando criterios de seguridad en el acceso, almacenamiento y transmisión de la información."
          criterios_evaluacion:
            - "a) Se han identificado y aplicado principios y prácticas de programación segura."
            - "b) Se han analizado las principales técnicas y prácticas criptográficas."
            - "c) Se han definido e implantado políticas de seguridad para limitar y controlar el acceso de los usuarios a las aplicaciones desarrolladas."
            - "d) Se han utilizado esquemas de seguridad basados en roles."
            - "e) Se han empleado algoritmos criptográficos para proteger el acceso a la información almacenada."
            - "f) Se han identificado métodos para asegurar la información transmitida."
            - "g) Se han desarrollado aplicaciones que utilicen sockets seguros para la transmisión de información."
            - "h) Se han depurado y documentado las aplicaciones desarrolladas."
    - codigo: "0491"
      nombre: "Sistemas de Gestión Empresarial"
      horas_totales: 55
      creditos_ects: 8
      resultados_aprendizaje:
        - numero: 1
          enunciado: "Identifica sistemas de planificación de recursos empresariales y de gestión de relaciones con clientes (ERP-CRM) reconociendo sus características y verificando la configuración del sistema informático."
          criterios_evaluacion:
            - "a) Se han reconocido los diferentes sistemas ERP-CRM que existen en el mercado."
            - "b) Se han comparado sistemas ERP-CRM en función de sus características y requisitos."
            - "c) Se ha identificado el sistema operativo adecuado a cada sistema ERP-CRM."
            - "d) Se ha identificado el sistema gestor de datos adecuado a cada sistema ERP-CRM."
            - "e) Se han verificado las configuraciones del sistema operativo y del gestor de datos para garantizar la funcionalidad del ERP-CRM."
            - "f) Se han documentado las operaciones realizadas."
            - "g) Se han documentado las incidencias producidas durante el proceso."
        - numero: 2
          enunciado: "Implanta sistemas ERP-CRM interpretando la documentación técnica e identificando las diferentes opciones y módulos."
          criterios_evaluacion:
            - "a) Se han identificado los diferentes tipos de licencia."
            - "b) Se han identificado los módulos que componen el ERP-CRM."
            - "c) Se han realizado instalaciones monopuesto."
            - "d) Se han realizado instalaciones cliente/servidor."
            - "e) Se han configurado los módulos instalados."
            - "f) Se han realizado instalaciones adaptadas a las necesidades planteadas en diferentes supuestos."
            - "g) Se ha verificado el funcionamiento del ERP-CRM."
            - "h) Se han documentado las operaciones realizadas y las incidencias."
        - numero: 3
          enunciado: "Realiza operaciones de gestión y consulta de la información siguiendo las especificaciones de diseño y utilizando las herramientas proporcionadas por los sistemas ERP-CRM."
          criterios_evaluacion:
            - "a) Se han utilizado herramientas y lenguajes de consulta y manipulación de datos proporcionados por los sistemas ERP-CRM."
            - "b) Se han generado formularios."
            - "c) Se han generado informes."
            - "d) Se han exportado datos e informes."
            - "e) Se han automatizado las extracciones de datos mediante procesos."
            - "f) Se han documentado las operaciones realizadas y las incidencias observadas."
        - numero: 4
          enunciado: "Adapta sistemas ERP-CRM identificando los requerimientos de un supuesto empresarial y utilizando las herramientas proporcionadas por los mismos."
          criterios_evaluacion:
            - "a) Se han identificado las posibilidades de adaptación del ERP-CRM."
            - "b) Se han adaptado definiciones de campos, tablas y vistas de la base de datos del ERP-CRM."
            - "c) Se han adaptado consultas."
            - "d) Se han adaptado interfaces de entrada de datos y de procesos."
            - "e) Se han personalizado informes."
            - "f) Se han adaptado procedimientos almacenados de servidor."
            - "g) Se han realizado pruebas."
            - "h) Se han documentado las operaciones realizadas y las incidencias observadas."
        - numero: 5
          enunciado: "Desarrolla componentes para un sistema ERP-CRM analizando y utilizando el lenguaje de programación incorporado."
          criterios_evaluacion:
            - "a) Se han reconocido las sentencias del lenguaje propio del sistema ERP-CRM."
            - "b) Se han utilizado los elementos de programación del lenguaje para crear componentes de manipulación de datos."
            - "c) Se han modificado componentes software para añadir nuevas funcionalidades al sistema."
            - "d) Se han integrado los nuevos componentes software en el sistema ERP-CRM."
            - "e) Se ha verificado el correcto funcionamiento de los componentes creados."
            - "f) Se han documentado todos los componentes creados o modificados."
    - codigo: "0492"
      nombre: "Proyecto de Desarrollo de Aplicaciones Multiplataforma"
      horas_totales: 25
      creditos_ects: 5
      resultados_aprendizaje:
        - numero: 1
          enunciado: "Identifica necesidades del sector productivo, relacionándolas con proyectos tipo que puedan satisfacerlas."
          criterios_evaluacion:
            - "a) Se han clasificado las empresas del sector por sus características organizativas y el tipo de producto o servicio que ofrecen."
            - "b) Se han caracterizado las empresas tipo indicando la estructura organizativa y las funciones de cada departamento."
            - "c) Se han identificado las necesidades más demandadas a las empresas."
            - "d) Se han valorado las oportunidades de negocio previsibles en el sector."
            - "e) Se ha identificado el tipo de proyecto requerido para dar respuesta a las demandas previstas."
            - "f) Se han determinado las características específicas del proyecto según los requerimientos."
            - "g) Se han determinado las obligaciones fiscales, laborales y de prevención de riesgos y sus condiciones de aplicación."
            - "h) Se han identificado posibles ayudas o subvenciones para la incorporación de las nuevas tecnologías de producción o de servicio propuestas."
            - "i) Se ha elaborado el guión de trabajo que se va a seguir para la elaboración del proyecto."
        - numero: 2
          enunciado: "Diseña proyectos relacionados con las competencias expresadas en el título, desarrollando explícitamente las fases que lo componen."
          criterios_evaluacion:
            - "a) Se ha recopilado información relativa a los aspectos que van a ser tratados en el proyecto."
            - "b) Se ha realizado el estudio de viabilidad técnica del proyecto."
            - "c) Se han identificado las fases del proyecto especificando su contenido y plazos de ejecución."
            - "d) Se han establecido los objetivos que se pretenden conseguir identificando su alcance."
            - "e) Se han determinado las actividades necesarias para el desarrollo del proyecto."
            - "f) Se han previsto los recursos materiales y personales necesarios para realizar el proyecto."
            - "g) Se han identificado las necesidades de financiación para la puesta en marcha del proyecto."
            - "h) Se ha definido y elaborado la documentación necesaria para su diseño."
            - "i) Se han identificado los aspectos que se deben controlar para garantizar la calidad del proyecto."
        - numero: 3
          enunciado: "Planifica la ejecución del proyecto, determinando el plan de intervención y la documentación asociada."
          criterios_evaluacion:
            - "a) Se han secuenciado las tareas en función de las necesidades de implementación."
            - "b) Se han determinado los recursos y la logística necesaria para cada tarea."
            - "c) Se han identificado las necesidades de permisos y autorizaciones para llevar a cabo las tareas."
            - "d) Se han determinado los procedimientos para ejecución de las tareas."
            - "e) Se han identificado los riesgos inherentes a la ejecución del proyecto, definiendo el plan de prevención de riesgos y los medios necesarios."
            - "f) Se ha planificado la asignación de recursos materiales y humanos según los tiempos de ejecución."
            - "g) Se ha hecho la valoración económica que da respuesta a las condiciones de la ejecución del proyecto."
            - "h) Se ha definido y elaborado la documentación necesaria para la ejecución del proyecto."
        - numero: 4
          enunciado: "Define los procedimientos para el seguimiento y control en la ejecución del proyecto, justificando la selección de variables e instrumentos empleados."
          criterios_evaluacion:
            - "a) Se ha definido el procedimiento de evaluación de las actividades o intervenciones realizadas durante la ejecución del proyecto."
            - "b) Se han definido los indicadores de calidad para realizar la evaluación del proyecto."
            - "c) Se ha definido el procedimiento para el registro y evaluación de las incidencias que puedan presentarse durante la ejecución del proyecto."
            - "d) Se ha definido el procedimiento para la solución de las incidencias registradas."
            - "e) Se ha definido el procedimiento para la gestión y registro de los cambios en los recursos y en las tareas."
            - "f) Se ha establecido el procedimiento para la participación en la evaluación de los usuarios y se han elaborado documentos específicos."
            - "g) Se ha establecido un sistema para garantizar el cumplimiento del pliego de condiciones del proyecto cuando este existe."
    - codigo: "0493"
      nombre: "Formación y Orientación Laboral"
      horas_totales: 50
      creditos_ects: 5
      resultados_aprendizaje:
        - numero: 1
          enunciado: "Selecciona oportunidades de empleo, identificando las diferentes posibilidades de inserción y las alternativas de aprendizaje a lo largo de la vida."
          criterios_evaluacion:
            - "a) Se ha valorado la importancia de la formación permanente como factor clave para la empleabilidad y la adaptación a las exigencias del proceso productivo."
            - "b) Se han identificado los itinerarios formativos-profesionales relacionados con el perfil profesional del técnico en Desarrollo de aplicaciones multiplataforma."
            - "c) Se han determinado las aptitudes y actitudes requeridas para la actividad profesional relacionada con el perfil del título."
            - "d) Se han identificado los principales yacimientos de empleo y de inserción laboral para el técnico en Desarrollo de aplicaciones multiplataforma."
            - "e) Se han determinado las técnicas utilizadas en el proceso de búsqueda de empleo."
            - "f) Se han previsto las alternativas de autoempleo en los sectores profesionales relacionados con el título."
            - "g) Se ha realizado la valoración de la personalidad, aspiraciones, actitudes, y formación propia para la toma de decisiones."
        - numero: 2
          enunciado: "Aplica las estrategias del trabajo en equipo, valorando su eficacia y eficiencia para la consecución de los objetivos de la organización."
          criterios_evaluacion:
            - "a) Se han valorado las ventajas de trabajo en equipo en situaciones de trabajo relacionadas con el perfil del técnico en Desarrollo de aplicaciones multiplataforma."
            - "b) Se han identificado los equipos de trabajo que pueden constituirse en una situación real de trabajo."
            - "c) Se han determinado las características del equipo de trabajo eficaz frente a los equipos ineficaces."
            - "d) Se ha valorado positivamente la necesaria existencia de diversidad de roles y opiniones asumidos por los miembros de un equipo."
            - "e) Se ha reconocido la posible existencia de conflicto entre los miembros de un grupo como un aspecto característico de las organizaciones."
            - "f) Se han identificado los tipos de conflictos y sus fuentes."
            - "g) Se han determinado procedimientos para la resolución del conflicto."
        - numero: 3
          enunciado: "Ejerce los derechos y cumple las obligaciones que se derivan de las relaciones laborales, reconociéndolas en los diferentes contratos de trabajo."
          criterios_evaluacion:
            - "a) Se han identificado los conceptos básicos del derecho del trabajo."
            - "b) Se han distinguido los principales organismos que intervienen en las relaciones entre empresarios y trabajadores."
            - "c) Se han determinado los derechos y obligaciones derivados de la relación laboral."
            - "d) Se han clasificado las principales modalidades de contratación, identificando las medidas de fomento de la contratación para determinados colectivos."
            - "e) Se han valorado las medidas establecidas por la legislación vigente para la conciliación de la vida laboral y familiar."
            - "f) Se han identificado las causas y efectos de la modificación, suspensión y extinción de la relación laboral."
            - "g) Se ha analizado el recibo de salarios, identificando los principales elementos que lo integran."
            - "h) Se han analizado las diferentes medidas de conflicto colectivo y los procedimientos de solución de conflictos."
            - "i) Se han determinado las condiciones de trabajo pactadas en un convenio colectivo aplicable a un sector profesional relacionado con el título de técnico en Desarrollo de aplicaciones multiplataforma."
            - "j) Se han identificado las características definitorias de los nuevos entornos de organización del trabajo."
        - numero: 4
          enunciado: "Determina la acción protectora del sistema de la Seguridad Social ante las distintas contingencias cubiertas, identificando las distintas clases de prestaciones."
          criterios_evaluacion:
            - "a) Se ha valorado el papel de la Seguridad Social como pilar esencial para la mejora de la calidad de vida de los ciudadanos."
            - "b) Se han enumerado las diversas contingencias que cubre el sistema de Seguridad Social."
            - "c) Se han identificado los regímenes existentes en el sistema de la Seguridad Social."
            - "d) Se han identificado las obligaciones de empresario y trabajador dentro del sistema de Seguridad Social."
            - "e) Se han identificado, en un supuesto sencillo, las bases de cotización de un trabajador y las cuotas correspondientes a trabajador y empresario."
            - "f) Se han clasificado las prestaciones del sistema de Seguridad Social, identificando los requisitos."
            - "g) Se han determinado las posibles situaciones legales de desempleo en supuestos prácticos sencillos."
            - "h) Se ha realizado el cálculo de la duración y cuantía de una prestación por desempleo de nivel contributivo básico."
        - numero: 5
          enunciado: "Evalúa los riesgos derivados de su actividad, analizando las condiciones de trabajo y los factores de riesgo presentes en su entorno laboral."
          criterios_evaluacion:
            - "a) Se ha valorado la importancia de la cultura preventiva en todos los ámbitos y actividades de la empresa."
            - "b) Se han relacionado las condiciones laborales con la salud del trabajador."
            - "c) Se han clasificado los factores de riesgo en la actividad y los daños derivados de los mismos."
            - "d) Se han identificado las situaciones de riesgo más habituales en los entornos de trabajo del técnico en Desarrollo de aplicaciones multiplataforma."
            - "e) Se ha determinado la evaluación de riesgos en la empresa."
            - "f) Se han determinado las condiciones de trabajo con significación para la prevención en los entornos de trabajo relacionados con el perfil profesional del técnico en Desarrollo de aplicaciones multiplataforma."
            - "g) Se han clasificado y descrito los tipos de daños profesionales, con especial referencia a accidentes de trabajo y enfermedades profesionales, relacionados con el perfil profesional del Técnico en Desarrollo de Aplicaciones Multiplataforma."
        - numero: 6
          enunciado: "Participa en la elaboración de un plan de prevención de riesgos en una pequeña empresa, identificando las responsabilidades de todos los agentes implicados."
          criterios_evaluacion:
            - "a) Se han determinado los principales derechos y deberes en materia de prevención de riesgos laborales."
            - "b) Se han clasificado las distintas formas de gestión de la prevención en la empresa, en función de los diferentes criterios establecidos en la normativa sobre prevención de riesgos laborales."
            - "c) Se han determinado las formas de representación de los trabajadores en la empresa en materia de prevención de riesgos."
            - "d) Se han identificado los organismos públicos relacionados con la prevención de riesgos laborales."
            - "e) Se ha valorado la importancia de la existencia de un plan preventivo en la empresa que incluya la secuenciación de actuaciones que se deben realizar en caso de emergencia."
            - "f) Se ha definido el contenido del plan de prevención en un centro de trabajo relacionado con el sector profesional del técnico en Desarrollo de aplicaciones multiplataforma."
            - "g) Se ha proyectado un plan de emergencia y evacuación en una pequeña y mediana empresa."
        - numero: 7
          enunciado: "Aplica las medidas de prevención y protección, analizando las situaciones de riesgo en el entorno laboral del técnico en Desarrollo de aplicaciones multiplataforma."
          criterios_evaluacion:
            - "a) Se han definido las técnicas de prevención y de protección individual y colectiva que deben aplicarse para evitar los daños en su origen y minimizar sus consecuencias en caso de que sean inevitables."
            - "b) Se ha analizado el significado y alcance de los distintos tipos de señalización de seguridad."
            - "c) Se han analizado los protocolos de actuación en caso de emergencia."
            - "d) Se han identificado las técnicas de clasificación de heridos en caso de emergencia donde existan víctimas de diversa gravedad."
            - "e) Se han identificado las técnicas básicas de primeros auxilios que han de ser aplicadas en el lugar del accidente ante distintos tipos de daños y la composición y uso del botiquín."
            - "f) Se han determinado los requisitos y condiciones para la vigilancia de la salud del trabajador y su importancia como medida de prevención."

            - "f) Se han modificado los objetos almacenados."
            - "g) Se han gestionado las transacciones."
            - "h) Se han probado y documentado las aplicaciones desarrolladas."
        - numero: 5
          enunciado: "Desarrolla aplicaciones que gestionan la información almacenada en bases de datos nativas XML evaluando y utilizando clases específicas."

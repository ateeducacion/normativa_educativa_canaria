id: CUR-051
titulo: "Técnico Superior en Desarrollo de Aplicaciones Web (DAW) — FP Canarias"
etapa: "fp"
familia_profesional: "Informática y Comunicaciones"
grado: "gs"
materia: "Desarrollo de Aplicaciones Web"
ambito: null
cursos: ["1.º", "2.º"]
norma_base: NOR-056
fuente: FTE-054

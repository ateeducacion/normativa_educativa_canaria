resumen_ia: "Ciclo formativo de Grado Medio de la familia Sanidad. Contiene 8 módulos profesionales (incluyendo FCT) con una duración total de 1.400 horas. Regulado bajo el marco LOGSE — emplea capacidades terminales en lugar de resultados de aprendizaje LOE. Los módulos cubren técnicas básicas de enfermería, higiene hospitalaria, documentación sanitaria, promoción de la salud y técnicas odontológicas. Este resumen no sustituye la fuente oficial."
observaciones: "Módulos extraídos el 2026-04-26. RD verificado en BOE.es (TAREA-042, 2026-04-26): el RD correcto que establece el título es el 546/1995 (BOE-A-1995-13533), no el 1538/1995 que figuraba en la catalogación inicial. Ver NOR-051 y PREG-005 (resuelta). Estado parcial: módulos con horas totales; capacidades terminales y criterios de evaluación completos pendientes para fase posterior. Placeholder creado en TAREA-037."

        - "g) Se han determinado procedimientos para la resolución del conflicto."
      - numero: 3
        enunciado: "Ejerce los derechos y cumple las obligaciones que se derivan de las relaciones laborales, reconociéndolas en los diferentes contratos de trabajo."
        criterios_evaluacion:
        - "a) Se han identificado los conceptos básicos del derecho del trabajo."
        - "b) Se han distinguido los principales organismos que intervienen en las relaciones entre empresarios y trabajadores."
        - "c) Se han determinado los derechos y obligaciones derivados de la relación laboral."
        - "d) Se han clasificado las principales modalidades de contratación, identificando las medidas de fomento de la contratación para determinados colectivos."
        - "e) Se han valorado las medidas establecidas por la legislación vigente para la conciliación de la vida laboral y familiar."
        - "f) Se han identificado las causas y efectos de la modificación, suspensión y extinción de la relación laboral."
        - "g) Se ha analizado el recibo de salarios, identificando los principales elementos que lo integran."
        - "h) Se han analizado las diferentes medidas de conflicto colectivo y los procedimientos de solución de conflictos."
        - "i) Se han determinado las condiciones de trabajo pactadas en un convenio colectivo aplicable al sector relacionado con el título de Técnico Superior en Imagen para el Diagnóstico y Medicina Nuclear."
        - "j) Se han identificado las características definitorias de los nuevos entornos de organización del trabajo."
      - numero: 4
        enunciado: "Determina la acción protectora del sistema de la Seguridad Social ante las distintas contingencias cubiertas, identificando las distintas clases de prestaciones."
        criterios_evaluacion:
        - "a) Se ha valorado el papel de la Seguridad Social como pilar esencial para la mejora de la calidad de vida de los ciudadanos."
        - "b) Se han enumerado las diversas contingencias que cubre el sistema de Seguridad Social."
        - "c) Se han identificado los regímenes existentes en el sistema de Seguridad Social."
        - "d) Se han identificado las obligaciones de empresario y trabajador dentro del sistema de Seguridad Social."
        - "e) Se han identificado en un supuesto sencillo las bases de cotización de un trabajador y las cuotas correspondientes a trabajador y empresario."
        - "f) Se han clasificado las prestaciones del sistema de Seguridad Social, identificando los requisitos."
        - "g) Se han determinado las posibles situaciones legales de desempleo."
        - "h) Se ha realizado el cálculo de la duración y cuantía de una prestación por desempleo de nivel contributivo básico."
      - numero: 5
        enunciado: "Evalúa los riesgos derivados de su actividad, analizando las condiciones de trabajo y los factores de riesgo presentes en su entorno laboral."
        criterios_evaluacion:
        - "a) Se ha valorado la importancia de la cultura preventiva en todos los ámbitos y actividades de la empresa."
        - "b) Se han relacionado las condiciones laborales con la salud del trabajador."
        - "c) Se han clasificado los factores de riesgo en la actividad y los daños derivados de los mismos."
        - "d) Se han identificado las situaciones de riesgo más habituales en los entornos de trabajo del técnico superior en Imagen para el Diagnóstico y Medicina Nuclear."
        - "e) Se ha determinado la evaluación de riesgos en la empresa."
        - "f) Se han determinado las condiciones de trabajo con significación para la prevención en los entornos de trabajo relacionados con el perfil profesional del técnico superior en Imagen para el Diagnóstico y Medicina Nuclear."
        - "g) Se han clasificado y descrito los tipos de daños profesionales, con especial referencia a accidentes de trabajo y enfermedades profesionales, relacionados con el perfil profesional del técnico superior en Imagen para el Diagnóstico y Medicina Nuclear."
      - numero: 6
        enunciado: "Participa en la elaboración de un plan de prevención de riesgos en una pequeña empresa, identificando las responsabilidades de todos los agentes implicados."
        criterios_evaluacion:
        - "a) Se han determinado los principales derechos y deberes en materia de prevención de riesgos laborales."
        - "b) Se han clasificado las distintas formas de gestión de la prevención en la empresa, en función de los distintos criterios establecidos en la normativa sobre prevención de riesgos laborales."
        - "c) Se han determinado las formas de representación de los trabajadores en la empresa en materia de prevención de riesgos."
        - "d) Se han identificado los organismos públicos relacionados con la prevención de riesgos laborales."
        - "e) Se ha valorado la importancia de la existencia de un plan preventivo en la empresa que incluya la secuenciación de actuaciones que se deben realizar en caso de emergencia."
        - "f) Se ha definido el contenido del plan de prevención en un centro de trabajo relacionado con el sector profesional del técnico superior en Imagen para el Diagnóstico y Medicina Nuclear."
        - "g) Se ha proyectado un plan de emergencia y evacuación de una empresa del sector."
      - numero: 7
        enunciado: "Aplica las medidas de prevención y protección, analizando las situaciones de riesgo en el entorno laboral del técnico superior en Imagen para el Diagnóstico y Medicina Nuclear."
        criterios_evaluacion:
        - "a) Se han definido las técnicas de prevención y de protección individual y colectiva que deben aplicarse para evitar los daños en su origen y minimizar sus consecuencias en caso de que sean inevitables."
        - "b) Se ha analizado el significado y alcance de los distintos tipos de señalización de seguridad."
        - "c) Se han analizado los protocolos de actuación en caso de emergencia."
        - "d) Se han identificado las técnicas de clasificación de heridos en caso de emergencia donde existan víctimas de diversa gravedad."
        - "e) Se han identificado las técnicas básicas de primeros auxilios que deben ser aplicadas en el lugar del accidente ante distintos tipos de daños y la composición y uso del botiquín."
        - "f) Se han determinado los requisitos y condiciones para la vigilancia de la salud del trabajador y su importancia como medida de prevención."
    - codigo: "1357"
      nombre: "Empresa e iniciativa emprendedora"
      horas_totales: 35
      ects: 4
      resultados_aprendizaje:
      - numero: 1
        enunciado: "Reconoce las capacidades asociadas a la iniciativa emprendedora, analizando los requerimientos derivados de los puestos de trabajo y de las actividades empresariales."
        criterios_evaluacion:
        - "a) Se ha identificado el concepto de innovación y su relación con el progreso de la sociedad y el aumento en el bienestar de los individuos."
        - "b) Se ha analizado el concepto de cultura emprendedora y su importancia como fuente de creación de empleo y bienestar social."
        - "c) Se ha valorado la importancia de la iniciativa individual, la creatividad, la formación y la colaboración como requisitos indispensables para tener éxito en la actividad emprendedora."
        - "d) Se ha analizado la capacidad de iniciativa en el trabajo de una persona empleada en una pequeña y mediana empresa relacionada con la imagen para el diagnóstico y la medicina nuclear."
        - "e) Se ha analizado el desarrollo de la actividad emprendedora de un empresario que se inicie en el sector de la imagen para el diagnóstico y la medicina nuclear."
        - "f) Se ha analizado el concepto de riesgo como elemento inevitable de toda actividad emprendedora."
        - "g) Se ha analizado el concepto de empresario y los requisitos y actitudes necesarios para desarrollar la actividad empresarial."
        - "h) Se ha descrito la estrategia empresarial, relacionándola con los objetivos de la empresa."
        - "i) Se ha definido una determinada idea de negocio en el ámbito de la imagen para el diagnóstico y la medicina nuclear, que sirva de punto de partida para la elaboración de un plan de empresa."
      - numero: 2
        enunciado: "Define la oportunidad de creación de una pequeña empresa, valorando el impacto sobre el entorno de actuación e incorporando valores éticos."
        criterios_evaluacion:
        - "a) Se han descrito las funciones básicas que se realizan en una empresa y se ha analizado el concepto de sistema aplicado a la empresa."
        - "b) Se han identificado los principales componentes del entorno general que rodea a la empresa, en especial el entorno económico, social, demográfico y cultural."
        - "c) Se ha analizado la influencia en la actividad empresarial de las relaciones con los clientes, con los proveedores y con la competencia, como principales integrantes del entorno específico."
        - "d) Se han identificado los elementos del entorno de una pyme de imagen para el diagnóstico y medicina nuclear."
        - "e) Se han analizado los conceptos de cultura empresarial e imagen corporativa y su relación con los objetivos empresariales."
        - "f) Se ha analizado el fenómeno de la responsabilidad social de las empresas y su importancia como un elemento de la estrategia empresarial."
        - "g) Se ha elaborado el balance social de una empresa relacionada con la imagen para el diagnóstico y la medicina nuclear, y se han descrito los principales costes sociales en que incurren estas empresas, así como los beneficios sociales que producen."
        - "h) Se han identificado, en empresas relacionadas con la imagen para el diagnóstico y la medicina nuclear, prácticas que incorporan valores éticos y sociales."
        - "i) Se ha llevado a cabo un estudio de viabilidad económica y financiera de una pyme relacionada con la imagen para el diagnóstico y la medicina nuclear."
      - numero: 3
        enunciado: "Realiza actividades para la constitución y puesta en marcha de una empresa, seleccionando la forma jurídica e identificando las obligaciones legales asociadas."
        criterios_evaluacion:
        - "a) Se han analizado las diferentes formas jurídicas de la empresa."
        - "b) Se ha especificado el grado de responsabilidad legal de los propietarios de la empresa, en función de la forma jurídica elegida."
        - "c) Se ha diferenciado el tratamiento fiscal establecido para las diferentes formas jurídicas de la empresa."
        - "d) Se han analizado los trámites exigidos por la legislación vigente para la constitución de una empresa."
        - "e) Se ha realizado una búsqueda exhaustiva de las diferentes ayudas para la creación de empresas relacionadas con la imagen para el diagnóstico y la medicina nuclear en la localidad de referencia."
        - "f) Se ha incluido en el plan de empresa todo lo relativo a la elección de la forma jurídica, estudio de viabilidad económico-financiera, trámites administrativos, ayudas y subvenciones."
        - "g) Se han identificado las vías de asesoramiento y gestión administrativa externas existentes a la hora de poner en marcha una pyme."
      - numero: 4
        enunciado: "Realiza actividades de gestión administrativa y financiera de una pyme, identificando las principales obligaciones contables y fiscales y cumplimentando la documentación."
        criterios_evaluacion:
        - "a) Se han analizado los conceptos básicos de contabilidad, así como las técnicas de registro de la información contable."
        - "b) Se han descrito las técnicas básicas de análisis de la información contable, en especial en lo referente a la solvencia, liquidez y rentabilidad de la empresa."
        - "c) Se han definido las obligaciones fiscales de una empresa relacionada con la imagen para el diagnóstico y la medicina nuclear."
        - "d) Se han diferenciado los tipos de impuestos en el calendario fiscal."
        - "e) Se ha cumplimentado la documentación básica de carácter comercial y contable (facturas, albaranes, notas de pedido, letras de cambio y cheques, entre otros) para una pyme de imagen para el diagnóstico y medicina nuclear, y se han descrito los circuitos que dicha documentación recorre en la empresa."
        - "f) Se han identificado los principales instrumentos de financiación bancaria."
        - "g) Se ha incluido toda la documentación citada en el plan de empresa."
    - codigo: "1358"
      nombre: "Formación en centros de trabajo"
      horas_totales: 220
      ects: 22
      resultados_aprendizaje:
      - numero: 1
        enunciado: "Identifica la estructura y organización de la empresa, relacionándolas con el tipo de servicio que presta."
        criterios_evaluacion:
        - "a) Se ha identificado la estructura organizativa de la empresa y las funciones de cada área de la misma."
        - "b) Se ha comparado la estructura de la empresa con las organizaciones empresariales tipo existentes en el sector."
        - "c) Se han relacionado las características del servicio y el tipo de clientes con el desarrollo de la actividad empresarial."
        - "d) Se han identificado los procedimientos de trabajo en el desarrollo de la prestación de servicio."
        - "e) Se han valorado las competencias necesarias de los recursos humanos para el desarrollo óptimo de la actividad."
        - "f) Se ha valorado la idoneidad de los canales de difusión más frecuentes en esta actividad."
      - numero: 2
        enunciado: "Aplica hábitos éticos y laborales en el desarrollo de su actividad profesional, de acuerdo con las características del puesto de trabajo y con los procedimientos establecidos en la empresa."
        criterios_evaluacion:
        - "a) Se han reconocido y justificado la disponibilidad personal y temporal necesaria en el puesto de trabajo; las actitudes personales (puntualidad y empatía, entre otras) y profesionales (orden, limpieza y responsabilidad, entre otras) necesarias para el puesto de trabajo; los requerimientos actitudinales ante la prevención de riesgos en la actividad profesional; los requerimientos actitudinales referidos a la calidad en la actividad profesional; las actitudes relacionadas con el propio equipo de trabajo y con las jerarquías establecidas en la empresa; las actitudes relacionadas con la documentación de las actividades realizadas en el ámbito laboral; y las necesidades formativas para la inserción y reinserción laboral en el ámbito científico y técnico del buen hacer del profesional."
        - "b) Se han identificado las normas de prevención de riesgos laborales y los aspectos fundamentales de la Ley de Prevención de Riesgos Laborales de aplicación en la actividad profesional."
        - "c) Se han puesto en marcha los equipos de protección individual según los riesgos de la actividad profesional y las normas de la empresa."
        - "d) Se ha mantenido una actitud de respeto al medio ambiente en las actividades desarrolladas."
        - "e) Se ha mantenido organizado, limpio y libre de obstáculos el puesto de trabajo o el área correspondiente al desarrollo de la actividad."
        - "f) Se ha responsabilizado del trabajo asignado, interpretando y cumpliendo las instrucciones recibidas."
        - "g) Se ha establecido una comunicación eficaz con la persona responsable en cada situación y con los miembros del equipo."
        - "h) Se ha coordinado con el resto del equipo, comunicando las incidencias relevantes que se presenten."
        - "i) Se ha valorado la importancia de su actividad y la necesidad de adaptación a los cambios de tareas."
        - "j) Se ha responsabilizado de la aplicación de las normas y procedimientos en el desarrollo de su trabajo."
      - numero: 3
        enunciado: "Presta asistencia técnico-sanitaria al paciente durante su estancia en la unidad de diagnóstico por imagen y medicina nuclear."
        criterios_evaluacion:
        - "a) Se ha identificado al paciente y se ha verificado la preparación previa necesaria para la actuación."
        - "b) Se han identificado los diferentes tipos de documentos clínicos y no clínicos, su función y los cauces de tramitación."
        - "c) Se han realizado los protocolos de seguridad y confort."
        - "d) Se ha reconocido el tipo de material sanitario y se ha relacionado con su uso y funcionamiento."
        - "e) Se ha valorado el estado general del paciente, identificando signos y síntomas de alerta."
        - "f) Se ha realizado la técnica de administración de contrastes según los protocolos de actuación."
        - "g) Se ha generado un entorno seguro y confortable para la actuación."
        - "h) Se han aplicado técnicas de comunicación y apoyo psicológico para facilitar la relación óptima con el paciente."
        - "i) Se ha valorado la importancia de la responsabilidad social y de los principios éticos en los procesos de salud."
      - numero: 4
        enunciado: "Realiza exploraciones de radiología, utilizando contrastes y seleccionando los equipos, materiales y accesorios adecuados a la petición y a las características del paciente."
        criterios_evaluacion:
        - "a) Se ha seleccionado el equipo y los materiales adecuados para la obtención de imágenes de calidad."
        - "b) Se ha informado al paciente sobre el procedimiento y se le ha preparado para realizar la exploración requerida."
        - "c) Se ha posicionado al paciente para realizar la exploración requerida y se han protegido de la radiación los órganos sensibles."
        - "d) Se ha administrado el contraste requerido por la exploración."
        - "e) Se ha realizado la exploración de acuerdo con los protocolos establecidos."
        - "f) Se han obtenido las imágenes requeridas en cada tipo de exploración y se ha valorado su calidad diagnóstica."
        - "g) Se ha valorado la necesidad de repetir la exploración de acuerdo con la calidad de la imagen obtenida."
        - "h) Se ha acondicionado la sala de exploración, el equipo y los materiales accesorios para la realización de una nueva exploración."
      - numero: 5
        enunciado: "Realiza exploraciones mediante equipos de tomografía computarizada y colabora en la realización de ecografía, según protocolos de la unidad."
        criterios_evaluacion:
        - "a) Se han comprobado los datos del/la paciente, se ha comprobado que se ha realizado la preparación necesaria para el estudio y se han tenido en cuenta las características de los pacientes especiales."
        - "b) Se ha informado de las características de la prueba que se va a realizar, se ha obtenido el consentimiento informado y se ha valorado la actitud profesional ante las necesidades del usuario."
        - "c) Se han preparado los medios de contraste indicados para la prueba, su dosis exacta y su vía de administración, se ha comprobado el funcionamiento de las bombas de infusión, se han programado estas y se ha comprobado la disponibilidad de fármacos y equipos para atender reacciones adversas."
        - "d) Se ha interpretado el protocolo de exploración solicitado, se ha colocado al paciente en la posición requerida, garantizando su inmovilidad y su comodidad, se ha realizado el centraje, se ha posicionado la mesa de exploración y se ha adquirido el topograma explorador."
        - "e) Se han obtenido las imágenes solicitadas y se ha presentado el estudio según las preferencias indicadas, procediendo a su archivado en formato digital para obtener copias impresas cuando sean solicitadas."
        - "f) Se ha posicionado adecuadamente al paciente para realizar la exploración ecográfica, se ha preparado la zona que se va a explorar y se ha seleccionado el transductor."
        - "g) Se han seguido los procedimientos de exploración correspondientes a la región anatómica que se va a explorar y se han obtenido imágenes, se ha verificado la calidad de las mismas y se han archivado para su posterior revisión."
        - "h) Se han valorado adecuadamente las necesidades del usuario durante todo el desarrollo de la prueba."
      - numero: 6
        enunciado: "Realiza la exploración mediante equipos de resonancia magnética, siguiendo los protocolos establecidos."
        criterios_evaluacion:
        - "a) Se han comprobado en los datos del/la paciente que no existen contraindicaciones para la realización de la prueba y se ha verificado que se han retirado todos los objetos metálicos."
        - "b) Se ha informado al paciente de las características de la prueba y se ha comprobado que se ha cumplimentado correctamente el consentimiento informado."
        - "c) Se ha preparado todo el material necesario para el desarrollo de la prueba, se han tenido en cuenta las características de los pacientes especiales y se ha valorado la importancia de la actitud profesional ante las necesidades del usuario."
        - "d) Se han preparado los medios de contraste indicados para la prueba, se ha comprobado el funcionamiento de las bombas de infusión y se ha comprobado la disponibilidad de fármacos y equipos para atender reacciones adversas."
        - "e) Se ha interpretado correctamente la hoja de petición de la prueba, se ha establecido la posición requerida para el estudio y se han seleccionado los dispositivos de inmovilización y confort."
        - "f) Se ha colocado la antena correspondiente a la región anatómica que hay que explorar, realizando el centrado y posicionado al paciente para el inicio de la prueba."
        - "g) Se han configurado los parámetros requeridos para el estudio, se han tomado las secuencias localizadoras en tres planos y se ha validado el protocolo de la exploración que se va a realizar."
        - "h) Se han obtenido y procesado las imágenes solicitadas, presentando el estudio según las preferencias indicadas, procediendo a su archivado en formato digital y obteniendo copias impresas cuando han sido solicitadas."
        - "i) Se han cumplido todas las medidas de seguridad establecidas durante todo el desarrollo de la prueba, identificando los riesgos y los posibles incidentes."
      - numero: 7
        enunciado: "Obtiene imágenes médicas mediante equipos de medicina nuclear, utilizando los radiofármacos y siguiendo los protocolos establecidos en cada exploración."
        criterios_evaluacion:
        - "a) Se ha aplicado el procedimiento de puesta a punto de los equipos y del material necesario, interpretando los protocolos de funcionamiento."
        - "b) Se han comprobado los datos del paciente, se le ha informado de las características de la prueba y se ha comprobado que se ha cumplimentado correctamente el consentimiento informado."
        - "c) Se ha obtenido el radioisótopo y se ha marcado el radiofármaco utilizado en la exploración."
        - "d) Se han seleccionado los parámetros de adquisición de imágenes en los equipos, en función del tipo de estudio y el procedimiento de adquisición de imagen."
        - "e) Se ha realizado el procesado de estudios para el registro de la imagen obtenida."
        - "f) Se ha verificado la calidad y la idoneidad de la imagen obtenida, a partir de los patrones de normalidad y otros estudios complementarios."
        - "g) Se han aplicado técnicas de radioinmunoanálisis, interpretando los procedimientos analíticos."
        - "h) Se ha preparado el tratamiento radioisotópico, relacionando el isótopo con las patologías que se van a tratar y el tipo de instalación requerida."
      - numero: 8
        enunciado: "Aplica procedimientos de protección radiológica, en función de la instalación y las fuentes radiactivas."
        criterios_evaluacion:
        - "a) Se han manejado los equipos de medida y detección de la radiación empleados para la dosimetría ambiental y personal."
        - "b) Se han reconocido los riesgos radiológicos inherentes a la instalación radiactiva."
        - "c) Se ha colaborado en los procesos de vigilancia y control de la radiación."
        - "d) Se ha colaborado en los procesos de vigilancia y control de la contaminación."
        - "e) Se ha determinado experimentalmente la variación de la dosis absorbida, debida a una fuente puntual, en función de la distancia, el tiempo y el blindaje."
        - "f) Se han identificado los procedimientos de control de calidad establecidos en el plan de garantía de calidad."
        - "g) Se ha identificado la línea de autoridad dentro del personal de la instalación."
        - "h) Se han identificado las posibles emergencias que pueden ocurrir."
        - "i) Se han aplicado los procedimientos de gestión del material radiactivo."
        - "j) Se ha cumplimentado el libro de operación y de registro del material radiactivo."
relaciones:
  desarrolla_a: [NOR-052]
  relacionada_con: [NOR-007]
resumen_ia: "Ciclo formativo de Grado Superior de la familia Sanidad. Contiene 14 módulos profesionales (incluyendo FCT y proyecto) con una duración total de 2.000 horas (120 ECTS). Los módulos cubren radiodiagnóstico, TC, ecografía, RM, medicina nuclear, radiofarmacia y protección radiológica. Este resumen no sustituye la fuente oficial."
observaciones: "Módulos extraídos el 2026-04-26. RD verificado en BOE.es (TAREA-042, 2026-04-26): el RD correcto que establece el título es el 770/2014 (BOE-A-2014-10067), no el 772/2014 que figuraba en la catalogación inicial (772/2014 corresponde a Radioterapia y Dosimetría). Ver NOR-052 y PREG-005 (resuelta). Extracción completada el 2026-04-26 (TAREA-048): todos los módulos profesionales incluyen resultados de aprendizaje y criterios de evaluación literales extraídos del BOE-A-2014-10067."

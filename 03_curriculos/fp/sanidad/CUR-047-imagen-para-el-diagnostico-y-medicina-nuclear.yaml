resumen_ia: "Ciclo formativo de Grado Superior de la familia Sanidad. Contiene 14 módulos profesionales (incluyendo FCT y proyecto) con una duración total de 2.000 horas (120 ECTS). Los módulos cubren radiodiagnóstico, TC, ecografía, RM, medicina nuclear, radiofarmacia y protección radiológica. Este resumen no sustituye la fuente oficial."
observaciones: "Módulos extraídos el 2026-04-26. RD verificado en BOE.es (TAREA-042, 2026-04-26): el RD correcto que establece el título es el 770/2014 (BOE-A-2014-10067), no el 772/2014 que figuraba en la catalogación inicial (772/2014 corresponde a Radioterapia y Dosimetría). Ver NOR-052 y PREG-005 (resuelta). Estado parcial: módulos con horas y ECTS; resultados de aprendizaje y criterios de evaluación completos pendientes para fase posterior. Placeholder creado en TAREA-037."

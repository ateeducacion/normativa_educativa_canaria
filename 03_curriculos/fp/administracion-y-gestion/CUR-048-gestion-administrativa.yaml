resumen_ia: >
  Ciclo formativo de Grado Medio de Técnico en Gestión Administrativa, regulado por el RD 1631/2009
  (BOE-A-2009-19148). Duración total: 2.000 horas. Comprende 12 módulos profesionales que abarcan
  comunicación empresarial, operaciones de compra-venta, tratamiento informático, contabilidad,
  recursos humanos, tesorería, Inglés, simulación empresarial («Empresa en el aula») y FCT.
  Fuente: BOE-A-2009-19148. Este resumen no sustituye la fuente oficial.
observaciones: >
  Extracción parcial completada el 2026-04-26 a partir del HTML del BOE (BOE-A-2009-19148,
  RD 1631/2009). Se han extraído los 12 módulos con nombre, código y horas totales. Los resultados
  de aprendizaje y criterios de evaluación completos están en el Anexo I del RD pero no se han
  volcado en esta fase; quedan como [PENDIENTE] para una extracción posterior. Nota: el RD fue
  modificado por RD 499/2024 (BOE-A-2024-10684); conviene verificar si afecta a los módulos.

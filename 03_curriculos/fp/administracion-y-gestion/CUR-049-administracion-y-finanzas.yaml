relaciones:
  desarrolla_a: [NOR-054]
  relacionada_con: [NOR-007, CUR-048]
resumen_ia: >
  Ciclo formativo de Grado Superior de Técnico Superior en Administración y Finanzas, regulado por
  el RD 1584/2011 (BOE-A-2011-19533). Duración total: 2.000 horas. Comprende 14 módulos
  profesionales que cubren documentación jurídica y empresarial, recursos humanos, ofimática,
  actividad comercial, comunicación, Inglés, gestión financiera, contabilidad y fiscalidad, logística
  comercial, simulación empresarial, proyecto integrador y FCT. Fuente: BOE-A-2011-19533.
  Este resumen no sustituye la fuente oficial.
observaciones: >
  Extracción parcial completada el 2026-04-26 a partir del HTML del BOE (BOE-A-2011-19533,
  RD 1584/2011). Se han extraído los RAs y CEs de los módulos 0647, 0648, 0649, 0650 y 0651
  (primer año del ciclo). Los módulos 0179, 0652, 0653, 0654, 0655, 0656, 0657, 0658 y 0660
  quedan como [PENDIENTE] porque el HTML del BOE se trunca antes de su contenido; consultar el PDF
  oficial en BOE-A-2011-19533. Nota: el RD fue modificado por RD 500/2024 (BOE-A-2024-10685);
  conviene verificar si afecta a los módulos. Ver TAREA-044.

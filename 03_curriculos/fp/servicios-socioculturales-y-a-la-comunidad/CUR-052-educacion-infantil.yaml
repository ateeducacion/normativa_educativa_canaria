resumen_ia: Ciclo formativo de Grado Superior de Técnico en Educación Infantil, establecido por el RD 1394/2007 (LOE) y modificado
  por RD 498/2024. Total de 13 módulos profesionales con 1100 horas de enseñanzas mínimas (el ciclo completo es de 2000 horas).
  Los módulos desarrollan competencias para la atención y educación de niños de 0 a 6 años en centros formales y no formales.
  Extraídos 71 resultados de aprendizaje y 619 criterios de evaluación del Anexo I del RD. Este resumen no sustituye la fuente
  oficial.
observaciones: Extracción completada el 2026-04-26 (TAREA-041). Se extrajeron los 13 módulos profesionales del Anexo I del
  RD 1394/2007, con 71 resultados de aprendizaje y 619 criterios de evaluación. El RD 1394/2007 fue modificado por RD 498/2024
  (puede haber actualizaciones en módulos). Las horas indicadas corresponden a las enseñanzas mínimas estatales; Canarias
  puede ampliarlas. La extracción del texto se realizó desde el PDF del BOE con decodificación CID (97,6% de fidelidad).

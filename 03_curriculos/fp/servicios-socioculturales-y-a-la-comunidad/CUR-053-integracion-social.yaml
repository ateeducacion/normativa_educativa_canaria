    base del título original (RD 1075/2012) y su currículo en Canarias. Extracción completa pendiente.'
relaciones:
  desarrolla_a:
  - NOR-058
  relacionada_con:
  - NOR-007
  - CUR-052
resumen_ia: 'Ciclo formativo de Grado Superior de Técnico en Integración Social, actualizado por RD 289/2023 (bajo LOFP/LOE)
  que modifica 7 módulos del título anterior (RD 1075/2012). Total 2000 horas. Extraídos los 7 módulos actualizados: Contexto
  de la intervención social (70h), Inserción sociolaboral (115h), Atención a las unidades de convivencia (80h), Mediación
  comunitaria (80h), Apoyo a la intervención educativa (65h), Sistemas aumentativos y alternativos de comunicación (80h),
  Habilidades sociales (60h). Total 34 RAs y 249 CEs extraídos. Los módulos comunes (FOL, EIE, FCT, Proyecto) están pendientes.
  Este resumen no sustituye la fuente oficial.'
observaciones: Extracción parcial completada el 2026-04-26 (TAREA-041). Se extrajeron los 7 módulos actualizados por RD 289/2023,
  con 34 resultados de aprendizaje y 249 criterios de evaluación. El anterior RD 1075/2012 quedó parcialmente modificado;
  el ciclo completo incluye módulos adicionales (FOL, EIE, FCT, Proyecto de Integración Social, Primeros Auxilios) que están
  pendientes de extracción desde el RD 1075/2012 o el currículo canario. RD 289/2023 también modifica el título de Mediación
  Comunicativa (no incluido aquí).

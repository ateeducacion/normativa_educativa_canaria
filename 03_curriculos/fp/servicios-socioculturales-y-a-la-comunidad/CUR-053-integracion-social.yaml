      - g) Se ha comprobado el uso correcto de aquellos sistemas en los que sea precisa la participación de terceras personas.
      - h) Se ha fomentado la implicación del entorno del alumno en el conocimiento y uso del sistema sin ayuda.
    - numero: 5

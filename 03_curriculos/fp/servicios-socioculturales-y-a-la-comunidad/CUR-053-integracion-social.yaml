  modulos_comunes_base:
  - codigo: '0020'
    nombre: Primeros auxilios
    horas_totales: 35
    ects: 3
    fuente: NOR-060
    fecha_consulta: '2026-04-26'
    url_fuente: https://www.boe.es/diario_boe/txt.php?id=BOE-A-2012-10866
    resultados_aprendizaje:
    - numero: 1
      enunciado: Realiza la valoración inicial de la asistencia en una urgencia, describiendo riesgos, recursos disponibles
        y tipo de ayuda necesaria.
      criterios_evaluacion:
      - a) Se ha asegurado la zona según el procedimiento oportuno.
      - b) Se han identificado las técnicas de autoprotección en la manipulación de personas accidentadas.
      - c) Se ha descrito el contenido mínimo de un botiquín de urgencias y las indicaciones de los productos y medicamentos.
      - d) Se han establecido las prioridades de actuación en múltiples víctimas.
      - e) Se han descrito los procedimientos para verificar la permeabilidad de las vías aéreas.
      - f) Se han identificado las condiciones de funcionamiento adecuadas de la ventilación-oxigenación.
      - g) Se han descrito y ejecutado los procedimientos de actuación en caso de hemorragias.
      - h) Se han descrito procedimientos para comprobar el nivel de consciencia.
      - i) Se han tomado las constantes vitales.
      - j) Se ha identificado la secuencia de actuación según protocolo establecido por el ILCOR (Comité de Coordinación
        Internacional sobre la Resucitación).
    - numero: 2
      enunciado: Aplica técnicas de soporte vital básico, describiéndolas y relacionándolas con el objetivo que se quiere
        conseguir.
      criterios_evaluacion:
      - a) Se han descrito los fundamentos de la resucitación cardio-pulmonar.
      - b) Se han aplicado técnicas de apertura de la vía aérea.
      - c) Se han aplicado técnicas de soporte ventilatorio y circulatorio.
      - d) Se ha realizado desfibrilación externa semiautomática (DEA).
      - e) Se han aplicado medidas post-reanimación.
      - f) Se han indicado las lesiones, patologías o traumatismos más frecuentes.
      - g) Se ha descrito la valoración primaria y secundaria del accidentado.
      - h) Se han aplicado primeros auxilios ante lesiones por agentes físicos, químicos y biológicos.
      - i) Se han aplicado primeros auxilios ante patologías orgánicas de urgencia.
      - j) Se han especificado casos o circunstancias en los que no se debe intervenir.
    - numero: 3
      enunciado: Aplica procedimientos de inmovilización y movilización de víctimas, seleccionando los medios materiales
        y las técnicas.
      criterios_evaluacion:
      - a) Se han efectuado las maniobras necesarias para acceder a la víctima.
      - b) Se han identificado los medios materiales de inmovilización y movilización.
      - c) Se han caracterizado las medidas posturales ante un lesionado.
      - d) Se han descrito las repercusiones de una movilización y traslado inadecuados.
      - e) Se han confeccionado sistemas para la inmovilización y movilización de enfermos/accidentados con materiales
        convencionales e inespecíficos o medios de fortuna.
      - f) Se han aplicado normas y protocolos de seguridad y de autoprotección personal.
    - numero: 4
      enunciado: Aplica técnicas de apoyo psicológico y de autocontrol al accidentado y acompañantes, describiendo y aplicando
        las estrategias de comunicación adecuadas.
      criterios_evaluacion:
      - a) Se han descrito las estrategias básicas de comunicación con el accidentado y sus acompañantes.
      - b) Se han detectado las necesidades psicológicas del accidentado.
      - c) Se han aplicado técnicas básicas de soporte psicológico para mejorar el estado emocional del accidentado.
      - d) Se ha valorado la importancia de infundir confianza y optimismo al accidentado durante toda la actuación.
      - e) Se han identificado los factores que predisponen a la ansiedad en las situaciones de accidente, emergencia y duelo.
      - f) Se han especificado las técnicas a emplear para controlar una situación de duelo, ansiedad y angustia o agresividad.
      - g) Se han especificado las técnicas a emplear para superar psicológicamente el fracaso en la prestación del auxilio.
      - h) Se ha valorado la importancia de autocontrolarse ante situaciones de estrés.
  - codigo: '0345'
    nombre: Proyecto de integración social
    horas_totales: 25
    ects: 5
    fuente: NOR-060
    fecha_consulta: '2026-04-26'
    url_fuente: https://www.boe.es/diario_boe/txt.php?id=BOE-A-2012-10866
    resultados_aprendizaje:
    - numero: 1
      enunciado: Identifica necesidades del sector productivo, relacionándolas con proyectos tipo que las puedan satisfacer.
      criterios_evaluacion:
      - a) Se han clasificado las empresas del sector por sus características organizativas y el tipo de producto o servicio
        que ofrecen.
      - b) Se han caracterizado las empresas tipo, indicando la estructura organizativa y las funciones de cada departamento.
      - c) Se han identificado las necesidades más demandadas a las empresas.
      - d) Se han valorado las oportunidades de negocio previsibles en el sector.
      - e) Se ha identificado el tipo de proyecto requerido para dar respuesta a las demandas previstas.
      - f) Se han determinado las características específicas requeridas en el proyecto.
      - g) Se han determinado las obligaciones fiscales, laborales y de prevención de riesgos, y sus condiciones de aplicación.
      - h) Se han identificado posibles ayudas o subvenciones para la incorporación de las nuevas tecnologías de producción
        o de servicio que se proponen.
      - i) Se ha elaborado el guión de trabajo que se va a seguir para la elaboración del proyecto.
    - numero: 2
      enunciado: Diseña proyectos relacionados con las competencias expresadas en el título, incluyendo y desarrollando
        las fases que lo componen.
      criterios_evaluacion:
      - a) Se ha recopilado información relativa a los aspectos que van a ser tratados en el proyecto.
      - b) Se ha realizado el estudio de viabilidad técnica del mismo.
      - c) Se han identificado las fases o partes que componen el proyecto y su contenido.
      - d) Se han establecido los objetivos que se pretenden conseguir, identificando su alcance.
      - e) Se han previsto los recursos materiales y personales necesarios para realizarlo.
      - f) Se ha realizado el presupuesto económico correspondiente.
      - g) Se han identificado las necesidades de financiación para la puesta en marcha del mismo.
      - h) Se ha definido y elaborado la documentación necesaria para su diseño.
      - i) Se han identificado los aspectos que se deben controlar para garantizar la calidad del proyecto.
    - numero: 3
      enunciado: Planifica la ejecución del proyecto, determinando el plan de intervención y la documentación asociada.
      criterios_evaluacion:
      - a) Se han secuenciado las actividades ordenándolas en función de las necesidades de desarrollo.
      - b) Se han determinado los recursos y la logística necesaria para cada actividad.
      - c) Se han identificado las necesidades de permisos y autorizaciones para llevar a cabo las actividades.
      - d) Se han determinado los procedimientos de actuación o ejecución de las actividades.
      - e) Se han identificado los riesgos inherentes a la implementación definiendo el plan de prevención de riesgos y
        los medios y equipos necesarios.
      - f) Se ha planificado la asignación de recursos materiales y humanos y los tiempos de ejecución.
      - g) Se ha hecho la valoración económica que da respuesta a las condiciones de su puesta en marcha.
      - h) Se ha definido y elaborado la documentación necesaria para la ejecución.
    - numero: 4
      enunciado: Define los procedimientos para el seguimiento y control en la ejecución del proyecto, justificando la
        selección de variables e instrumentos empleados.
      criterios_evaluacion:
      - a) Se ha definido el procedimiento de evaluación de las actividades o intervenciones.
      - b) Se han definido los indicadores de calidad para realizar la evaluación.
      - c) Se ha definido el procedimiento para la evaluación de las incidencias que puedan presentarse durante la realización
        de las actividades, su posible solución y registro.
      - d) Se ha definido el procedimiento para gestionar los posibles cambios en los recursos y en las actividades,
        incluyendo el sistema de registro de los mismos.
      - e) Se ha definido y elaborado la documentación necesaria para la evaluación de las actividades y del proyecto.
      - f) Se ha establecido el procedimiento para la participación de los usuarios o clientes en la evaluación y se han
        elaborado los documentos específicos.
      - g) Se ha establecido un sistema para garantizar el cumplimiento del pliego de condiciones del proyecto, cuando
        este existe.

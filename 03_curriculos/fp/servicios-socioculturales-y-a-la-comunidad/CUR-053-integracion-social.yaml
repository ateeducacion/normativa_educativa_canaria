      - d) Se han identificado los desajustes entre la persona usuaria y el sistema de comunicación establecido.
      - e) Se ha determinado el nivel de cumplimiento de los objetivos previstos.
      - f) Se ha valorado la importancia de realizar registros comunicativos como medio de evaluación de la competencia comunicativa
        de la persona usuaria.
      - g) Se han analizado las principales informaciones y orientaciones ofrecidas a los cuidadores y cuidadoras, favoreciendo
        la generalización de conductas comunicativas establecidas.
  - codigo: '0017'

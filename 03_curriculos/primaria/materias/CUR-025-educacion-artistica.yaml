id: CUR-025
titulo: "Educación Artística — Primaria Canarias"
etapa: "primaria"
materia: "Educación Artística"
norma_base: NOR-043
fuente: FTE-046
competencias_especificas:
  - id: C1
    descripcion: "Recepción y Análisis: Descubrir y apreciar propuestas artísticas de diferentes géneros, estilos y culturas a través de la recepción activa."
  - id: C2
    descripcion: "Búsqueda y Patrimonio: Investigar sobre manifestaciones culturales y artísticas del patrimonio, analizando sus elementos y contextos."
  - id: C3
    descripcion: "Creación e Interpretación: Expresar ideas, sentimientos y emociones a través de diversos lenguajes y medios artísticos."
  - id: C4
    descripcion: "Participación y Colaboración: Diseñar y realizar producciones artísticas de forma cooperativa, asumiendo diferentes funciones y respetando la diversidad."
bloques_saberes:
  - id: recepcion-analisis
    nombre: "I. Recepción y análisis"
    descripcion: "Estrategias de escucha y observación activa, vocabulario específico y recursos digitales."
  - id: creacion-interpretacion
    nombre: "II. Creación e interpretación"
    descripcion: "Fases del proceso creativo, planificación y experimentación con lenguajes artísticos."
  - id: artes-plasticas
    nombre: "III. Artes plásticas, visuales y audiovisuales"
    descripcion: "Cultura visual, elementos configurativos, materiales, técnicas y herramientas digitales de edición."
  - id: musica-artes-escenicas
    nombre: "IV. Música y artes escénicas y performativas"
    descripcion: "Cualidades del sonido, la voz, instrumentos, lenguajes musicales y expresión corporal."
criterios_evaluacion:
  - ciclo: 1
    criterios:
      - id: 1.1
        texto: "Descubrir propuestas artísticas de diferentes géneros, estilos, épocas y culturas, a través de la recepción activa y mostrando curiosidad y respeto por las mismas."
      - id: 3.1
        texto: "Producir obras propias de manera guiada, utilizando algunas de las posibilidades expresivas del cuerpo, el sonido, la imagen y los medios digitales básicos."
  - ciclo: 2
    criterios:
      - id: 2.2
        texto: "Distinguir elementos característicos básicos de manifestaciones culturales y artísticas que forman parte del patrimonio, analizando sus diferencias y similitudes."
      - id: 3.2
        texto: "Expresar con creatividad ideas, sentimientos y emociones a través de diversas manifestaciones artísticas, utilizando los diferentes lenguajes e instrumentos a su alcance."
  - ciclo: 3
    criterios:
      - id: 4.1
        texto: "Planificar y diseñar producciones culturales y artísticas, trabajando de forma cooperativa en la consecución de un resultado final planificado."
      - id: 4.3
        texto: "Compartir los proyectos creativos, empleando diferentes estrategias comunicativas y a través de diversos medios, explicando el proceso y el resultado final obtenido."
observaciones: "Extracción literal completada el 2026-04-26 tras consulta al BOC (Decreto 211/2022). Integra Plástica, Música y Artes Escénicas."

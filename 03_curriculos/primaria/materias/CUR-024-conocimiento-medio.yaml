id: CUR-024
titulo: "Conocimiento del Medio Natural, Social y Cultural — Primaria Canarias"
etapa: "primaria"
materia: "Conocimiento del Medio Natural, Social y Cultural"
norma_base: NOR-043
fuente: FTE-046
competencias_especificas:
  - id: C1
    descripcion: "Educación Digital: Utilizar dispositivos y recursos digitales de forma segura, responsable y eficiente para buscar información, comunicarse y crear contenidos sencillos."
  - id: C2
    descripcion: "Pensamiento Científico: Plantear y responder a cuestiones científicas sencillas mediante la observación y la experimentación, fomentando la curiosidad y el conocimiento de la ciencia en Canarias."
  - id: C3
    descripcion: "Proyectos de Diseño y Pensamiento Computacional: Resolver problemas del entorno mediante proyectos cooperativos, utilizando prototipos y herramientas tecnológicas para generar soluciones creativas."
  - id: C4
    descripcion: "Conciencia Corporal y Salud: Conocer y aceptar el propio cuerpo, desarrollar hábitos de vida saludables (alimentación, ejercicio, descanso) y gestionar las emociones para el bienestar personal."
  - id: C5
    descripcion: "Patrimonio Natural y Cultural: Identificar y valorar los elementos de los sistemas naturales y sociales, promoviendo la conservación del patrimonio histórico, cultural y natural, especialmente el de las Islas Canarias."
  - id: C6
    descripcion: "Conciencia Ecosocial: Analizar críticamente la intervención humana en el medio, promoviendo el consumo responsable, la sostenibilidad y la protección de la biodiversidad frente al cambio climático."
  - id: C7
    descripcion: "Tiempo Histórico y Continuidad: Comprender los cambios y continuidades de la sociedad a lo largo del tiempo, identificando hechos históricos relevantes y el papel de hombres y mujeres en la historia de Canarias y del mundo."
  - id: C8
    descripcion: "Diversidad e Igualdad: Valorar la diversidad cultural y la igualdad de género como rasgos enriquecedor de la sociedad, rechazando estereotipos y prejuicios para fomentar la convivencia."
  - id: C9
    descripcion: "Ciudadanía y Valores Democráticos: Participar de forma activa y constructiva en la vida social, respetando los derechos humanos, los valores democráticos y utilizando el diálogo para la resolución pacífica de conflictos."
bloques_saberes:
  - id: cultura-cientifica
    nombre: "I. Cultura científica"
    descripcion: "Iniciación en la actividad científica; La vida en nuestro planeta (seres vivos de Canarias); Materia, fuerzas y energía."
  - id: tecnologia-digitalizacion
    nombre: "II. Tecnología y digitalización"
    descripcion: "Digitalización del entorno personal de aprendizaje; Proyectos de diseño y pensamiento computacional."
  - id: sociedades-territorios
    nombre: "III. Sociedades y territorios"
    descripcion: "Retos del mundo actual; Sociedades en el tiempo (historia local); Alfabetización cívica; Conciencia ecosocial."
criterios_evaluacion:
  - ciclo: 1
    criterios:
      - id: 1.1
        texto: "Utilizar recursos digitales de forma segura y guiada para buscar información y comunicarse."
      - id: 1.2
        texto: "Crear contenidos digitales sencillos para expresar ideas y conocimientos."
      - id: 2.1
        texto: "Mostrar curiosidad por el entorno cercano y comprender textos sencillos."
      - id: 2.2
        texto: "Buscar información fiable sobre el entorno canario con ayuda de diferentes fuentes."
      - id: 5.1
        texto: "Reconocer la biodiversidad del archipiélago canario y su importancia."
      - id: 7.1
        texto: "Ordenar hechos históricos relevantes del entorno cercano y de Canarias."
  - ciclo: 2
    criterios:
      - id: 2.1
        texto: "Formular preguntas y realizar predicciones razonadas sobre el medio natural y social."
      - id: 5.3
        texto: "Valorar y proteger el patrimonio natural y cultural de Canarias como bien común."
      - id: 7.1
        texto: "Situar hechos históricos de Canarias desde la Prehistoria hasta la Edad Antigua."
      - id: 9.2
        texto: "Conocer la organización y funciones de las instituciones canarias."
  - ciclo: 3
    criterios:
      - id: 5.1
        texto: "Analizar la biodiversidad global y los ecosistemas, con énfasis en el archipiélago."
      - id: 7.1
        texto: "Analizar hechos históricos desde la Edad Media hasta la actualidad en Canarias y el mundo."
      - id: 9.2
        texto: "Comprender el funcionamiento de las instituciones españolas y europeas."
observaciones: "Extracción literal completada el 2026-04-26 tras consulta al BOC (Decreto 211/2022). Fuerte énfasis en educación patrimonial y sostenibilidad (Agenda Canaria 2030)."

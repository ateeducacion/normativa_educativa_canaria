id: CUR-027
titulo: "Lengua Castellana y Literatura — Primaria Canarias"
etapa: "primaria"
materia: "Lengua Castellana y Literatura"
norma_base: NOR-043
fuente: FTE-046
competencias_especificas:
  - id: C1
    descripcion: "Reconocer la diversidad lingüística del mundo y de España para rechazar estereotipos y valorar la riqueza cultural."
  - id: C2
    descripcion: "Comprender e interpretar textos orales y multimodales identificando el sentido general y la información relevante."
  - id: C3
    descripcion: "Producir textos orales y multimodales con coherencia, claridad y registro adecuado para expresar ideas y sentimientos."
  - id: C4
    descripcion: "Comprender e interpretar textos escritos y multimodales para construir conocimiento y responder a necesidades comunicativas."
  - id: C5
    descripcion: "Producir textos escritos y multimodales coherentes y cohesionados, utilizando estrategias de planificación, redacción y revisión."
  - id: C6
    descripcion: "Buscar, seleccionar y gestionar información de diferentes fuentes para realizar investigaciones y crear contenidos."
  - id: C7
    descripcion: "Leer de manera autónoma obras diversas para desarrollar el gusto por la lectura y la identidad como lector."
  - id: C8
    descripcion: "Producir textos con intención literaria a partir de modelos dados para explorar las posibilidades expresivas de la lengua."
  - id: C9
    descripcion: "Reflexionar sobre el funcionamiento de la lengua para mejorar la comprensión y producción de textos."
  - id: C10
    descripcion: "Utilizar el lenguaje de forma ética y democrática para resolver conflictos y fomentar la convivencia."
bloques_saberes:
  - id: lenguas-hablantes
    nombre: "I. Las lenguas y sus hablantes"
    descripcion: "Biografía lingüística, diversidad lingüística y cultural (con especial atención al español de Canarias)."
  - id: comunicacion
    nombre: "II. Comunicación"
    descripcion: "Contexto, géneros discursivos, procesos (comprensión, expresión, interacción y mediación) y alfabetización informacional."
  - id: educacion-literaria
    nombre: "III. Educación literaria"
    descripcion: "Lectura acompañada y autónoma, textos literarios y expresión creativa."
  - id: reflexion-lengua
    nombre: "IV. Reflexión sobre la lengua y sus usos"
    descripcion: "Metalenguaje, normas gramaticales y ortográficas, y corrección lingüística."
criterios_evaluacion:
  - ciclo: 1
    criterios:
      - id: 1.1
        texto: "Reconocer lenguas distintas de la propia y algunas palabras de las mismas, identificando la diversidad lingüística del aula y del entorno."
      - id: 2.1
        texto: "Comprender el sentido global y la información relevante de textos orales y multimodales sencillos, identificando la idea principal."
      - id: 3.1
        texto: "Producir textos orales y multimodales sencillos, con una pronunciación y entonación adecuadas, utilizando recursos no verbales básicos."
      - id: 4.1
        texto: "Leer de manera acompañada textos sencillos, identificando la información relevante y el sentido global."
      - id: 5.1
        texto: "Redactar textos escritos y multimodales sencillos, con diferentes propósitos, iniciándose en el uso de las normas ortográficas básicas."
      - id: 6.1
        texto: "Localizar información en fuentes documentales sencillas, con ayuda del docente, para realizar tareas de aprendizaje."
      - id: 7.1
        texto: "Leer textos literarios adecuados a su edad, de manera acompañada, mostrando interés por la lectura."
      - id: 8.1
        texto: "Producir textos sencillos con intención literaria, a partir de modelos dados, utilizando recursos expresivos básicos."
      - id: 9.1
        texto: "Iniciarse en la reflexión sobre el lenguaje, identificando unidades lingüísticas básicas (palabra, frase) y algunas normas ortográficas."
      - id: 10.1
        texto: "Utilizar un lenguaje no discriminatorio y respetuoso en las interacciones comunicativas habituales."
  - ciclo: 2
    criterios:
      - id: 1.1
        texto: "Mostrar interés y respeto por las lenguas del entorno, identificando prejuicios lingüísticos habituales."
      - id: 2.1
        texto: "Comprender textos orales y multimodales, identificando las ideas principales y secundarias, y valorando el contenido."
      - id: 3.1
        texto: "Expresar oralmente ideas y sentimientos de forma clara y ordenada, ajustando el registro a la situación comunicativa."
      - id: 4.1
        texto: "Leer con fluidez y comprensión textos de diversa tipología, utilizando estrategias de comprensión lectora."
      - id: 5.1
        texto: "Escribir textos de cierta extensión, organizando las ideas con coherencia y aplicando las normas gramaticales y ortográficas."
      - id: 6.1
        texto: "Buscar y seleccionar información en diferentes soportes, analizando la fiabilidad de las fuentes de manera guiada."
      - id: 7.1
        texto: "Leer y compartir la interpretación de obras literarias, reconociendo algunos recursos estilísticos sencillos."
      - id: 8.1
        texto: "Crear textos literarios originales, explorando las posibilidades expresivas de la lengua."
      - id: 9.1
        texto: "Revisar y mejorar los propios textos, utilizando terminología lingüística básica para explicar los cambios realizados."
      - id: 10.1
        texto: "Participar en situaciones de comunicación respetando las normas del intercambio verbal y utilizando un lenguaje inclusivo."
  - ciclo: 3
    criterios:
      - id: 1.1
        texto: "Valorar la diversidad lingüística de España y del mundo como una riqueza cultural, rechazando estereotipos y prejuicios."
      - id: 2.1
        texto: "Analizar y comprender textos orales y multimodales complejos, extrayendo conclusiones y valorando críticamente la información."
      - id: 3.1
        texto: "Realizar exposiciones orales bien estructuradas sobre temas de interés, utilizando recursos audiovisuales y digitales."
      - id: 4.1
        texto: "Leer de forma autónoma y crítica textos variados, integrando la información para construir conocimiento."
      - id: 5.1
        texto: "Producir textos escritos y multimodales coherentes y cohesionados, ajustados a las convenciones del género discursivo."
      - id: 6.1
        texto: "Elaborar trabajos de investigación sencillos, citando las fuentes y utilizando herramientas digitales de forma ética."
      - id: 7.1
        texto: "Desarrollar un itinerario lector propio, analizando los temas y la estructura de las obras literarias leídas."
      - id: 8.1
        texto: "Transformar textos literarios y crear obras propias, demostrando creatividad y dominio de los recursos lingüísticos."
      - id: 9.1
        texto: "Explicar el funcionamiento de la lengua y sus normas, utilizando el metalenguaje adecuado para mejorar la comunicación."
      - id: 10.1
        texto: "Resolver conflictos de forma dialogada y utilizar la lengua como instrumento de convivencia y respeto a los derechos humanos."
observaciones: "Extracción literal completada el 2026-04-26 tras consulta al BOC (Decreto 211/2022). Particular atención al español hablado en Canarias."

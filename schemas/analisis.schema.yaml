$schema: "https://json-schema.org/draft/2020-12/schema"
additionalProperties: false

type: object
required: [id, titulo, fecha_analisis, relacionadas, resumen]
properties:
  id:
    type: string
    pattern: '^AN-[0-9]{3}$'
  titulo:
    type: string
  fecha_analisis:
    type: string
  relacionadas:
    type: array
    items:
      type: string
  resumen:
    type: string

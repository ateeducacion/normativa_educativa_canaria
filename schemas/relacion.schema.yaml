$schema: "https://json-schema.org/draft/2020-12/schema"
additionalProperties: false

type: object
required: [id, tipo_relacion, origen, destino, descripcion, evidencia, fecha_registro, nivel_evidencia, observaciones]
properties:
  id:
    type: string
    pattern: '^REL-[0-9]{3}$'
  tipo_relacion:
    type: string
    enum: [modifica, desarrolla, deroga, corrige, complementa, sustituye, aplica, interpreta, relaciona]
  origen:
    type: string
  destino:
    type: string
  descripcion:
    type: string
  evidencia:
    type: object
    additionalProperties: false
    required: [fuente, localizacion]
    properties:
      fuente:
        type: string
        pattern: '^FTE-[0-9]{3}$'
      localizacion:
        type: string
  fecha_registro:
    type: string
  nivel_evidencia:
    type: string
    enum: [confirmado-fuente-primaria, confirmado-fuente-secundaria-oficial, inferido, hipotesis, opinion-experta]
  observaciones:
    type: [string, 'null']

titulo: "Atención a la diversidad en Canarias (Decreto 25/2018)"
contenido: |
  El Decreto 25/2018 regula la atención a la diversidad en Canarias bajo un enfoque inclusivo. 
  Puntos clave:
  1. Clasifica medidas en: ordinarias, extraordinarias y excepcionales.
  2. Obliga a los centros a disponer de un Plan de Atención a la Diversidad integrado en su proyecto educativo.
  3. Establece el marco para la identificación del alumnado con Necesidades Específicas de Apoyo Educativo (NEAE) y Necesidades Educativas Especiales (NEE).
  4. Define modalidades de escolarización: centros ordinarios, centros de atención educativa preferente, aulas enclave y centros de educación especial.
fuente: FTE-027
localizacion: Decreto 25/2018 (BOC 2018/046), artículos 1, 4 y 7.

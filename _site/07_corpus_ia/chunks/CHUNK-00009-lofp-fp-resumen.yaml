titulo: "Sistema integrado de Formación Profesional (LOFP 3/2022)"
contenido: |
  La Ley Orgánica 3/2022 (LOFP) establece un nuevo sistema único e integrado de Formación Profesional en España.
  Características principales:
  1. Unifica la FP del sistema educativo y la FP para el empleo.
  2. Organiza la oferta en grados (A a E) de carácter progresivo y capitalizable.
  3. Generaliza el carácter dual de la formación, con estancia obligatoria en centros de trabajo.
  4. Crea un Catálogo Nacional de Ofertas de Formación Profesional.
  En Canarias, este marco se complementa con la Ley Canaria 6/2014 y desarrollos autonómicos específicos.

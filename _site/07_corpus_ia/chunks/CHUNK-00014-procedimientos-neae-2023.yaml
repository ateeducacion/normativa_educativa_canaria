tipo: resumen-ejecutivo
titulo: "Procedimientos de Atención a la Diversidad y NEAE (Canarias 2023)"
contenido: |
  La Orden de 29 de mayo de 2023 es la norma operativa vigente para la respuesta al alumnado con NEAE.
  Claves operativas:
  1. Evaluación Psicopedagógica: Regula el papel de los EOEP y los plazos para informes.
  2. Dictamen de Escolarización: Define el proceso para asignar modalidades (ordinaria, aulas enclave, CEE).
  3. Plan de Trabajo Individualizado (PTI): Obligatoriedad de este documento para concretar las medidas y adaptaciones.
  4. Recursos: Procedimiento para la asignación de profesorado de PT, AL y auxiliares educativos.
fuente: FTE-053
localizacion: Orden de 29 de mayo de 2023 (BOC 2023/105).
fecha_registro: 2026-04-26

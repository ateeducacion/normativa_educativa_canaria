tipo: transversal
titulo: "Identidad lingüística canaria en el currículo (Infantil a Bachillerato)"
contenido: |
  El currículo de Canarias obliga a integrar la modalidad lingüística canaria en el área de Lengua.
  Puntos fundamentales:
  1. Respeto y Valoración: Reconocer el español de Canarias como una variedad rica y digna.
  2. Rasgos Propios: Estudio y uso del seseo, léxico canario y la forma pronominal "ustedes".
  3. Literatura: Inclusión de autores y autoras de las islas en los itinerarios lectores.
  4. Contexto: Aplicación de estos rasgos en situaciones de comunicación reales y producciones propias.
fuente: NOR-005, NOR-043, NOR-047
localizacion: Anexos de currículo de todas las etapas.

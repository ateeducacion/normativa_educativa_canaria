tipo: resumen-ejecutivo
titulo: "Resumen del Currículo de Educación Primaria (Canarias)"
contenido: |
  El Decreto 211/2022 establece el currículo LOMLOE para Primaria (6-12 años) en Canarias.
  Puntos fundamentales:
  1. Estructura: 3 ciclos de dos años. Promoción preferente (la repetición es excepcional y solo al final de ciclo).
  2. Áreas: 10 áreas, incluyendo la específica "Educación Emocional y para la Creatividad".
  3. Enfoque: Basado en Perfil de Salida, Competencias Específicas y Situaciones de Aprendizaje.
  4. Identidad: Integración obligatoria de contenidos canarios en todas las áreas.
fuente: FTE-046
localizacion: Decreto 211/2022 (BOC 2022/231).
fecha_registro: 2026-04-26
<aviso>: "La evaluación es global y continua, basándose en rúbricas oficiales (NOR-045)."

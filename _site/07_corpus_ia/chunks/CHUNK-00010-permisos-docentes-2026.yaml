tipo: resumen-ejecutivo
titulo: "Permisos y Licencias Personal Docente 2026 (Canarias)"
contenido: |
  La Resolución de 24 de febrero de 2026 actualiza el régimen de permisos del profesorado en Canarias.
  Novedades principales:
  1. Permiso Parental: Hasta 8 semanas (no retribuidas) para cuidado de hijos menores de 8 años.
  2. Enfermedad Familiar: Ampliación a 5 días por accidente o enfermedad grave de familiares de 1er grado o convivientes.
  3. Digitalización: Obligatoriedad de tramitación vía Portal Docente.
  4. Conciliación: Se adaptan los permisos al marco del RDL 5/2023.

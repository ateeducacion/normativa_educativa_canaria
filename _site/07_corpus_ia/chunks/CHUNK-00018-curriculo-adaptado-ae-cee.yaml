origen_id: NOR-028
tipo: resumen-ejecutivo
titulo: "Currículo adaptado para Aulas Enclave y CEE (Canarias)"
contenido: |
  La Orden de 10 de febrero de 2016 establece las concreciones curriculares para el alumnado con necesidades más severas.
  Puntos clave:
  1. Anexos por Etapa: Define objetivos y contenidos específicos para Infantil, Primaria y Tránsito a la Vida Adulta (ESO).
  2. Enfoque Funcional: Prioriza aprendizajes para la autonomía personal, integración social y habilidades laborales básicas.
  3. Referente de Evaluación: Estos anexos sustituyen al currículo ordinario para la calificación y el Plan de Trabajo Individualizado (PTI).
  4. Flexibilidad: Permite la máxima adaptación a las capacidades individuales del alumnado escolarizado en modalidades excepcionales.
fuente: FTE-031
localizacion: Orden de 10 de febrero de 2016 (BOC 2016/033).
fecha_registro: 2026-04-26
<aviso>: "Es la base legal para evaluar al alumnado fuera de la modalidad ordinaria."

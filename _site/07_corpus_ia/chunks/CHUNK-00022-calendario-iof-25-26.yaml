titulo: "Calendario Escolar y Organización (Canarias 2025-2026)"
contenido: |
  Resumen de las instrucciones de organización y funcionamiento (IOF) para el curso escolar vigente.
  Hitos del Calendario:
  1. Inicio de clases: 1 de septiembre de 2025 para Infantil y Primaria; 9 de septiembre para ESO, Bachillerato y FP.
  2. Finalización de clases: 19 de junio de 2026 (con ajustes para 2.º de Bachillerato y Ciclos Finales).
  3. Vacaciones: Navidad (20 dic - 7 ene), Semana Santa (30 mar - 3 abr).
  Aspectos Organizativos:
  - Sesiones de Evaluación: Tres sesiones trimestrales obligatorias.
  - Horarios: Regulación de la jornada continua y los recreos vigilados.
  - Coordinación: Funcionamiento de Equipos de Nivel y Departamentos.

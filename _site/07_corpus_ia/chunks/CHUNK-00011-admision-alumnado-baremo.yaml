tipo: resumen-ejecutivo
titulo: "Baremo y criterios de Admisión de Alumnado (Canarias)"
contenido: |
  El Decreto 9/2022 regula el acceso a plazas en centros públicos y concertados de Canarias.
  Criterios de baremación ante falta de plazas:
  1. Hermanos en el centro (prioridad máxima para conciliación).
  2. Proximidad al domicilio familiar o lugar de trabajo.
  3. Renta per cápita de la unidad familiar.
  4. Discapacidad del alumno/a, progenitores o hermanos.
  5. Otros: Familia numerosa, monoparental o acogimiento.
  Obliga a reservar plazas para alumnado NEAE en todos los grupos.

titulo: "Jerarquía normativa educativa en Canarias"
contenido: |
  La normativa educativa aplicable en Canarias se organiza en una pirámide de tres niveles:
  1. Marco Básico Estatal: LOE (texto consolidado tras LOMLOE) y Reales Decretos de enseñanzas mínimas (ej. RD 217/2022).
  2. Marco Autonómico General: Ley 6/2014 Canaria de Educación no Universitaria.
  3. Desarrollo Reglamentario Canario: Decretos de currículo (ej. Decreto 30/2023), órdenes de evaluación y resoluciones de instrucciones anuales.
  La normativa autonómica desarrolla y concreta las bases estatales adaptándolas al contexto de Canarias.

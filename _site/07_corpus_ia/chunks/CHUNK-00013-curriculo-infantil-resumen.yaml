origen_id: NOR-047
tipo: resumen-ejecutivo
titulo: "Resumen del Currículo de Educación Infantil (Canarias)"
contenido: |
  El Decreto 196/2022 unifica la ordenación de los dos ciclos de Infantil (0-3 y 3-6 años) en Canarias.
  Claves del área:
  1. Áreas: Crecimiento en Armonía, Descubrimiento del Entorno y Comunicación y Representación.
  2. Evaluación: Basada en la observación directa y sistemática, carácter informativo y cualitativo.
  3. Promoción: Automática entre cursos y ciclos.
  4. Metodología: Fomento de la curiosidad, el juego y la integración afectiva desde el nacimiento.
fuente: FTE-050
localizacion: Decreto 196/2022 (BOC 2022/212).
fecha_registro: 2026-04-26
<aviso>: "Es la primera vez que ambos ciclos se integran en una única disposición curricular en Canarias."

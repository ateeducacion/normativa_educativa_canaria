fecha_consulta: 2026-04-26
fecha_analisis: 2026-04-26
estado_extraccion: "completado"
estado_vigencia: "Vigente"
elementos:
  competencias_especificas:
    - codigo: "C1"
      enunciado_resumido: "Analizar las relaciones de interdependencia entre los agentes económicos y reconocer el papel del Estado para reflexionar sobre el bienestar individual y colectivo."
      enunciado_oficial: "Analizar las relaciones de interdependencia entre los agentes económicos en el desarrollo de las distintas actividades económicas y los desequilibrios económicos que el mercado genera, reconociendo la importancia del papel del Estado en la economía y en el mantenimiento del Estado del Bienestar para reflexionar sobre la contribución personal y social al bienestar individual y colectivo."
      descriptores: [CCL1, CCL3, STEM4, CD1, CD2, CD3, CC1, CC2, CC4]
    - codigo: "C2"
      enunciado_resumido: "Diseñar y elaborar pequeños proyectos de finanzas personales gestionando ingresos, gastos y decisiones de ahorro, inversión y financiación."
      enunciado_oficial: "Diseñar y elaborar pequeños proyectos de finanzas personales, gestionando de forma eficaz los ingresos y gastos previstos y reflexionando sobre las decisiones de ahorro, inversión y financiación para mantener unas finanzas personales equilibradas en una realidad económica en continuo cambio que le permitan afrontar futuros retos personales en distintas situaciones vitales."
      descriptores: [CCL1, CCL2, STEM1, STEM3, CD2, CD3, CPSAA5, CC1, CE2]
    - codigo: "C3"
      enunciado_resumido: "Identificar patrones de consumo responsable analizando los beneficios personales y las consecuencias para la sociedad, el medioambiente y las relaciones laborales."
      enunciado_oficial: "Identificar patrones de consumo responsable, analizando los beneficios personales y las consecuencias que tiene para la sociedad, el medioambiente y las relaciones laborales, proponiendo medidas sostenibles y reconociendo los retos actuales a los que se enfrenta la transición ecológica para poner en valor la importancia de una ciudadanía responsable y preocupada por sus actos."
      descriptores: [CCL3, STEM5, CD1, CPSAA2, CPSAA3, CC2, CC4, CE1, CE2]
  criterios_evaluacion:
    - curso: "3.º ESO"
      criterios:
        - codigo: "1.1"
          competencia: "C1"
          enunciado: "Explicar el papel de los agentes económicos en la economía, reconociendo sus necesidades de consumo e inversión y analizando los flujos de renta que generan las relaciones de intercambio en el mercado para comprender la interrelación de las decisiones económicas individuales y colectivas de la sociedad."
          descriptores: [CCL1, CCL3, STEM4, CD1, CD2, CD3, CC4]
        - codigo: "1.2"
          competencia: "C1"
          enunciado: "Reflexionar sobre la relevancia de los bienes y servicios públicos y la necesidad de corregir las desigualdades económicas en nuestra sociedad, valorando el papel de los impuestos en la financiación de los gastos públicos e identificando la singularidad del Régimen Económico y Fiscal (REF), para desarrollar una conciencia social, ética y ciudadana y contribuir a desarrollar una sociedad más responsable, justa y solidaria."
          descriptores: [CCL1, STEM4, CD2, CD3, CC1, CC2, CC4]
        - codigo: "1.3"
          competencia: "C1"
          enunciado: "Reconocer los efectos que el desempleo y las variaciones de los precios provocan en la economía y en la vida de las personas, explicando de forma sencilla las causas de los distintos tipos de desempleo e inflación para valorar cómo repercute el nivel de actividad económica en el bienestar personal y social."
          descriptores: [CCL1, CCL3, STEM4, CD1, CD2, CD3, CC1, CC2, CC4]
        - codigo: "2.1"
          competencia: "C2"
          enunciado: "Identificar el valor del dinero como medio de pago, distinguiendo las características y servicios asociados a las cuentas, tarjetas, depósitos bancarios y medios de pago digitales, valorando los respectivos derechos y obligaciones en las relaciones y contrataciones bancarias para ejercer una ciudadanía digital activa, cívica y reflexiva."
          descriptores: [CCL1, CD3, CC1]
        - codigo: "2.2"
          competencia: "C2"
          enunciado: "Diseñar diferentes presupuestos familiares, clasificando los ingresos y gastos previstos, diagnosticando de forma crítica las situaciones presupuestarias resultantes y gestionando con responsabilidad las necesidades financieras personales a corto y largo plazo para valorar la importancia de la planificación, del control del gasto y de las decisiones de ahorro en la vida cotidiana."
          descriptores: [CCL1, CCL2, STEM1, STEM3, CD2, CPSAA5, CE2]
        - codigo: "2.3"
          competencia: "C2"
          enunciado: "Gestionar e interpretar los diferentes soportes de las relaciones comerciales y laborales interpretando la información que transmiten los distintos elementos de la documentación laboral, de compraventa, de cobro y pago, para contribuir al desarrollo de una personalidad autónoma y a madurez social."
          descriptores: [CCL2, STEM1, CD2, CE2]
        - codigo: "3.1"
          competencia: "C3"
          enunciado: "Analizar la necesidad de la transición ecológica y sus principales retos, tanto en el entorno cercano como en el global, reconociendo el papel que las empresas, las familias y las instituciones públicas tienen en este proceso con el fin de valorar las repercusiones globales de los actos individuales y la importancia de desarrollar una economía comprometida y éticamente responsable."
          descriptores: [CCL3, CD1, CC2, CC4, CE1]
        - codigo: "3.2"
          competencia: "C3"
          enunciado: "Identificar de forma crítica el impacto de las pautas de consumo actuales, reconociendo la influencia de la publicidad en los actos de consumo, analizando las condiciones sociales, económicas y ecológicas en las que ha sido elaborado un producto o servicio y estudiando sus beneficios y consecuencias a nivel personal, social y medioambiental, para promover actitudes socialmente responsables en el entorno local y global."
          descriptores: [CCL3, CD1, CPSAA2, CC4]
        - codigo: "3.3"
          competencia: "C3"
          enunciado: "Proponer posibles soluciones a diferentes problemas vinculados al entorno cercano que impliquen actuaciones individuales o colectivas, analizando las acciones socialmente responsables que se están llevando a cabo en este para transformar y mejorar la sociedad."
          descriptores: [CCL3, STEM5, CD1, CPSAA2, CPSAA3, CC4, CE1, CE2]
  saberes_basicos:
    - bloque: "I. Introducción a la economía"
      curso: "3.º ESO"
      detalles: "Valoración de la Economía como ciencia social; relaciones económicas básicas; agentes económicos y sus funciones; modelo del Flujo Circular de la Renta; importancia de bienes y servicios públicos; gastos de las Administraciones públicas (estatal, autonómica y local); fuentes de ingresos del Estado y fiscalidad directa e indirecta; Régimen Económico y Fiscal (REF) y singularidades canarias por lejanía e insularidad; pilares del Estado del Bienestar; aproximación al desempleo y la inflación."
    - bloque: "II. Finanzas personales"
      curso: "3.º ESO"
      detalles: "Papel del dinero en la economía: funciones, formas y evolución; cuentas corrientes y tipología de tarjetas; derechos y obligaciones en las relaciones bancarias; análisis de riesgos y fraudes; gestión básica de finanzas personales; elaboración e interpretación de presupuestos sencillos; clasificación de gastos e ingresos de la economía familiar; análisis del ahorro y riesgos del endeudamiento; documentación básica de relaciones comerciales y laborales: facturas, cheques, recibos, contratos de trabajo y nóminas."
    - bloque: "III. Consumo responsable y sostenibilidad"
      curso: "3.º ESO"
      detalles: "Análisis de los retos de la transición ecológica en el entorno canario y global; reconocimiento de los Objetivos de Desarrollo Sostenible, el Pacto Verde Europeo y la Agenda Canaria 2030; análisis de la responsabilidad social corporativa (RSC) y políticas públicas; estudio de la economía circular como modelo de producción y consumo alternativo; identificación de patrones de consumo y análisis de beneficios y perjuicios individuales, sociales y medioambientales; reconocimiento de la influencia de la publicidad y consumismo frente a felicidad; condiciones sociales, económicas y ecológicas de los productos consumidos; desarrollo de soluciones sostenibles a problemas del entorno cercano."
  descriptores_operativos: [CCL1, CCL2, CCL3, STEM1, STEM3, STEM4, STEM5, CD1, CD2, CD3, CPSAA2, CPSAA3, CPSAA5, CC1, CC2, CC4, CE1, CE2]
  situaciones_aprendizaje: []
relaciones:
  desarrolla_a: [NOR-003]
  relacionada_con: [NOR-005, NOR-002]
resumen_ia: "Currículo de Economía Personal y Social en 3.º ESO Canarias, materia optativa regulada por el Decreto 30/2023, con tres competencias específicas y nueve criterios de evaluación distribuidos en tres bloques: introducción a la economía; finanzas personales; y consumo responsable y sostenibilidad. Incorpora el Régimen Económico y Fiscal (REF), la Agenda Canaria 2030, la insularidad, la lejanía y los Objetivos de Desarrollo Sostenible."
observaciones: "Extracción completada el 2026-04-26 a partir del PDF oficial publicado por la Consejería de Educación en su portal de currículos ESO (Decreto 30/2023). Se han incorporado los enunciados literales de competencias específicas, los 9 criterios de evaluación con sus descriptores operativos y la síntesis de los tres bloques de saberes básicos. Materia optativa de 3.º ESO según el artículo 23.5 del Decreto 30/2023."

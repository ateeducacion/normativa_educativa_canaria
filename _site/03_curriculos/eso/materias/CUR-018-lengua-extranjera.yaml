elementos:
  competencias_especificas:
    - codigo: "C1"
      enunciado_resumido: "Comprender e interpretar el sentido general y los detalles más relevantes de textos expresados de forma clara y en la lengua estándar, buscando fuentes fiables y haciendo uso de estrategias como la inferencia de significados."
      enunciado_oficial: "Comprender e interpretar el sentido general y los detalles más relevantes de textos expresados de forma clara y en la lengua estándar, buscando fuentes fiables y haciendo uso de estrategias como la inferencia de significados, para responder a necesidades comunicativas concretas."
      descriptores: ["CCL2", "CCL3", "CP1", "CP2", "STEM1", "CD1", "CPSAA4"]
    - codigo: "C2"
      enunciado_resumido: "Producir textos originales, de extensión media, sencillos y con una organización clara, usando estrategias de planificación, compensación o autorreparación."
      enunciado_oficial: "Producir textos originales, de extensión media, sencillos y con una organización clara, usando estrategias tales como la planificación, la compensación o la autorreparación, para expresar de forma creativa, adecuada y coherente, mensajes relevantes y responder a propósitos comunicativos concretos."
      descriptores: ["CCL1", "CP1", "CP2", "STEM1", "CD2", "CPSAA5", "CCEC3"]
    - codigo: "C3"
      enunciado_resumido: "Interactuar con otras personas con creciente autonomía, usando estrategias de cooperación y recursos analógicos y digitales."
      enunciado_oficial: "Interactuar con otras personas con creciente autonomía, usando estrategias de cooperación y empleando recursos analógicos y digitales, para responder a propósitos comunicativos concretos en intercambios respetuosos con las normas de cortesía."
      descriptores: ["CCL1", "CCL5", "CP1", "CP2", "STEM1", "CD3", "CPSAA3", "CC3"]
    - codigo: "C4"
      enunciado_resumido: "Mediar en situaciones cotidianas entre distintas lenguas, usando estrategias y conocimientos sencillos orientados a explicar conceptos o simplificar mensajes."
      enunciado_oficial: "Mediar en situaciones cotidianas entre distintas lenguas, usando estrategias y conocimientos sencillos orientados a explicar conceptos o simplificar mensajes, para transmitir información de manera eficaz, clara y responsable."
      descriptores: ["CCL5", "CP1", "CP2", "CP3", "CD2", "CPSAA1"]
    - codigo: "C5"
      enunciado_resumido: "Ampliar y usar los repertorios lingüísticos personales entre distintas lenguas, reflexionando de forma crítica sobre su funcionamiento."
      enunciado_oficial: "Ampliar y usar los repertorios lingüísticos personales entre distintas lenguas, reflexionando de forma crítica sobre su funcionamiento y tomando conciencia de las estrategias y conocimientos propios, para mejorar la respuesta a necesidades comunicativas concretas."
      descriptores: ["CP2", "STEM1", "CD2", "CPSAA1", "CPSAA4", "CPSAA5", "CE2"]
    - codigo: "C6"
      enunciado_resumido: "Valorar críticamente y adecuarse a la diversidad lingüística, cultural y artística a partir de la lengua extranjera."
      enunciado_oficial: "Valorar críticamente y adecuarse a la diversidad lingüística, cultural y artística a partir de la lengua extranjera, identificando y compartiendo las semejanzas y las diferencias entre lenguas y culturas, para actuar de forma empática y respetuosa en situaciones interculturales."
      descriptores: ["CCL5", "CP3", "CPSAA1", "CC2", "CC3", "CE1", "CCEC1"]
  criterios_evaluacion:
    - curso: "1.º ESO"
      criterios:
        - "1.1. Identificar información pertinente, interpretar el sentido global, las ideas principales y el contenido de textos orales breves y sencillos sobre temas frecuentes y cotidianos, de relevancia personal y próximos a su experiencia, expresados de forma clara y sencilla a través de diversos soportes, utilizando una o más lenguas, además de las familiares, con el fin de construir conocimiento y responder a necesidades comunicativas concretas."
        - "1.2. Identificar información pertinente, interpretar el sentido global, las ideas principales y el contenido de textos escritos, breves y sencillos sobre temas frecuentes y cotidianos, de relevancia personal y próximos a su experiencia, expresados de forma clara a través de diversos soportes, así como de textos literarios adaptados al nivel de madurez del alumnado, aplicando criterios de validez y utilizando una o más lenguas, además de las familiares, con el fin de construir conocimiento y responder a necesidades comunicativas concretas."
        - "1.3. Aplicar de manera guiada los conocimientos y las estrategias elementales más adecuadas en cada situación comunicativa, para comprender el sentido general, la información esencial y los detalles más relevantes de los textos, interpretar elementos no verbales, así como realizar búsquedas para seleccionar información y enriquecer su repertorio lingüístico individual."
        - "2.1. Expresar oralmente y de forma guiada textos breves, sencillos, estructurados, comprensibles y adecuados a la situación comunicativa que versen sobre asuntos cotidianos de relevancia e interés para el alumnado, en diferentes soportes, haciéndolo de forma creativa y mostrando empatía y aprecio por las producciones de los demás, con el fin de describir, narrar e informar sobre temas concretos."
        - "2.2. Organizar y redactar de forma guiada textos propios, sencillos, breves y comprensibles, con claridad, coherencia, cohesión y adecuación a la situación comunicativa propuesta, que versen sobre asuntos cotidianos y frecuentes de relevancia para el alumnado y que sean próximos a su experiencia, siguiendo pautas establecidas, haciéndolo de forma creativa y mostrando empatía y aprecio por las producciones de los demás, a través de herramientas analógicas y digitales, con el fin de responder a propósitos comunicativos concretos."
        - "2.3. Seleccionar y aplicar de forma guiada conocimientos y estrategias elementales en la elaboración de textos comprensibles, coherentes y adecuados a las intenciones comunicativas, a las características contextuales y a la tipología textual, haciendo uso de su repertorio lingüístico individual, con ayuda de los recursos físicos o digitales más adecuados en función de la tarea y las necesidades de cada momento, teniendo en cuenta el contexto y la persona a quien va dirigido el texto, para planificar, producir, revisar y seguir progresando en el proceso de aprendizaje."
        - "3.1. Planificar y participar de manera guiada en situaciones interactivas, orales y escritas, breves y sencillas, que versen sobre temas cotidianos, de relevancia personal y cercanos a su experiencia, haciendo uso de la cortesía lingüística y mostrando iniciativa, empatía y respeto por las diferentes necesidades, ideas, inquietudes y motivaciones de los interlocutores y las interlocutoras, con el fin de responder a propósitos comunicativos concretos y establecer vínculos personales."
        - "3.2. Seleccionar y utilizar, de forma guiada y en entornos próximos, estrategias elementales que le permitan, haciendo uso de su repertorio lingüístico, iniciar, mantener y terminar la comunicación, tomar y ceder la palabra y solicitar y ofrecer aclaraciones y explicaciones, con el fin de desenvolverse de manera simple pero efectiva en situaciones interactivas sencillas en la lengua extranjera a través de diferentes soportes."
        - "4.1. Comprender y explicar textos, conceptos y comunicaciones muy breves y sencillas, de manera guiada, de forma oral o escrita, en situaciones cotidianas del ámbito personal, social y educativo, mostrando empatía por los interlocutores y las interlocutoras y respeto por las lenguas empleadas, apoyándose en diversos recursos y soportes, para así construir conocimiento y transmitir información de manera clara."
        - "4.2. Aplicar, de forma guiada y con una aceptable gestión emocional, estrategias elementales que ayuden a crear puentes y faciliten la comprensión y producción de información y la comunicación, adecuadas a las intenciones comunicativas, haciendo uso de su repertorio lingüístico y usando recursos y apoyos físicos o digitales en función de las necesidades de cada momento, con la finalidad de explicar y simplificar textos, conceptos y mensajes."
        - "5.1. Identificar y registrar, siguiendo modelos, los progresos y dificultades de aprendizaje más destacados de la lengua extranjera con apoyo de otros participantes y de soportes analógicos y digitales, seleccionando de forma guiada las estrategias más eficaces en las actividades de autoevaluación y coevaluación, como las que se proponen en el Portfolio Europeo de las Lenguas (PEL) o en diarios de aprendizaje, así como comparar y contrastar siguiendo pautas las semejanzas y diferencias entre distintas lenguas, reflexionando de manera progresivamente autónoma sobre aspectos relevantes de su funcionamiento, de modo que se produzca una transferencia de conocimientos y estrategias a diferentes contextos sociales cotidianos y próximos que le permita ampliar su repertorio lingüístico individual, superar las adversidades y progresar en su aprendizaje en la lengua extranjera."
        - "6.1. Valorar de forma empática y respetuosa la diversidad lingüística, cultural y artística propia de Canarias y de países donde se habla la lengua extranjera, aplicando estrategias básicas de manera guiada en situaciones comunicativas, interculturales, sencillas, cotidianas, con resiliencia, construyendo vínculos entre el patrimonio canario y el de otras culturas y favoreciendo el desarrollo de una cultura compartida y una ciudadanía comprometida con la sostenibilidad, para afrontar las diferencias morales o culturales con actitud dialogante, argumentativa, respetuosa y opuesta a cualquier tipo de discriminación o violencia."
    - curso: "2.º ESO"
      criterios:
        - "1.1. Interpretar y analizar el sentido global, la información específica y explícita y el contenido de textos orales breves y sencillos sobre temas frecuentes y cotidianos, de relevancia personal y próximos a su experiencia, expresados de forma clara a través de diversos soportes, utilizando con cierta adecuación una o más lenguas, además de las familiares, con el fin de construir conocimiento y responder a necesidades comunicativas concretas."
        - "1.2. Interpretar y analizar el sentido global, la información específica y explícita, y el contenido y los rasgos discursivos de textos escritos y multimodales, breves y sencillos, sobre temas frecuentes y cotidianos, de relevancia personal y próximos a su experiencia, expresados de forma clara a través de diversos soportes, así como de textos literarios adaptados al nivel de madurez del alumnado, aplicando criterios de validez y calidad y utilizando con cierta adecuación una o más lenguas, además de las familiares, con el fin de construir conocimiento y responder a necesidades comunicativas concretas."
        - "1.3. Aplicar con cierta autonomía los conocimientos y las estrategias básicas más adecuadas en cada situación comunicativa para comprender el sentido general, la información esencial y los detalles más relevantes de los textos, inferir significados e interpretar elementos no verbales, así como realizar búsquedas para seleccionar información y enriquecer su repertorio lingüístico individual."
        - "2.1. Expresar oralmente con cierta autonomía textos breves, sencillos, estructurados, comprensibles y adecuados a la situación comunicativa que versen sobre asuntos cotidianos, de uso frecuente y de relevancia para el alumnado, en diferentes soportes, haciéndolo de forma creativa y mostrando empatía y aprecio por las producciones de los demás, con el fin de describir, narrar e informar sobre temas concretos."
        - "2.2. Organizar y redactar con cierta autonomía textos propios, sencillos, breves y comprensibles, con claridad, coherencia, cohesión y adecuación a la situación comunicativa propuesta, que versen sobre asuntos cotidianos de uso frecuente y de relevancia para el alumnado y que sean próximos a su experiencia, siguiendo pautas establecidas, haciéndolo de forma creativa y mostrando empatía y aprecio por las producciones de los demás, así como empleando herramientas analógicas y digitales, con el fin de responder a propósitos comunicativos concretos."
        - "2.3. Seleccionar, organizar y aplicar con cierta autonomía conocimientos y estrategias en la elaboración de textos comprensibles, coherentes y adecuados a las intenciones comunicativas, a las características contextuales y a la tipología textual, haciendo uso de su repertorio lingüístico y con ayuda de los recursos físicos o digitales más adecuados en función de la tarea y las necesidades de cada momento, teniendo en cuenta la persona a quien va dirigido el texto, para planificar, producir, revisar y seguir progresando en el proceso de aprendizaje."
        - "3.1. Planificar y participar a través de diversos soportes en situaciones interactivas, orales y escritas, breves y sencillas, que versen sobre temas cotidianos de relevancia personal y cercanos a su experiencia, haciendo uso de la cortesía lingüística y mostrando proactividad, empatía y respeto por las diferentes necesidades, iniciativas y motivaciones de los interlocutores y las interlocutoras, con el fin de responder a propósitos comunicativos concretos, establecer vínculos personales y participar de manera básica en la vida social."
        - "3.2. Seleccionar, organizar y utilizar, de forma guiada y en entornos próximos, estrategias adecuadas que le permitan, haciendo uso de su repertorio lingüístico, iniciar, mantener y terminar la comunicación, tomar y ceder la palabra y solicitar y ofrecer aclaraciones y explicaciones, con el fin de desenvolverse en situaciones interactivas breves y sencillas en la lengua extranjera a través de diversos soportes."
        - "4.1. Inferir y explicar textos, conceptos y comunicaciones breves y sencillas de forma progresivamente autónoma, de forma oral o escrita, en situaciones cotidianas del ámbito personal, social y educativo, mostrando empatía por los interlocutores y las interlocutoras y respeto por las lenguas empleadas, así como interés por participar en la solución de problemas de intercomprensión y de entendimiento en el entorno próximo, apoyándose en diversos recursos y soportes, para así construir conocimiento y transmitir información de manera clara y responsable."
        - "4.2. Aplicar, de forma progresivamente autónoma y con una aceptable gestión emocional, estrategias básicas que ayuden a crear puentes y faciliten la comprensión, la producción de información y la comunicación, adecuadas a las intenciones comunicativas, haciendo uso de su repertorio lingüístico y de recursos y apoyos físicos o digitales en función de las necesidades de cada momento, con la finalidad de explicar y simplificar textos, conceptos y mensajes."
        - "5.1. Identificar y registrar, siguiendo modelos, los progresos y dificultades de aprendizaje de la lengua extranjera con apoyo de otros participantes y de soportes analógicos y digitales, seleccionando con cierta autonomía las estrategias más eficaces en las actividades de autoevaluación y coevaluación, como las que se proponen en el Portfolio Europeo de las Lenguas o en diarios de aprendizaje, así como comparar y contrastar las semejanzas y diferencias entre distintas lenguas, reflexionando de manera progresivamente autónoma sobre su funcionamiento, de modo que se produzca una transferencia de conocimientos y estrategias a diferentes contextos sociales cotidianos y próximos que le permita ampliar su repertorio lingüístico individual, superar las adversidades y progresar en su aprendizaje en la lengua extranjera."
        - "6.1. Valorar de forma empática y respetuosa la diversidad lingüística, cultural y artística propia de Canarias y de países donde se habla la lengua extranjera, aplicando estrategias con cierta autonomía en situaciones comunicativas interculturales cotidianas con resiliencia, construyendo vínculos entre el patrimonio canario y el de otras culturas y favoreciendo el desarrollo de una cultura compartida y una ciudadanía comprometida con la sostenibilidad y los valores democráticos, para afrontar las diferencias morales o culturales con actitud dialogante, argumentativa, respetuosa y opuesta a cualquier tipo de discriminación o violencia."
    - curso: "3.º ESO"
      criterios:
        - "1.1. Seleccionar información pertinente, analizar y extraer el sentido global y la información específica y explícita, e interpretar y valorar el contenido y los rasgos discursivos de textos orales sencillos, sobre temas cotidianos, de relevancia personal o de interés público próximos a su experiencia, expresados de forma clara a través de diversos soportes, utilizando con fluidez y adecuación una o más lenguas además de las familiares con el fin de construir conocimiento y responder a necesidades comunicativas concretas."
        - "1.2. Seleccionar información pertinente, extraer el sentido global y las ideas principales, e interpretar y valorar el contenido y los rasgos discursivos de textos escritos y multimodales, sencillos, sobre temas cotidianos, de relevancia personal o de interés público próximos a su experiencia, expresados de forma clara a través de diversos soportes, así como de textos literarios adaptados al nivel de madurez del alumnado, aplicando criterios de validez y calidad, y utilizando con fluidez y adecuación una o más lenguas además de las familiares, con el fin de construir conocimiento y responder a necesidades comunicativas concretas."
        - "1.3. Aplicar de manera progresivamente autónoma los conocimientos y las estrategias más adecuadas en cada situación comunicativa para comprender el sentido general, la información esencial y los detalles más relevantes de los textos, inferir significados e interpretar elementos no verbales, así como realizar búsquedas para seleccionar y gestionar información veraz y enriquecer su repertorio lingüístico individual."
        - "2.1. Elaborar y expresar oralmente textos sencillos, estructurados, comprensibles, coherentes y adecuados a la situación comunicativa, que versen sobre asuntos cotidianos y que sean de relevancia personal o de interés público y próximos a la experiencia del alumnado, empleando diferentes soportes y haciéndolo de forma creativa, así como mostrando empatía y aprecio por las producciones de los demás, con el fin de responder a propósitos comunicativos concretos."
        - "2.2. Redactar y difundir textos propios de extensión media sobre asuntos cotidianos, de relevancia personal o de interés público y próximos a la experiencia del alumnado, haciéndolo con aceptable claridad, coherencia, cohesión, corrección y adecuación a la situación comunicativa propuesta, a la tipología textual y a las herramientas analógicas y digitales utilizadas, empleando la creatividad y mostrando empatía y aprecio por las producciones de los demás, así como respetando la propiedad intelectual y evitando el plagio, con el fin de responder a propósitos comunicativos concretos."
        - "2.3. Seleccionar, organizar y aplicar conocimientos y estrategias en la elaboración de textos coherentes, cohesionados y adecuados a las intenciones comunicativas, las características contextuales, los aspectos socioculturales y la tipología textual, haciendo uso de su repertorio lingüístico y usando los recursos físicos o digitales más adecuados en función de la tarea y de las necesidades de la audiencia o del lector potencial a quien se dirige el texto, para planificar, producir, revisar y cooperar, así como para seguir progresando en el proceso de aprendizaje."
        - "3.1. Planificar, participar y colaborar en situaciones interactivas, orales y escritas sencillas sobre temas cotidianos, de relevancia personal o de interés público cercanos a su experiencia, haciendo uso de la cortesía lingüística y mostrando proactividad, empatía y respeto por las diferentes necesidades, ideas, inquietudes, iniciativas y motivaciones de los interlocutores y las interlocutoras, con el fin de responder a propósitos comunicativos concretos, fortalecer vínculos personales y participar en la vida social."
        - "3.2. Seleccionar, organizar y utilizar, de forma progresivamente autónoma, estrategias adecuadas que le permitan, haciendo uso de su repertorio lingüístico, anticipar, iniciar, mantener y terminar la comunicación, como tomar y ceder la palabra, solicitar y ofrecer aclaraciones y explicaciones, reformular el discurso y colaborar, debatir y resolver problemas, con el fin de expresarse en situaciones interactivas sencillas en la lengua extranjera a través de diversos soportes."
        - "4.1. Inferir y explicar textos, conceptos y comunicaciones sencillas, con cierta autonomía, de forma oral o escrita, en situaciones cotidianas del ámbito personal, social, educativo y profesional, mostrando empatía por los interlocutores y las interlocutoras, y respeto por las lenguas empleadas, así como participando en la solución de problemas de intercomprensión y de mostendimiento en el entorno, apoyándose en diversos recursos y soportes, para así construir conocimiento y transmitir información de manera clara y responsable."
        - "4.2. Aplicar, con cierta autonomía, estrategias que ayuden a crear puentes, faciliten la comunicación y sirvan para explicar y simplificar textos, conceptos y mensajes y que sean adecuadas a las intenciones comunicativas, a las características contextuales y a la tipología textual, haciendo uso de su repertorio lingüístico y de una buena gestión emocional, así como de recursos y apoyos físicos o digitales en función de las necesidades de cada momento, con la finalidad de explicar y simplificar textos, conceptos y mensajes."
        - "5.1. Identificar, registrar y compartir los progresos y dificultades de aprendizaje de la lengua extranjera con apoyo de otros participantes y de soportes analógicos y digitales, seleccionando las estrategias más eficaces en las actividades de planificación, autoevaluación y coevaluación, como las que se proponen en el Portfolio Europeo de las Lenguas o en diarios de aprendizaje, así como comparar y argumentar las semejanzas y diferencias entre distintas lenguas, reflexionando de manera progresivamente autónoma sobre su funcionamiento, de modo que se produzca una transferencia de conocimientos y estrategias a diferentes contextos sociales cotidianos que le permita ampliar su repertorio lingüístico individual, superar las adversidades y consolidar su aprendizaje en la lengua extranjera."
        - "6.1. Valorar críticamente y de forma empática y respetuosa la diversidad lingüística, cultural y artística propia de Canarias y de los países donde se habla la lengua extranjera, aplicando estrategias de manera progresivamente autónoma en situaciones comunicativas interculturales cotidianas, con resiliencia, mostrando interés por proponer vías de solución a dificultades comunicativas socioculturales, construyendo vínculos entre el patrimonio canario y el de otras culturas y favoreciendo el desarrollo de una cultura compartida y de una ciudadanía comprometida con la sostenibilidad y los valores democráticos, para afrontar las diferencias morales o culturales con actitud dialogante, argumentativa, respetuosa y opuesta a cualquier tipo de discriminación o violencia."
    - curso: "4.º ESO"
      criterios:
        - "1.1. Seleccionar información pertinente, extraer el sentido global y las ideas principales e interpretar y valorar con actitud crítica el contenido y los rasgos discursivos de textos orales progresivamente más complejos sobre temas cotidianos, de relevancia personal o de interés público próximos a su experiencia, expresados de forma clara a través de diversos soportes, utilizando con fluidez, adecuación y con cierta corrección una o más lenguas además de las familiares, con el fin de construir conocimiento y responder a necesidades comunicativas concretas."
        - "1.2. Seleccionar información pertinente, extraer el sentido global y las ideas principales e interpretar y valorar con actitud crítica el contenido y los rasgos discursivos de textos escritos y multimodales progresivamente más complejos sobre temas cotidianos, de relevancia personal o de interés público próximos a su experiencia, expresados de forma clara a través de diversos soportes, así como de textos literarios adaptados al nivel de madurez del alumnado, aplicando criterios de validez, calidad y fiabilidad y utilizando con fluidez, adecuación y con cierta corrección una o más lenguas además de las familiares, con el fin de construir conocimiento y responder a necesidades comunicativas concretas."
        - "1.3. Aplicar los conocimientos y las estrategias más adecuadas en cada situación comunicativa para comprender el sentido general, la información esencial y los detalles más relevantes de los textos, inferir significados e interpretar elementos no verbales, así como realizar búsquedas para seleccionar y gestionar información veraz y enriquecer su repertorio lingüístico individual."
        - "2.1. Elaborar y expresar oralmente textos sencillos, estructurados, comprensibles, coherentes y adecuados a la situación comunicativa que versen sobre asuntos cotidianos y sean de relevancia personal o de interés público próximos a la experiencia del alumnado, empleando diferentes soportes, y haciéndolo de forma creativa y mostrando empatía y aprecio por las producciones ajenas, con el fin de responder a propósitos comunicativos concretos."
        - "2.2. Redactar y difundir textos propios de extensión media sobre asuntos cotidianos, de relevancia personal o de interés público próximos a la experiencia del alumnado, haciéndolo con aceptable claridad, coherencia, cohesión, corrección y adecuación a la situación comunicativa propuesta, a la tipología textual y a las herramientas analógicas y digitales utilizadas, empleando creatividad, mostrando empatía y aprecio por las producciones ajenas, respetando la propiedad intelectual y evitando el plagio, con el fin de responder a propósitos comunicativos concretos."
        - "2.3. Seleccionar, organizar y aplicar conocimientos y estrategias en la elaboración de textos coherentes, cohesionados y adecuados a las intenciones comunicativas, las características contextuales, los aspectos socioculturales y la tipología textual, haciendo uso de su repertorio lingüístico y usando los recursos físicos o digitales más adecuados en función de la tarea y de las necesidades de la audiencia o del lector o lectora potencial a quien se dirige el texto, para planificar, producir, revisar y seguir progresando en el proceso de aprendizaje."
        - "3.1. Planificar, participar y colaborar activamente en situaciones interactivas, orales, escritas o multimodales, sobre temas cotidianos de relevancia personal o de interés público cercanos a su experiencia, haciendo uso de la cortesía lingüística y mostrando proactividad, empatía y respeto por las diferentes necesidades, ideas, inquietudes, iniciativas y motivaciones de los interlocutores y las interlocutoras, con el fin de responder a propósitos comunicativos concretos, fortalecer vínculos personales y participar en la vida social con cierta autonomía."
        - "3.2. Seleccionar, organizar y utilizar estrategias adecuadas que le permitan, haciendo uso de su repertorio lingüístico, anticipar, iniciar, mantener y terminar la comunicación, tomar y ceder la palabra, solicitar y ofrecer aclaraciones y explicaciones y reformular el discurso, así como colaborar, debatir, resolver problemas y gestionar situaciones comprometidas, con el fin de expresarse de manera espontánea en la lengua extranjera a través de diversos soportes y recursos analógicos y digitales."
        - "4.1. Inferir y sintetizar de manera simple textos, conceptos y comunicaciones sencillas, de forma oral o escrita, en situaciones cotidianas del ámbito personal, social, educativo y profesional en las que se deba atender a la diversidad, mostrando empatía por los interlocutores e interlocutoras y respeto por las lenguas empleadas, así como participando con interés en la solución de problemas de intercomprensión y de entendimiento en el entorno, apoyándose en diversos recursos y soportes, para así adquirir conocimiento y transmitir información de manera ética, clara y responsable."
        - "4.2. Aplicar estrategias que ayuden a crear puentes, faciliten la comunicación y sirvan para explicar y simplificar textos, conceptos y mensajes y que sean adecuadas a las intenciones comunicativas, las características contextuales y la tipología textual, haciendo uso de su repertorio lingüístico y una buena gestión emocional, así como empleando recursos y apoyos físicos o digitales en función de las necesidades de cada momento, con la finalidad de explicar y simplificar textos, conceptos y mensajes."
        - "5.1. Registrar, analizar y compartir los progresos y dificultades de aprendizaje de la lengua extranjera con apoyo de otros y otras participantes y de soportes analógicos y digitales, seleccionando de forma creativa las estrategias más eficaces en las actividades de planificación, autoevaluación y coevaluación, como las que se proponen en el Portfolio Europeo de las Lenguas o en diarios de aprendizaje, así como comparar y argumentar las semejanzas y diferencias entre distintas lenguas, reflexionando de manera progresivamente autónoma sobre su funcionamiento, de modo que se produzca una transferencia de conocimientos y estrategias a diferentes contextos sociales cotidianos que le permita ampliar su repertorio lingüístico individual, superar las adversidades y consolidar su aprendizaje en la lengua extranjera."
        - "6.1. Valorar críticamente y de forma empática y respetuosa la diversidad lingüística, cultural y artística propia de Canarias y de países donde se habla la lengua extranjera, aplicando estrategias en situaciones comunicativas, interculturales, cotidianas, con resiliencia, proponiendo vías de solución a dificultades comunicativas socioculturales, construyendo vínculos entre el patrimonio canario y el de otras culturas y favoreciendo y justificando el desarrollo de una cultura compartida y una ciudadanía comprometida con la sostenibilidad y los valores democráticos, para afrontar las diferencias morales o culturales con actitud dialogante, argumentativa, respetuosa y opuesta a cualquier tipo de discriminación o violencia."
  saberes_basicos:
    - bloque: "I. Comunicación"
      cursos: ["1.º ESO", "2.º ESO", "3.º ESO", "4.º ESO"]
      detalles: "1. Empleo de estrategias básicas para la planificación, ejecución, control y reparación de la comprensión, la producción y la coproducción de textos orales, escritos y multimodales. 2. Aplicación de conocimientos, destrezas y actitudes que permitan detectar y colaborar en actividades de mediación en situaciones cotidianas sencillas. 3. Uso de funciones comunicativas básicas adecuadas al ámbito y al contexto comunicativo: saludar, despedirse, presentar y presentarse; describir personas, objetos y lugares; situar eventos en el tiempo; situar objetos, personas y lugares en el espacio; pedir e intercambiar información sobre cuestiones cotidianas; dar y pedir instrucciones y órdenes; ofrecer, aceptar y rechazar ayuda, expresar parcialmente el gusto o el interés y emociones básicas; narrar acontecimientos pasados, describir situaciones presentes, expresar la opinión, la capacidad, la obligación y la prohibición. 4. Identificación y uso de modelos contextuales y géneros discursivos básicos en la comprensión, producción y coproducción de textos orales, escritos y multimodales, breves y sencillos, literarios y no literarios: características y reconocimiento del contexto (participantes y situación). 5. Manejo de unidades lingüísticas básicas y significados asociados a dichas unidades, tales como la expresión de la entidad y sus propiedades, la cantidad y la cualidad, el espacio y las relaciones espaciales, el tiempo, la afirmación, la negación, la interrogación y la exclamación, relaciones lógicas básicas. 6. Identificación y empleo de léxico de uso común y de interés para el alumnado relativo a identificación personal, relaciones interpersonales, lugares y entornos cercanos, ocio y tiempo libre, vida cotidiana, actividad física, vivienda y hogar, clima, tecnologías de la información y la comunicación. 7. Reconocimiento y reproducción de patrones sonoros, acentuales, rítmicos y de entonación básicos, y de significados e intenciones comunicativas generales asociadas a dichos patrones. 8. Reconocimiento y uso de convenciones ortográficas básicas y significados e intenciones comunicativas asociados a los formatos, patrones y elementos gráficos. 9. Reconocimiento y uso de convenciones y estrategias conversacionales básicas, en formato síncrono o asíncrono, para iniciar, mantener y terminar la comunicación, tomar y ceder la palabra, pedir y dar aclaraciones y explicaciones, comparar y contrastar, resumir, colaborar, etc. 10. Selección de recursos para el aprendizaje y uso de estrategias básicas de búsqueda de información: diccionarios, libros de consulta, bibliotecas, recursos digitales e informáticos, etc. 11. Identificación y atribución de la propiedad intelectual de las fuentes consultadas y contenidos utilizados. 12. Uso de herramientas analógicas y digitales básicas para la comprensión, producción y coproducción oral, escrita y multimodal; uso de plataformas virtuales de interacción, cooperación y colaboración educativa (aulas virtuales, videoconferencias, herramientas digitales colaborativas, etc.) para el aprendizaje, la comunicación y el desarrollo de proyectos con hablantes o estudiantes de la lengua extranjera."
    - bloque: "II. Plurilingüismo"
      cursos: ["1.º ESO", "2.º ESO", "3.º ESO", "4.º ESO"]
      detalles: "1. Selección y uso de estrategias y técnicas para responder eficazmente a una necesidad comunicativa básica y concreta de forma comprensible, a pesar de las limitaciones derivadas del nivel de competencia en la lengua extranjera y en las demás lenguas del repertorio lingüístico propio. 2. Selección y empleo de estrategias básicas para identificar, organizar, retener y recuperar léxico, morfosintaxis, patrones sonoros, etc., a partir de la comparación de las lenguas y variedades que conforman el repertorio lingüístico personal. 3. Identificación y uso de estrategias y herramientas básicas de autoevaluación y coevaluación, analógicas y digitales, individuales y cooperativas. 4. Reconocimiento del error como instrumento de mejora y propuesta de reparación. 5. Utilización de léxico y expresiones de uso común para comprender enunciados sobre la comunicación, la lengua, el aprendizaje y las herramientas de comunicación y aprendizaje (metalenguaje). 6. Comparación básica entre lenguas a partir de elementos de la lengua extranjera y otras lenguas."
    - bloque: "III. Interculturalidad"
      cursos: ["1.º ESO", "2.º ESO", "3.º ESO", "4.º ESO"]
      detalles: "1. Reconocimiento y aprecio por aspectos socioculturales y sociolingüísticos básicos relativos a la vida cotidiana y las condiciones de vida; convenciones sociales básicas; lenguaje no verbal, cortesía lingüística y etiqueta digital; cultura y costumbres de países donde se habla la lengua extranjera y de Canarias. 2. Identificación y aplicación de estrategias básicas para entender la diversidad lingüística, cultural, natural y artística. 3. Identificación de estrategias básicas de detección de usos discriminatorios del lenguaje verbal y no verbal, con especial atención a la discriminación por razón de género o diversidad funcional."
    - bloque: "IV. Dimensiones interpersonal e intrapersonal"
      cursos: ["1.º ESO", "2.º ESO", "3.º ESO", "4.º ESO"]
      detalles: "1. Aprecio por la lengua extranjera como medio de comunicación interpersonal e internacional y como herramienta para el enriquecimiento personal. 2. Empleo de estrategias colaborativas y de dinámicas de trabajo de grupo relativas a las relaciones interpersonales. 3. Empatía, valoración y respeto por las opiniones de los demás y sus puntos de vista."

resumen_ia: "Currículo de Lengua Extranjera en ESO (1.º a 4.º) en Canarias, regulado por el Decreto 30/2023 (NOR-005) en desarrollo del RD 217/2022 (NOR-003). Materia troncal en todos los cursos (arts. 23.1.i y 25.1.d). Se han extraído las 6 competencias específicas (C1-C6) literales, los criterios de evaluación de los cuatro cursos completos (C1-C6, criterios 1.1-6.1 por curso, 12 criterios por año) y los cuatro bloques de saberes básicos. Nota: el criterio 4.1 de 3.º ESO contiene el término 'mostendimiento' tal como aparece literalmente en el PDF oficial (probable errata tipográfica). Los saberes se organizan en cuatro bloques: Comunicación, Plurilingüismo, Interculturalidad y Dimensiones interpersonal e intrapersonal."
observaciones: "Extracción completada el 2026-04-26 a partir del PDF oficial (Lengua_extranjera_ESO.pdf). Se han cotejado literalmente las 6 CE (C1-C6), los criterios de evaluación de 1.º a 4.º ESO completos (12 criterios por curso: 1.1-6.1) y los cuatro bloques de saberes básicos. El término 'mostendimiento' en el criterio 4.1 de 3.º ESO es una errata tipográfica literal del PDF. Ver TAREA-029."

resumen_ia: "Currículo de Geografía e Historia en ESO Canarias regulado por el Decreto 30/2023. Materia común en 1.º, 2.º y 3.º ESO (art. 23.1.e) y obligatoria en 4.º ESO (art. 24). Nueve competencias específicas (C1-C9) en los tres primeros cursos y siete en 4.º ESO, con un total de 30 criterios de evaluación en 1.º y 2.º, 22 en 3.º y 19 en 4.º. Saberes organizados en tres bloques: «Retos del mundo actual», «Sociedades y territorios» y «Compromiso cívico local y global», con tratamiento específico de la realidad geográfica, histórica y patrimonial de Canarias en cada curso (cultura aborigen, conquista y colonización, transformaciones contemporáneas)."
observaciones: "Extracción completada el 2026-04-26 a partir del PDF oficial Geografia_historia_ESO.pdf publicado por la Consejería de Educación, Universidades, Cultura y Deportes del Gobierno de Canarias. Se han incorporado los enunciados literales de las nueve competencias específicas con su vinculación a los descriptores del Perfil de salida; los criterios de evaluación de 1.º ESO se incluyen literalmente y los de 2.º, 3.º y 4.º ESO se ofrecen en formato sintético agrupado por competencia (consultar el PDF oficial para los enunciados literales completos de los demás cursos). Saberes básicos organizados en tres bloques con detalle de los apartados específicos canarios."

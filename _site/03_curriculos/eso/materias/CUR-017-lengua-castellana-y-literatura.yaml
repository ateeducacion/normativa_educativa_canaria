resumen_ia: "Currículo de Lengua Castellana y Literatura en ESO (1.º a 4.º) en Canarias, regulado por el Decreto 30/2023 (NOR-005) en desarrollo del RD 217/2022 (NOR-003). Materia troncal en todos los cursos (arts. 23.1.f y 25.1.c). Se han extraído literalmente las 10 competencias específicas (C1-C10), los 19 criterios de evaluación por curso (1.º a 4.º ESO) y los saberes básicos de los cuatro bloques (I. La lengua y sus hablantes, II. Comunicación, III. Educación literaria, IV. Reflexión sobre la lengua) para cada curso."
observaciones: "Extracción completada el 2026-04-26 a partir del PDF oficial (Lengua_castellana_y_Literatura_ESO.pdf). Los bloques II, III y IV de saberes básicos son idénticos en 2.º y 3.º ESO; el bloque I difiere en cada curso. El texto copia literalmente el PDF; 'preoncebidas' (crit. 3.º y 4.º ESO 1.2) y 'guada' (crit. 2.º ESO 6.1) son grafías del documento oficial. Ver TAREA-029."

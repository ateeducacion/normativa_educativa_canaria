    - curso: "3.º ESO"
      criterios:
        - "1.1. Reconocer y respetar la diversidad lingüística de España, con especial atención a la variedad dialectal canaria, identificando de manera pautada las características que corresponden a una variedad de registro, variedad social o variedad geográfica en manifestaciones orales, escritas, signadas y multimodales, para ampliar su repertorio lingüístico individual y adoptar una actitud de legitimación hacia el español de Canarias como variedad de prestigio de la lengua española y fuente de riqueza lingüística y cultural."
        - "1.2. Identificar y analizar prejuicios, estereotipos y usos discriminatorios de la lengua, así como abusos de poder a través de la misma, a partir de la interacción con los demás en diferentes contextos socioinstitucionales y de la aproximación a los derechos lingüísticos individuales y colectivos para desarrollar un juicio propio y respetuoso, reconociendo ideas preoncebidas en torno a la distribución geográfica del idioma, integrando la variedad lingüística en su desarrollo personal, con el propósito de favorecer un uso no solo eficaz sino también ético del lenguaje, en el que el diálogo sea una herramienta para la construcción de una sociedad democrática e igualitaria."
        - "2.1. Comprender, interpretar y explicar el sentido global del texto y la relación entre sus partes; seleccionar, retener y analizar la información más relevante y la intención del emisor de textos orales o multimodales, aplicando métodos inductivos, deductivos y metacognitivos e integrándolos en un proceso de aprendizaje continuo para desarrollar su conciencia crítica."
        - "2.2. Analizar y valorar la forma y el contenido de textos orales, signados y multimodales de cierta complejidad, identificando mecanismos de referencia interna, así como los procedimientos comunicativos empleados, para construir una opinión crítica sobre la forma y el significado del mensaje."
        - "3.1. Producir textos orales y multimodales de cierta extensión y complejidad, ajustándose a las convenciones propias de los diversos géneros discursivos, con especial atención a los expositivos y argumentativos, respetando las características del español de Canarias, utilizando de manera eficaz recursos verbales y no verbales, planificando las diferentes fases de creación del texto y aplicando técnicas de autoevaluación para comunicarse de manera fluida e informada en diferentes contextos sociales."
        - "3.2. Participar de manera activa y adecuada en interacciones comunicativas orales formales e informales, con actitudes de escucha activa y estrategias de cooperación conversacional y cortesía lingüística para reconocer la comunicación oral como medio para transmitir conocimientos e ideas, y para ejercer una ciudadanía activa."
        - "4.1. Comprender, interpretar y explicar el sentido global, la estructura, el tipo de destinatario, el formato utilizado y la información más relevante de textos escritos o multimodales de cierta complejidad, identificando e interpretando la intención comunicativa, realizando las inferencias necesarias y planteando hipótesis para entender diferentes propósitos de lectura que le permitan asumir de forma activa la responsabilidad de su aprendizaje continuo."
        - "4.2. Analizar y valorar la forma y el contenido de textos escritos y multimodales de cierta complejidad, determinando si su contenido cumple con las expectativas de certeza y veracidad y comprobando la eficacia de los procedimientos lingüísticos utilizados para poner sus prácticas comunicativas al servicio del compromiso activo y la participación plena en la vida social y cívica."
        - "5.1. Producir textos escritos y multimodales de cierta extensión y complejidad, ajustándose a las convenciones propias de los diversos géneros discursivos, con especial atención a los expositivos y argumentativos, analizando la situación comunicativa, el destinatario, su propósito y el canal y aplicando en sus producciones procedimientos discursivos, lingüísticos y de estilo, con la debida atención al español de Canarias, para dar una respuesta eficaz a demandas comunicativas concretas y para enriquecer los textos con la debida precisión léxica y corrección ortográfica y gramatical."
        - "6.1. Elaborar trabajos o proyectos de investigación de cierta complejidad sobre diversos temas de interés académico, personal o social que impliquen localizar, seleccionar y contrastar de manera progresivamente autónoma información procedente de diferentes fuentes, calibrando su fiabilidad, calidad y pertinencia en función de los objetivos de lectura; organizarla e integrarla en esquemas propios, y reelaborarla y comunicarla de manera creativa y personal, asumiendo hábitos de uso crítico, seguro, sostenible y saludable de las tecnologías digitales, respetando los principios de propiedad intelectual y ejerciendo una ciudadanía digital activa y reflexiva que propicie un proceso de aprendizaje continuo y para toda la vida."
        - "7.1. Leer de manera autónoma textos seleccionados en función de los propios gustos, intereses y necesidades, de la literatura canaria, española y universal, con la adecuada atención a la literatura juvenil, y participar de manera progresivamente activa en situaciones comunicativas culturales que favorezcan la reflexión gradual y el intercambio abierto y creativo de la experiencia lectora, para integrar en su vida la lectura como fuente de placer, dejar constancia de la creciente construcción de su propia identidad lectora y apreciar el encuentro cultural y artístico."
        - "8.1. Explicar y argumentar con ayuda de pautas la interpretación de obras o fragmentos representativos de la literatura canaria, española y universal, justificando progresivamente con el metalenguaje específico, la vinculación del contenido y la forma con el contexto sociohistórico y literario de cada obra, la intención del autor o autora, el tema y los rasgos propios del género, con la finalidad de constatar la pervivencia de universales temáticos y formales en la literatura, así como atender a la configuración de los géneros y subgéneros literarios."
        - "8.2. Argumentar de manera progresivamente autónoma la conexión existente entre los textos literarios, así como con otras manifestaciones artísticas y culturales, para conformar gradualmente un mapa cultural que conjugue las obras literarias con el resto de las manifestaciones artísticas y acrecentar las posibilidades de disfrute de la literatura."
        - "8.3. Crear textos con intención literaria y sentido estético, en los que se movilicen los conocimientos literarios adquiridos y la experiencia lectora, con el propósito de que la escritura creativa sea entendida como una forma de comunicación que permite compartir ideas, sentimientos y emociones, así como construir vínculos personales a partir de la expresión artística."
        - "9.1. Analizar la interrelación entre el propósito comunicativo y las elecciones lingüísticas del emisor, así como sus efectos en el receptor, haciendo uso del conocimiento explícito de la lengua, con el debido razonamiento inductivo a partir de las variedades dialectales y las lenguas del centro, y tomando como referencia las características del español de Canarias, así como del metalenguaje específico para desarrollar la conciencia lingüística."
        - "9.2. Formular generalizaciones sobre aspectos del funcionamiento de la lengua para aumentar su repertorio lingüístico, mejorar las destrezas de recepción crítica y analizar las distintas fases de construcción del conocimiento sobre el sistema de la lengua y su uso en la comunicación."
        - "9.3. Revisar los textos propios de manera progresivamente autónoma y hacer propuestas de mejora, analizando los cambios a partir de la reflexión metalingüística con el metalenguaje específico, e identificar y subsanar los problemas de comprensión lectora utilizando los conocimientos explícitos de la lengua y su uso para mejorar las destrezas de producción oral y escrita."
        - "10.1. Utilizar estrategias comunicativas para la resolución dialogada de los conflictos y la búsqueda de consensos, en diferentes contextos del ámbito personal, educativo y social, con actitud dialogante, constructiva, crítica y respetuosa, así como considerada con la diversidad lingüística y cultural, potenciando el uso de la comunicación como medio para prevenir cualquier tipo de violencia."
        - "10.2. Reconocer y valorar la capacidad del lenguaje como herramienta para la comunicación positiva en contextos diversos, incluidos los virtuales, evitando cualquier uso discriminatorio, con el fin de incorporar las posibilidades que ofrece el lenguaje en el desarrollo individual y social de las personas."

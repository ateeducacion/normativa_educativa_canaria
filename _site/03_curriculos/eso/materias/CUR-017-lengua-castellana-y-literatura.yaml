elementos:
  competencias_especificas:
    - codigo: "C1"
      enunciado_resumido: "Describir y apreciar la diversidad lingüística del mundo a partir del reconocimiento de las lenguas del alumnado y la realidad plurilingüe de España."
      enunciado_oficial: "Describir y apreciar la diversidad lingüística del mundo a partir del reconocimiento de las lenguas del alumnado y la realidad plurilingüe y pluricultural de España, analizando el origen y desarrollo sociohistórico de sus lenguas y las características de las principales variedades dialectales del español, para favorecer la reflexión interlingüística, para combatir los estereotipos y prejuicios lingüísticos y para valorar dicha diversidad como fuente de riqueza cultural."
      descriptores: ["CCL1", "CCL5", "CP2", "CP3", "CD1", "CC1", "CC2", "CC3", "CCEC1", "CCEC3"]
    - codigo: "C2"
      enunciado_resumido: "Comprender e interpretar textos orales y multimodales recogiendo el sentido general y la información más relevante."
      enunciado_oficial: "Comprender e interpretar textos orales y multimodales recogiendo el sentido general y la información más relevante, identificando el punto de vista y la intención del emisor y valorando su fiabilidad, su forma y su contenido, para construir conocimiento, formarse opinión y ensanchar las posibilidades de disfrute y ocio."
      descriptores: ["CCL2", "CCL5", "CP2", "STEM1", "CD1", "CD2", "CD3", "CPSAA4", "CC3"]
    - codigo: "C3"
      enunciado_resumido: "Producir textos orales y multimodales con coherencia, cohesión, fluidez y el registro adecuado, participando en interacciones orales con actitud cooperativa."
      enunciado_oficial: "Producir textos orales y multimodales con coherencia, cohesión, fluidez y el registro adecuado, atendiendo a las convenciones propias de los diferentes géneros discursivos, y participar en interacciones orales con actitud cooperativa y respetuosa, tanto para construir conocimiento y establecer vínculos personales como para intervenir de manera activa e informada en diferentes contextos sociales."
      descriptores: ["CCL1", "CCL3", "CCL5", "STEM1", "CD1", "CD2", "CD3", "CPSAA4", "CC2", "CE1"]
    - codigo: "C4"
      enunciado_resumido: "Comprender, interpretar y valorar textos escritos, con sentido crítico y diferentes propósitos de lectura."
      enunciado_oficial: "Comprender, interpretar y valorar textos escritos, con sentido crítico y diferentes propósitos de lectura, reconociendo el sentido global y las ideas principales y secundarias, identificando la intención del emisor, reflexionando sobre el contenido y la forma y evaluando su calidad y fiabilidad, para dar respuesta a necesidades e intereses comunicativos diversos y para construir conocimiento."
      descriptores: ["CCL2", "CCL3", "CCL5", "STEM1", "CD1", "CPSAA4", "CC3"]
    - codigo: "C5"
      enunciado_resumido: "Producir textos escritos y multimodales coherentes, cohesionados, adecuados y correctos atendiendo a las convenciones propias del género discursivo elegido."
      enunciado_oficial: "Producir textos escritos y multimodales coherentes, cohesionados, adecuados y correctos atendiendo a las convenciones propias del género discursivo elegido, para construir conocimiento y dar respuesta de manera informada, eficaz y creativa a demandas comunicativas concretas."
      descriptores: ["CCL1", "CCL3", "CCL5", "STEM1", "CD2", "CD3", "CPSAA4", "CPSAA5", "CC2"]
    - codigo: "C6"
      enunciado_resumido: "Seleccionar y contrastar información procedente de diferentes fuentes de manera progresivamente autónoma."
      enunciado_oficial: "Seleccionar y contrastar información procedente de diferentes fuentes de manera progresivamente autónoma, evaluando su fiabilidad y pertinencia en función de los objetivos de lectura y evitando los riesgos de manipulación y desinformación, e integrarla y transformarla en conocimiento para comunicarla, adoptando un punto de vista crítico y personal a la par que respetuoso con la propiedad intelectual."
      descriptores: ["CCL3", "CD1", "CD2", "CD3", "CD4", "CPSAA4", "CPSAA5", "CC2", "CE3"]
    - codigo: "C7"
      enunciado_resumido: "Seleccionar y leer de manera progresivamente autónoma obras diversas como fuente de placer y conocimiento."
      enunciado_oficial: "Seleccionar y leer de manera progresivamente autónoma obras diversas como fuente de placer y conocimiento, configurando un itinerario lector que evolucione en cuanto a diversidad, complejidad y calidad de las obras, y compartir experiencias de lectura para construir la propia identidad lectora y disfrutar de la dimensión social de la lectura."
      descriptores: ["CCL1", "CCL4", "CD3", "CPSAA1", "CCEC1", "CCEC2", "CCEC3"]
    - codigo: "C8"
      enunciado_resumido: "Leer, interpretar y valorar obras o fragmentos literarios del patrimonio nacional y universal, movilizando la experiencia biográfica y los conocimientos literarios para establecer vínculos entre textos y otras manifestaciones artísticas, para conformar un mapa cultural y crear textos de intención literaria."
      enunciado_oficial: "Leer, interpretar y valorar obras o fragmentos literarios del patrimonio nacional y universal, utilizando un metalenguaje específico y movilizando la experiencia biográfica y los conocimientos literarios y culturales para establecer vínculos entre textos diversos y con otras manifestaciones artísticas, para conformar un mapa cultural, ensanchar las posibilidades de disfrute de la literatura y crear textos de intención literaria."
      descriptores: ["CCL1", "CCL4", "CD2", "CPSAA4", "CC1", "CCEC1", "CCEC2", "CCEC3", "CCEC4"]
    - codigo: "C9"
      enunciado_resumido: "Movilizar el conocimiento sobre la estructura de la lengua y sus usos, reflexionando de manera progresivamente autónoma sobre las elecciones lingüísticas y discursivas para mejorar las destrezas de producción y comprensión."
      enunciado_oficial: "Movilizar el conocimiento sobre la estructura de la lengua y sus usos y reflexionar de manera progresivamente autónoma sobre las elecciones lingüísticas y discursivas, con la terminología adecuada, para desarrollar la conciencia lingüística, para aumentar el repertorio comunicativo y para mejorar las destrezas tanto de producción oral y escrita como de comprensión e interpretación crítica."
      descriptores: ["CCL1", "CCL2", "CP2", "STEM1", "STEM2", "CPSAA5"]
    - codigo: "C10"
      enunciado_resumido: "Poner las propias prácticas comunicativas al servicio de la convivencia democrática, la resolución dialogada de conflictos y la igualdad de derechos, utilizando un lenguaje no discriminatorio."
      enunciado_oficial: "Poner las propias prácticas comunicativas al servicio de la convivencia democrática, la resolución dialogada de los conflictos y la igualdad de derechos de todas las personas, utilizando un lenguaje no discriminatorio y desterrando los abusos de poder a través de la palabra para favorecer un uso no solo eficaz sino también ético y democrático del lenguaje."
      descriptores: ["CCL1", "CCL5", "CP3", "CD3", "CPSAA3", "CC1", "CC2", "CC3"]
  criterios_evaluacion:
    - curso: "1.º ESO"
      criterios:
        - "1.1. Reconocer la diversidad lingüística de España, con especial atención a la variedad dialectal canaria, identificando, de manera guiada, algunas nociones básicas de las lenguas y dialectos de España presentes en el aula en manifestaciones orales, escritas, signadas y multimodales, para ampliar su repertorio lingüístico individual y adoptar una actitud de respeto hacia el español de Canarias como variedad de prestigio de la lengua española y fuente de riqueza lingüística y cultural."
        - "1.2. Identificar prejuicios, estereotipos y usos discriminatorios de la lengua, así como abusos de poder a través de la misma, a partir de la interacción con los demás en contextos cercanos al alumnado y de la observación gradual de la diversidad lingüística del entorno para desarrollar un juicio propio, integrar la variedad lingüística en su desarrollo personal y favorecer un uso no solo eficaz sino también ético del lenguaje, en el que el diálogo sea una herramienta para la construcción de una sociedad democrática e igualitaria."
        - "2.1. Comprender e identificar el sentido global del texto y relación entre sus partes y seleccionar y retener la información más relevante de textos orales o multimodales sencillos, aplicando métodos inductivos y deductivos e integrándolos en un proceso de aprendizaje continuo para desarrollar su conciencia crítica."
        - "2.2. Analizar la forma y el contenido de textos orales, signados y multimodales sencillos, identificando mecanismos de referencia interna y distintos procedimientos lingüísticos para construir una opinión sobre la forma y el significado del mensaje."
        - "3.1. Producir textos orales y multimodales sencillos, ajustándose a las convenciones propias de los diversos géneros discursivos, con especial atención a los dialogados y expositivos, respetando las características del español de Canarias, utilizando recursos verbales y no verbales, planificando de manera pautada las diferentes fases de creación del texto y aplicando técnicas de autoevaluación para comunicarse de manera informada en diferentes contextos sociales."
        - "3.2. Participar de manera progresivamente activa y adecuada en interacciones comunicativas orales informales, con actitudes de escucha activa y estrategias de cooperación conversacional y cortesía lingüística, para reconocer la comunicación oral como medio para transmitir conocimientos e ideas, y para ejercer una ciudadanía activa."
        - "4.1. Comprender y reconocer el sentido global, la estructura, el tipo de destinatario, el formato utilizado y la información más relevante de textos escritos o multimodales sencillos de diferentes ámbitos, identificando la intención comunicativa para entender diferentes propósitos de lectura que le permitan asumir de forma activa la responsabilidad de su aprendizaje continuo."
        - "4.2. Valorar la forma y el contenido de textos escritos y multimodales sencillos, determinando si su contenido cumple con las expectativas de certeza y veracidad para favorecer el desarrollo personal y la participación social del alumnado."
        - "5.1. Producir textos escritos y multimodales sencillos, con especial atención a los dialogados, expositivos, narrativos y descriptivos, analizando la situación comunicativa, el destinatario, su propósito y el canal, aplicando en sus producciones procedimientos discursivos, lingüísticos y de estilo básicos, con la debida atención al español de Canarias, para dar respuesta a demandas comunicativas concretas y para enriquecer los textos de manera pautada con la debida precisión léxica y corrección ortográfica y gramatical."
        - "6.1. Elaborar trabajos o proyectos de investigación sencillos sobre diversos temas de interés académico, personal o social que impliquen localizar y seleccionar de manera guiada información procedente de diferentes fuentes, con criterios de fiabilidad y pertinencia en función de los objetivos de lectura; organizarla e integrarla gradualmente en esquemas propios, reelaborarla y comunicarla a partir de un guion, incorporando hábitos de uso seguro, sostenible y saludable de las tecnologías digitales, respetando los principios de propiedad intelectual y ejerciendo una ciudadanía digital activa que propicie el interés por un proceso de aprendizaje continuo y para toda la vida."
        - "7.1. Leer de manera progresivamente autónoma textos variados a partir de preselecciones en función de los propios gustos, intereses y necesidades, de la literatura juvenil contemporánea, canaria, española y universal, y participar progresivamente en situaciones comunicativas culturales que favorezcan el intercambio abierto de la experiencia lectora con apoyo de ejemplos, para integrar en su vida la lectura como fuente de placer, dejar constancia de la construcción gradual de su propia identidad lectora y descubrir el encuentro cultural y artístico."
        - "8.1. Explicar con ayuda de pautas y modelos la interpretación de obras o fragmentos representativos de la literatura canaria, española y universal, analizando de manera guiada la vinculación del contenido y la forma, la intención del autor o autora, el tema y los rasgos más significativos del género, con la finalidad de descubrir la pervivencia de universales temáticos y formales en la literatura."
        - "8.2. Comparar progresivamente y de manera guiada la conexión existente entre los textos literarios, así como con otras manifestaciones artísticas y culturales, para comenzar a crear un mapa cultural que conjugue las obras literarias con el resto de las manifestaciones artísticas y descubrir las posibilidades de disfrute de la literatura."
        - "8.3. Crear textos con intención literaria a partir de modelos dados, en los que se apliquen los conocimientos literarios adquiridos y la experiencia lectora, con el propósito de que la escritura creativa llegue a ser entendida como una forma de comunicación que permite compartir ideas, sentimientos y emociones."
        - "9.1. Reconocer la interrelación entre el propósito comunicativo y las elecciones lingüísticas del emisor, así como sus efectos en el receptor, haciendo uso, de manera guiada, del conocimiento explícito elemental de la lengua, con el debido razonamiento inductivo a partir de las nociones básicas de las variedades dialectales del aula y tomando como referencia las características del español de Canarias, así como del metalenguaje específico para desarrollar la conciencia lingüística."
        - "9.2. Formular generalizaciones sobre aspectos básicos del funcionamiento de la lengua para aumentar su repertorio lingüístico, mejorar las destrezas de recepción y observar las distintas fases de construcción del conocimiento sobre el sistema de la lengua y su uso en la comunicación."
        - "9.3. Revisar los textos propios de manera guiada y hacer propuestas de mejora, e identificar y subsanar los problemas de comprensión lectora utilizando los conocimientos básicos de la lengua y su uso para mejorar las destrezas de producción oral y escrita."
        - "10.1. Utilizar de manera guiada estrategias comunicativas para la resolución dialogada de los conflictos y la búsqueda de consensos, en diferentes contextos del ámbito personal, educativo y social, con actitud dialogante, constructiva y respetuosa, así como considerada con la diversidad lingüística y cultural, potenciando el uso de la comunicación como medio para prevenir cualquier tipo de violencia."
        - "10.2. Reconocer de manera guiada la potencialidad del lenguaje como herramienta para la comunicación positiva en contextos diversos, incluidos los virtuales, evitando cualquier uso discriminatorio, con el fín de incorporar gradualmente las posibilidades que ofrece el lenguaje en el desarrollo individual y social de las personas."

  saberes_basicos:
    - bloque: "I. La lengua y sus hablantes"
      cursos: ["1.º ESO"]
      detalles: "1. Observación de la propia biografía lingüística. Identificación de las familias lingüísticas y las lenguas de España. 2. Estudio de las lenguas de España: origen, distribución geográfica y reconocimiento e identificación de las nociones básicas en cada una de ellas. Identificación de diferencias entre plurilingüismo y diversidad dialectal. 3. Identificación de rasgos fónicos, gramaticales y léxicos del español de Canarias. 4. Identificación de rasgos de las principales variedades dialectales del español. 5. Aproximación a la reflexión interlingüística. 6. Identificación de prejuicios y estereotipos lingüísticos y exploración de formas de evitarlos."
    - bloque: "I. La lengua y sus hablantes"
      cursos: ["2.º ESO"]
      detalles: "1. Reconocimiento de la propia biografía lingüística. Estudio de las familias lingüísticas y las lenguas de España. 2. Estudio de las lenguas de España: origen, distribución geográfica y exploración de las nociones básicas en cada una de ellas. Análisis de diferencias entre plurilingüismo y diversidad dialectal. 3. Comparación de rasgos de las principales variedades dialectales del español a partir de los del español de Canarias. 4. Iniciación guiada a la reflexión interlingüística. 5. Identificación de prejuicios y estereotipos lingüísticos y exploración de formas de evitarlos."
    - bloque: "I. La lengua y sus hablantes"
      cursos: ["3.º ESO"]
      detalles: "1. Reconocimiento de la propia biografía lingüística. Estudio de las familias lingüísticas y las lenguas de España. 2. Estudio de las lenguas de España: origen, distribución geográfica y exploración de las nociones básicas en cada una de ellas. Análisis de diferencias entre plurilingüismo y diversidad dialectal. 3. Comparación de rasgos de las principales variedades dialectales del español a partir de los del español de Canarias. 4. Iniciación guiada a la reflexión interlingüística. 5. Identificación de prejuicios y estereotipos lingüísticos y exploración de formas de evitarlos. 6. Exploración y valoración de prejuicios y estereotipos lingüísticos. Estudio del fenómeno de contacto entre lenguas: bilingüismo, préstamos, interferencias. Diglosia lingüística y diglosia dialectal."
    - bloque: "I. La lengua y sus hablantes"
      cursos: ["4.º ESO"]
      detalles: "1. Análisis y valoración de la biografía lingüística propia y de la diversidad lingüística del centro y del entorno. 2. Análisis y explicación del desarrollo sociohistórico de las lenguas de España. 3. Explicación y valoración de rasgos de las principales variedades dialectales del español a partir de los del español de Canarias. 4. Desarrollo y transmisión de la reflexión interlingüística. 5. Explicación y valoración de las diferencias entre los rasgos propios de las variedades dialectales (fónicos, gramaticales y léxicos) y los relativos a los sociolectos y los registros. 6. Exploración y cuestionamiento argumentado de prejuicios y estereotipos lingüísticos. Estudio y reflexión del fenómeno de contacto entre lenguas: bilingüismo, préstamos, interferencias. Diglosia lingüística y diglosia dialectal. 7. Indagación en torno a los derechos lingüísticos y su expresión en leyes y declaraciones institucionales."
    - bloque: "II. Comunicación"
      cursos: ["1.º ESO"]
      detalles: "Estrategias de producción, comprensión y análisis crítico de textos orales, escritos y multimodales de diferentes ámbitos, con atención conjunta a los siguientes aspectos: 1. Contexto: 1.1. Reconocimiento de los componentes del hecho comunicativo: grado de formalidad de la situación y carácter público o privado; distancia social entre las personas interlocutoras; propósitos comunicativos; canal de comunicación, imagen, elementos paratextuales y no verbales de la comunicación. 2. Géneros discursivos: 2.1. Comprensión y producción guiada de secuencias textuales básicas, con especial atención a las narrativas, descriptivas, dialogadas y expositivas. 2.2. Reconocimiento de las propiedades textuales: coherencia, cohesión y adecuación. 2.3. Comprensión y producción de géneros discursivos propios del ámbito personal: la conversación. 2.4. Comprensión y producción de géneros discursivos propios del ámbito educativo: el resumen, la exposición oral y escrita. 2.5. Comprensión y producción de géneros discursivos propios del ámbito social: redes sociales y medios de comunicación. Aproximación al concepto de etiqueta digital y riesgos de desinformación. Explicación de la imagen de los textos icónico-verbales y multimodales. 3. Procesos: 3.1. Interacción oral, escrita y multimodal de carácter informal: tomar y dejar la palabra. Conocimiento de la cooperación conversacional y cortesía lingüística. Incorporación de la escucha activa, asertividad y resolución dialogada de los conflictos. 3.2. Comprensión oral: identificación del sentido global del texto y relación entre sus partes, selección y retención de la información relevante. Detección de usos discriminatorios del lenguaje verbal y no verbal. 3.3. Aproximación a la lengua de signos a través del reconocimiento del alfabeto dactilológico, expresiones y vocabulario de uso cotidiano. 3.4. Producción oral formal: planificación y búsqueda de información, textualización y revisión. Adecuación a la audiencia y al tiempo de exposición. Incorporación pautada de los elementos no verbales, paratextuales de los textos icónico-verbales y de los rasgos discursivos y lingüísticos de la oralidad formal. 3.5. Comprensión lectora: reconocimiento del sentido global del texto, la estructura y relación entre sus partes. Identificación de la intención del emisor. Detección de usos discriminatorios del lenguaje verbal e icónico. Valoración de la forma y el contenido del texto. 3.6. Producción escrita: planificación, textualización, revisión guiada y edición a partir de modelos en diferentes soportes. Usos de la escritura para la organización del pensamiento: toma de notas, esquemas, mapas conceptuales, definiciones, resúmenes, etc. 3.7. Alfabetización mediática e informacional: búsqueda y selección de la información de manera pautada con criterios de fiabilidad y pertinencia; síntesis de la información en esquemas propios e integración progresiva de la misma como nuevo conocimiento; comunicación guiada y respetuosa con la propiedad intelectual. Utilización progresivamente autónoma de dispositivos digitales, herramientas tecnológicas y plataformas virtuales para la realización de sencillos proyectos escolares. 4. Reconocimiento y uso discursivo de los elementos lingüísticos: 4.1. Identificación de los recursos lingüísticos para mostrar la implicación del emisor en los textos: formas de deixis personal, temporal y espacial, y procedimientos de modalización. 4.2. Reconocimiento y aplicación pautada de los recursos lingüísticos para adecuar el registro a la situación de comunicación. 4.3. Identificación y uso de los mecanismos de cohesión básicos, de los conectores textuales temporales, explicativos, de orden y de contraste y de los mecanismos de referencia interna gramaticales (sustituciones pronominales y adverbiales) y léxicos (repeticiones, sinónimos, hiperónimos y elipsis). 4.4. Observación e identificación del uso coherente de las formas verbales en los textos (narrativos, descriptivos, dialogados y expositivos). Reconocimiento y uso de los tiempos del pretérito en la narración y de la correlación temporal en el discurso relatado. 4.5. Identificación guiada de la corrección lingüística y aplicación progresiva de la revisión ortográfica y gramatical de los textos. Uso de diccionarios, manuales de consulta y de correctores ortográficos en soporte analógico o digital para la corrección y la mejora textual y para obtener información gramatical. 4.6. Reconocimiento guiado y uso de los signos básicos de puntuación como mecanismo organizador del texto escrito. Identificación de su relación con el significado."
    - bloque: "II. Comunicación"
      cursos: ["2.º ESO", "3.º ESO"]
      detalles: "Estrategias de producción, comprensión y análisis crítico de textos orales, escritos y multimodales de diferentes ámbitos, con atención conjunta a los siguientes aspectos: 1. Contexto: 1.1. Reconocimiento y explicación de los componentes del hecho comunicativo: grado de formalidad de la situación y carácter público o privado; distancia social entre las personas interlocutoras; propósitos comunicativos e interpretación pautada de intenciones; canal de comunicación, imagen, elementos paratextuales y no verbales de la comunicación. 2. Géneros discursivos: 2.1. Comprensión y producción guiada de secuencias textuales básicas, con especial atención a las narrativas, descriptivas, dialogadas y expositivas. 2.2. Reconocimiento y explicación de las propiedades textuales: coherencia, cohesión y adecuación. 2.3. Interpretación y producción de géneros discursivos propios del ámbito personal: la conversación y el mensaje escrito. 2.4. Interpretación y producción de géneros discursivos propios del ámbito educativo: los apuntes, la exposición oral y escrita. 2.5. Interpretación y producción de géneros discursivos propios del ámbito social: redes sociales y medios de comunicación. Conocimiento de la etiqueta digital y riesgos de desinformación y manipulación. Interpretación de la imagen de los textos icónico-verbales y multimodales. 3. Procesos: 3.1. Interacción oral, escrita y multimodal de carácter informal: tomar y dejar la palabra. Uso y comparación, de manera progresivamente autónoma, de la cooperación conversacional y cortesía lingüística. Aplicación de la escucha activa, asertividad y resolución dialogada de los conflictos. 3.2. Comprensión oral: Interpretación del sentido global del texto y relación entre sus partes, selección y análisis de la información relevante. Detección y rechazo de usos discriminatorios del lenguaje verbal y no verbal. 3.3. Aproximación a la lengua de signos a través del reconocimiento del alfabeto dactilológico, expresiones y vocabulario de uso cotidiano. 3.4. Producción oral formal: planificación y búsqueda de información, textualización, revisión y resumen. Adecuación a la audiencia y al tiempo de exposición. Incorporación progresivamente autónoma de los elementos no verbales, paratextuales de los textos icónico-verbales y de los rasgos discursivos y lingüísticos de la oralidad formal. 3.5. Comprensión lectora: reconocimiento y explicación del sentido global del texto, la estructura y relación entre sus partes. Interpretación de la intención del emisor. Detección y rechazo de usos discriminatorios del lenguaje verbal e icónico. Valoración de la forma y el contenido del texto. 3.6. Producción escrita: planificación, textualización, revisión progresivamente autónoma y edición guiada en diferentes soportes. Usos de la escritura para la organización del pensamiento: toma de notas, esquemas, mapas conceptuales, definiciones, resúmenes, etc. 3.7. Alfabetización mediática e informacional: búsqueda y selección de la información de manera pautada con criterios de fiabilidad y pertinencia; reorganización y síntesis de la información en esquemas propios e integración progresiva de la misma como nuevo conocimiento; comunicación guiada y difusión creativa y respetuosa con la propiedad intelectual. Utilización progresivamente autónoma de dispositivos digitales, herramientas tecnológicas y plataformas virtuales para la realización de sencillos proyectos escolares. 4. Reconocimiento y uso discursivo de los elementos lingüísticos: 4.1. Conocimiento y uso de los recursos lingüísticos para mostrar la implicación del emisor en los textos: formas de deixis personal, temporal y espacial y procedimientos de modalización. 4.2. Identificación y aplicación a partir de modelos de los recursos lingüísticos para adecuar el registro a la situación de comunicación. 4.3. Observación, explicación y uso de los mecanismos de cohesión básicos, de los conectores textuales temporales, explicativos, de orden y de contraste y de los mecanismos de referencia interna gramaticales (sustituciones pronominales y adverbiales) y léxicos (repeticiones, sinónimos, hiperónimos y elipsis). 4.4. Reconocimiento y estudio del uso coherente de las formas verbales en los textos (narrativos, descriptivos, dialogados y expositivos). Valoración y uso de los tiempos del pretérito en la narración y de la correlación temporal en el discurso relatado. 4.5. Identificación de la corrección lingüística y aplicación de la revisión ortográfica y gramatical de los textos. Uso de diccionarios, manuales de consulta y de correctores ortográficos en soporte analógico o digital para la corrección y la mejora textual y para obtener información gramatical. 4.6. Reconocimiento y uso de los signos básicos de puntuación como mecanismo organizador del texto escrito. Identificación y explicación de su relación con el significado."
    - bloque: "II. Comunicación"
      cursos: ["4.º ESO"]
      detalles: "Estrategias de producción, comprensión y análisis crítico de textos orales, escritos y multimodales de diferentes ámbitos, con atención conjunta a los siguientes aspectos: 1. Contexto: 1.1. Valoración argumentada de los componentes del hecho comunicativo: grado de formalidad de la situación y carácter público o privado; distancia social entre las personas interlocutoras; propósitos comunicativos e interpretación reflexiva de intenciones; canal de comunicación, imagen, elementos paratextuales y no verbales de la comunicación. 2. Géneros discursivos: 2.1. Análisis valorativo y producción de secuencias textuales básicas, con especial atención a las expositivas y argumentativas. 2.2. Análisis reflexivo y aplicación de las propiedades textuales: coherencia, cohesión, fluidez y adecuación. 2.3. Valoración y producción de géneros discursivos propios del ámbito personal: la conversación, el mensaje escrito, la carta o el correo electrónico, con especial atención a los actos de habla que amenazan la imagen de la persona interlocutora (la discrepancia, la queja, la orden y la reprobación). 2.4. Valoración y producción de géneros discursivos propios del ámbito educativo: la exposición oral y escrita, el debate y la disertación. 2.5. Valoración y producción de géneros discursivos propios del ámbito social: redes sociales y medios de comunicación. Aplicación de la etiqueta digital y especial cuidado ante los riesgos de desinformación y manipulación y vulneración de la privacidad en la red. Análisis argumentado de la imagen y de los elementos paratextuales de los textos icónico-verbales y multimodales. 2.6. Valoración y producción de géneros discursivos propios del ámbito profesional: el currículum vitae, la carta de motivación y la entrevista de trabajo. 3. Procesos: 3.1. Interacción oral, escrita y multimodal de carácter informal y formal. Uso y valoración de la cooperación conversacional y cortesía lingüística. Manejo y valoración de la escucha activa, asertividad y resolución dialogada de los conflictos. 3.2. Comprensión oral: análisis y explicación razonada del sentido global del texto, relación entre sus partes, mecanismos de referencia interna y procedimientos lingüísticos para la expresión de la subjetividad; selección, retención y análisis reflexivo de la información relevante. Interpretación de la intención del emisor. Detección, reflexión y rechazo argumentado de usos discriminatorios del lenguaje verbal y no verbal. Valoración crítica de la forma y el contenido del texto. 3.3. Estudio de la lengua de signos a través del reconocimiento del alfabeto dactilológico, expresiones y vocabulario de uso cotidiano. 3.4. Producción oral formal: planificación y búsqueda de información, textualización, revisión, reorganización en esquemas propios y difusión. Adecuación a la audiencia y al tiempo de exposición. Selección autónoma de los elementos no verbales, paratextuales de los textos icónico-verbales y de los rasgos discursivos y lingüísticos de la oralidad formal. Desarrollo de la deliberación oral argumentada. 3.5. Comprensión lectora: interpretación y reflexión en torno al sentido global del texto, la estructura y relación entre sus partes. Valoración de la intención del emisor. Detección, rechazo y reflexión argumentada de usos discriminatorios del lenguaje verbal e icónico. Valoración crítica de la forma y el contenido del texto. 3.6. Producción escrita: planificación, textualización, revisión y edición creativa en diferentes soportes. Usos de la escritura para la organización del pensamiento: toma de notas, esquemas, mapas conceptuales, definiciones, resúmenes, etc. 3.7. Alfabetización mediática e informacional: búsqueda y selección de la información con criterios de validez, calidad, actualidad, fiabilidad y pertinencia; análisis, valoración, reorganización y síntesis de la información en esquemas propios y transformación en conocimiento; comunicación y difusión de manera creativa y respetuosa con la propiedad intelectual. Utilización eficaz de dispositivos digitales, herramientas tecnológicas, servicios en línea y plataformas virtuales para la realización de proyectos escolares. 4. Reconocimiento y uso discursivo de los elementos lingüísticos: 4.1. Conocimiento y uso de las técnicas y estrategias de la expresión de la subjetividad en textos de carácter expositivo y argumentativo. Identificación y aplicación de las variaciones de las formas deícticas (fórmulas de confianza y cortesía) y procedimientos de modalización. 4.2. Valoración y aplicación eficaz de los recursos lingüísticos para adecuar el registro a la situación de comunicación. 4.3. Observación, reflexión argumentada y aplicación de los procedimientos explicativos básicos: la aposición y las oraciones de relativo. 4.4. Apropiación, reflexión argumentada y uso de los mecanismos de cohesión, de los conectores textuales distributivos, de orden, de contraste, explicación, causa, consecuencia, condición e hipótesis, así como los mecanismos de referencia interna gramaticales y léxicos (nominalizaciones e hiperónimos de significado abstracto). 4.5. Conocimiento, explicación y uso coherente de las formas verbales en los textos (expositivos y argumentativos). Reconocimiento y apropiación de la correlación temporal en la coordinación y subordinación de oraciones, y en el discurso relatado. 4.6. Análisis reflexivo de la corrección lingüística e interiorización de la revisión ortográfica y gramatical de los textos. Manejo eficaz de diccionarios, manuales de consulta y de correctores ortográficos en soporte analógico o digital para la corrección y la mejora textual y para obtener información gramatical. 4.7. Uso reflexivo y apropiación de los signos de puntuación como mecanismo organizador del texto escrito. Identificación y valoración de su relación con el significado."
    - bloque: "III. Educación literaria"
      cursos: ["1.º ESO"]
      detalles: "1. Lectura autónoma. Implicación en la lectura de obras de forma progresivamente autónoma a partir de una preselección de textos variados, y reflexión sobre los textos leídos y sobre la práctica de lectura: 1.1. Desarrollo progresivo de estrategias y criterios para la selección de obras variadas de manera orientada, a partir de la exploración guiada de la biblioteca escolar y pública disponible. 1.2. Toma de conciencia progresiva de los propios gustos e identidad lectora. 1.3. Participación progresiva en actos culturales vinculados a la lectura del ámbito personal y educativo. 1.4. Expresión de la experiencia lectora, con apoyo de ejemplos y utilizando progresivamente el metalenguaje específico. Apropiación de los textos leídos a través de distintas formas de recreación. 1.5. Movilización de la experiencia personal y lectora como forma de establecer vínculos de manera pautada entre la obra leída, así como con otros textos y manifestaciones artísticas y culturales próximas a sus intereses. 1.6. Desarrollo de estrategias para la recomendación de las lecturas entre iguales, ya sea de forma oral, escrita o multimodal, y en soportes variados. 2. Lectura guiada. Lectura de obras y fragmentos relevantes de la literatura juvenil contemporánea y del patrimonio literario universal, con la adecuada atención a la literatura canaria, inscritas en itinerarios temáticos o de género que atraviesan épocas, contextos culturales y movimientos artísticos: 2.1. Desarrollo gradual de estrategias para la construcción compartida de la interpretación de las obras a través de conversaciones literarias guiadas, con la incorporación progresiva del metalenguaje específico. 2.2. Relación guiada entre los elementos constitutivos del género literario y la construcción del sentido de la obra. Análisis básico del valor de los recursos expresivos y de sus efectos en la recepción. 2.3. Expresión pautada, a través de procesos y soportes diversificados, de la interpretación y valoración personal de obras y fragmentos literarios. 2.4. Comparación pautada de los textos leídos con otros textos, orales, escritos o multimodales, con otras manifestaciones artísticas y culturales próximas a sus intereses y con las nuevas formas de ficción en cuanto a temas, estructuras y lenguajes. 2.5. Desarrollo progresivo de estrategias para interpretar la perspectiva de género en las obras y fragmentos leídos. 2.6. Implicación progresiva en el desarrollo de estrategias que favorezcan la lectura expresiva, la dramatización y la recitación de los textos atendiendo a los procesos de comprensión y oralización implicados. 2.7. Creación de textos con intención literaria a partir de modelos dados (imitación, transformación, continuación, etc.)."
    - bloque: "III. Educación literaria"
      cursos: ["2.º ESO", "3.º ESO"]
      detalles: "1. Lectura autónoma. Implicación en la lectura de obras de forma progresivamente autónoma a partir de una preselección de textos variados, y reflexión sobre los textos leídos y sobre la práctica de lectura: 1.1. Desarrollo progresivo de estrategias y criterios para la selección de obras variadas de manera orientada, a partir de la exploración guiada de la biblioteca escolar y pública disponible. 1.2. Toma de conciencia progresiva de los propios gustos e identidad lectora. 1.3. Participación progresivamente activa en actos culturales vinculados con el circuito literario y lector y con la lectura del ámbito personal y educativo. 1.4. Expresión de la experiencia lectora, con apoyo de ejemplos y utilizando progresivamente el metalenguaje específico. Apropiación de los textos leídos a través de distintas formas de recreación. 1.5. Movilización de la experiencia personal y lectora como forma de establecer vínculos de manera pautada entre la obra leída y aspectos de la actualidad, así como con otros textos y manifestaciones artísticas y culturales próximas a sus intereses. 1.6. Adquisición de estrategias para la recomendación de las lecturas entre iguales, ya sea de forma oral, escrita o multimodal, y en soportes variados. 2. Lectura guiada. Lectura de obras y fragmentos relevantes de la literatura juvenil contemporánea y del patrimonio literario universal, con la adecuada atención a la literatura canaria, inscritas en itinerarios temáticos o de género que atraviesan épocas, contextos culturales y movimientos artísticos: 2.1. Desarrollo de estrategias para la construcción compartida de la interpretación de las obras a través de conversaciones literarias pautadas, con la incorporación del metalenguaje específico. 2.2. Relación entre los elementos constitutivos del género literario y la construcción del sentido de la obra. Análisis básico del valor de los recursos expresivos y de sus efectos en la recepción. 2.3. Expresión pautada, a través de procesos y soportes diversificados, de la interpretación y valoración personal de obras y fragmentos literarios. 2.4. Comparación de los textos leídos con otros textos, orales, escritos o multimodales, con otras manifestaciones artísticas y culturales próximas a sus intereses y con las nuevas formas de ficción en función de temas, tópicos, estructuras y lenguajes. 2.5. Desarrollo de estrategias para interpretar la perspectiva de género en las obras y fragmentos leídos. 2.6. Desarrollo progresivo de estrategias que favorezcan la lectura expresiva, la dramatización y la recitación de los textos atendiendo a los procesos de comprensión y oralización implicados. 2.7. Creación de textos con intención literaria y sentido estético en referencia a modelos dados (imitación, transformación, continuación, etc.)."
    - bloque: "III. Educación literaria"
      cursos: ["4.º ESO"]
      detalles: "1. Lectura autónoma. Implicación en la lectura de obras de forma progresivamente autónoma a partir de una preselección de textos variados, y reflexión sobre los textos leídos y sobre la práctica de lectura: 1.1. Integración de estrategias y criterios para la selección de obras variadas de manera orientada, a partir de la utilización autónoma de la biblioteca escolar y pública disponible. 1.2. Consolidación y verbalización de los propios gustos e identidad lectora. 1.3. Participación activa en actos culturales vinculados con el circuito literario y lector y con la lectura del ámbito personal, educativo y social. 1.4. Expresión de la experiencia lectora, utilizando el metalenguaje específico. Apropiación de los textos leídos a través de distintas formas de recreación. 1.5. Movilización de la experiencia personal, lectora y cultural para establecer vínculos argumentados entre la obra leída y aspectos de la actualidad, así como con otros textos y manifestaciones artísticas y culturales. 1.6. Apropiación de estrategias para la recomendación de las lecturas entre iguales, ya sea de forma oral, escrita o multimodal, y en soportes variados, comentando los géneros y los subgéneros a los que pertenecen. 2. Lectura guiada. Lectura de obras y fragmentos relevantes de la literatura juvenil contemporánea y del patrimonio literario universal con la adecuada atención a la literatura canaria, inscritas en itinerarios temáticos o de género que atraviesan épocas, contextos culturales y movimientos artísticos: 2.1. Integración de estrategias para la construcción compartida de la interpretación de las obras a través de conversaciones literarias, con la incorporación del metalenguaje específico. 2.2. Relación y análisis reflexivo entre los elementos constitutivos del género literario y la construcción del sentido de la obra. Interpretación de los efectos de sus recursos expresivos en la recepción. 2.3. Aplicación de estrategias de utilización de información sociohistórica, cultural y artística básica para construir la interpretación de las obras literarias. 2.4. Análisis comparativo y valorativo de los textos leídos con otros textos, orales, escritos o multimodales, con otras manifestaciones artísticas y culturales y con las nuevas formas de ficción en función de temas, tópicos, estructuras y lenguajes. Interpretación de los elementos de continuidad y ruptura. 2.5. Apropiación de estrategias para interpretar obras y fragmentos literarios a partir de la integración de los diferentes aspectos analizados y atendiendo a la indagación en los valores culturales, éticos y estéticos presentes en los textos, con especial atención a la perspectiva de género. 2.6. Consolidación de estrategias que favorezcan la lectura expresiva, la dramatización y la recitación de los textos atendiendo a los procesos de comprensión, apropiación y oralización implicados. 2.7. Creación de textos con intención literaria, sentido estético y conciencia de estilo a partir de la apropiación progresiva de las convenciones del lenguaje literario en referencia a modelos dados (imitación, transformación, continuación, etc.)."
    - bloque: "IV. Reflexión sobre la lengua"
      cursos: ["1.º ESO"]
      detalles: "Elaboración de conclusiones propias sobre el funcionamiento del sistema lingüístico con un lenguaje específico a partir de la observación, comparación y clasificación de unidades comunicativas y del contraste entre lenguas en torno a los siguientes saberes: 1. Reconocimiento de las diferencias relevantes e intersecciones entre lengua oral y lengua escrita atendiendo a aspectos sintácticos, léxicos y pragmáticos. 2. Estudio de la lengua como sistema y sus unidades básicas teniendo en cuenta los diferentes niveles: el sonido y sistema de escritura, las palabras (forma y significado) y su organización en el discurso (orden de las palabras, componentes de las oraciones o conexión entre los significados). 3. Distinción gradual entre la forma (categoría gramatical), la función de las palabras (funciones sintácticas básicas) y conocimiento de los procedimientos léxicos (afijos) y sintácticos para los cambios de categoría. 4. Observación de la relación entre los esquemas semántico y sintáctico de la oración simple. Identificación de enunciados de acuerdo con estos esquemas y uso de la terminología sintáctica necesaria. Toma de conciencia del orden de las palabras y su concordancia. 5. Identificación y uso de los procedimientos de adquisición y formación de palabras. Estudio de los cambios en su significado, las relaciones semánticas entre palabras y sus valores denotativos y connotativos en función del contexto y el propósito comunicativo."
    - bloque: "IV. Reflexión sobre la lengua"
      cursos: ["2.º ESO", "3.º ESO"]
      detalles: "Elaboración de conclusiones propias sobre el funcionamiento del sistema lingüístico con un lenguaje específico a partir de la observación, comparación y clasificación de unidades comunicativas y del contraste entre lenguas en torno a los siguientes saberes: 1. Reconocimiento y explicación de las diferencias relevantes e intersecciones entre lengua oral y lengua escrita atendiendo a aspectos sintácticos, léxicos y pragmáticos. 2. Estudio de la lengua como sistema y sus unidades básicas teniendo en cuenta los diferentes niveles: el sonido y sistema de escritura, las palabras (forma y significado), su organización en el discurso (orden de las palabras, componentes de las oraciones o conexión entre los significados). 3. Distinción entre forma (categoría gramatical) y función de las palabras (funciones sintácticas básicas) y reconocimiento de los procedimientos léxicos (afijos) y sintácticos para los cambios de categoría. 4. Identificación de la relación entre los esquemas semántico y sintáctico de la oración simple. Identificación de enunciados de acuerdo con estos esquemas y uso de la terminología sintáctica necesaria. Uso consciente del orden de las palabras y concordancia. 5. Explicación y uso de los procedimientos de adquisición y formación de palabras. Reflexión sobre los cambios en su significado, las relaciones semánticas entre palabras y sus valores denotativos y connotativos en función del contexto y el propósito comunicativo."
    - bloque: "IV. Reflexión sobre la lengua"
      cursos: ["4.º ESO"]
      detalles: "Elaboración de conclusiones propias sobre el funcionamiento del sistema lingüístico con un lenguaje específico a partir de la observación, comparación y clasificación de unidades comunicativas y del contraste entre lenguas atendiendo a los siguientes saberes: 1. Análisis y evaluación de las diferencias relevantes e intersecciones entre lengua oral y lengua escrita atendiendo a aspectos sintácticos, léxicos y pragmáticos. 2. Análisis y valoración en uso de la lengua como sistema y de sus unidades básicas teniendo en cuenta los diferentes niveles: el sonido y sistema de escritura, las palabras (forma y significado), su organización en el discurso (orden de las palabras, componentes de las oraciones o conexión entre los significados). 3. Valoración y explicación en uso de la distinción entre la forma (categoría gramatical) y la función de las palabras (funciones sintácticas) y consolidación de los procedimientos léxicos (afijos) y sintácticos para los cambios de categoría. 4. Análisis reflexivo de la relación entre los esquemas semántico y sintáctico de la oración. Identificación de enunciados de acuerdo con estos esquemas, formulación de hipótesis, búsqueda de contraejemplos y uso de la terminología sintáctica necesaria. 5. Análisis reflexivo y aplicación de los procedimientos de adquisición y formación de palabras. Valoración de los cambios en su significado, las relaciones semánticas entre palabras y sus valores denotativos y connotativos en función del contexto y el propósito comunicativo."

id: CUR-030
titulo: "Educación Emocional y para la Creatividad — Primaria Canarias"
etapa: "primaria"
materia: "Educación Emocional y para la Creatividad"
norma_base: NOR-043
fuente: FTE-046
competencias_especificas:
  - id: C1
    descripcion: "Conciencia Emocional: Percibir, reconocer y comprender las propias emociones y las de las demás personas."
  - id: C2
    descripcion: "Regulación Emocional: Gestionar las propias experiencias emocionales para construir una identidad afectiva satisfactoria."
  - id: C3
    descripcion: "Interacción y Empatía: Mantener una comunicación emocionalmente sana y diseñar proyectos comunes éticos."
  - id: C4
    descripcion: "Creatividad y Compromiso: Fomentar la autoconfianza creativa y la promoción del compromiso social emprendedor."
bloques_saberes:
  - id: conciencia-emocional
    nombre: "I. Conciencia emocional"
    descripcion: "Percepción, identificación y aceptación responsable de las propias emociones."
  - id: autorregulacion-resiliencia
    nombre: "II. Autorregulación emocional responsable y resiliencia educativa"
    descripcion: "Gestión y cambio de las experiencias emocionales desadaptativas."
  - id: autonomia-bienestar
    nombre: "III. Autonomía emocional y bienestar personal"
    descripcion: "Autogestión, autoestima y actitud positiva ante la vida."
  - id: competencia-social
    nombre: "IV. Competencia social"
    descripcion: "Empatía, escucha activa, asertividad y resolución de conflictos."
  - id: creatividad-emprendimiento
    nombre: "V. Creatividad y emprendimiento social"
    descripcion: "Autoconfianza creativa, generación de ideas y proyectos sociales."
criterios_evaluacion:
  - ciclo: 1
    criterios:
      - id: 1.1
        texto: "Identificar y nombrar las emociones básicas propias y de las demás personas, iniciándose en la comprensión de sus causas."
  - ciclo: 2
    criterios:
      - id: 2.1
        texto: "Aplicar estrategias básicas de regulación emocional ante situaciones de conflicto o frustración."
  - ciclo: 3
    criterios:
      - id: 4.1
        texto: "Mostrar autoconfianza creativa al proponer y ejecutar ideas para la mejora de problemáticas sociales o medioambientales."
observaciones: "Área medular y transversal exclusiva de Canarias, impartida en todos los cursos de Primaria (1.º a 6.º). Extracción literal 2026-04-26."

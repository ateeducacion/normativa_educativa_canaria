id: CUR-032
titulo: "Segunda Lengua Extranjera — Primaria Canarias"
etapa: "primaria"
materia: "Segunda Lengua Extranjera"
norma_base: NOR-043
fuente: FTE-046
competencias_especificas:
  - id: C1
    descripcion: "Comprensión: Comprender el sentido global e información específica de textos breves y sencillos en lengua estándar."
  - id: C2
    descripcion: "Producción: Expresar oralmente y redactar textos breves y sencillos sobre temas cotidianos."
  - id: C3
    descripcion: "Interacción: Participar en situaciones comunicativas interactivas elementales con cortesía lingüística."
  - id: C4
    descripcion: "Mediación: Interpretar y explicar textos breves en situaciones cotidianas para atender a la diversidad."
  - id: C5
    descripcion: "Plurilingüismo: Comparar lenguas y utilizar estrategias de autoevaluación para mejorar el aprendizaje."
  - id: C6
    descripcion: "Interculturalidad: Valorar la diversidad lingüística y artística para favorecer la convivencia."
bloques_saberes:
  - id: comunicacion
    nombre: "A. Comunicación"
    descripcion: "Autoconfianza, estrategias de comprensión/producción, funciones comunicativas y léxico común."
  - id: plurilinguismo
    nombre: "B. Plurilingüismo"
    descripcion: "Detección de carencias, comparación de lenguas y herramientas de evaluación."
  - id: interculturalidad
    nombre: "C. Interculturalidad"
    descripcion: "Aspectos socioculturales, valoración de la diversidad y etiqueta digital."
criterios_evaluacion:
  - ciclo: 3
    criterios:
      - id: 1.1
        texto: "Comprender el sentido global y la información específica y predecible de textos orales, escritos y multimodales breves y sencillos."
      - id: 3.1
        texto: "Participar en situaciones comunicativas interactivas elementales sobre temas cotidianos, de relevancia personal o próximos a su experiencia."
      - id: 6.1
        texto: "Actuar con respeto y empatía en situaciones comunicativas interculturales, identificando y valorando la diversidad lingüística, cultural y artística."
observaciones: "Materia obligatoria únicamente en el Tercer Ciclo (5.º y 6.º de Primaria) en Canarias. Extracción literal 2026-04-26."

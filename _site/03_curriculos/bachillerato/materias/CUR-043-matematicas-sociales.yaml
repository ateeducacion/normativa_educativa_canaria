id: CUR-043
titulo: "Matemáticas Aplicadas a las CCSS I y II — Bachillerato Humanidades y CCSS"
etapa: "bachillerato"
materia: "Matemáticas Aplicadas a las CCSS"
norma_base: NOR-005
fuente: FTE-009
competencias_especificas:
  - id: C1
    descripcion: "Modelizar y resolver problemas de la vida cotidiana y de las ciencias sociales aplicando diversas estrategias."
  - id: C2
    descripcion: "Verificar la validez de las soluciones empleando el razonamiento para contrastar su idoneidad."
  - id: C3
    descripcion: "Formular o investigar conjeturas utilizando herramientas tecnológicas para generar nuevo conocimiento."
  - id: C4
    descripcion: "Utilizar el pensamiento computacional para modelizar y resolver situaciones de las ciencias sociales."
  - id: C5
    descripcion: "Establecer y utilizar conexiones entre diferentes ideas matemáticas para estructurar el aprendizaje."
  - id: C6
    descripcion: "Descubrir los vínculos de las matemáticas con las ciencias sociales para desarrollar capacidad crítica."
  - id: C7
    descripcion: "Representar conceptos e información matemáticos seleccionando diferentes tecnologías."
  - id: C8
    descripcion: "Comunicar ideas matemáticas de forma individual y colectiva con el rigor apropiado."
  - id: C9
    descripcion: "Utilizar destrezas personales y sociales para gestionar emociones y trabajar en equipo."
bloques_saberes:
  - id: sentido-numerico
    nombre: "Sentido numérico y algebraico"
    descripcion: "Números reales, matrices (en II) y programación lineal (en II)."
  - id: sentido-analisis
    nombre: "Análisis"
    descripcion: "Funciones reales, límites, continuidad y cálculo integral (en II)."
  - id: sentido-estocastico
    nombre: "Estadística y Probabilidad"
    descripcion: "Distribuciones binomial y normal, e inferencia estadística (en II)."
criterios_evaluacion:
  - id: 1.1
    texto: "Modelizar y resolver problemas de las ciencias sociales valorando la eficiencia de las herramientas digitales."
  - id: 2.1
    texto: "Demostrar la validez de las soluciones obtenidas valorando la fiabilidad del proceso."
  - id: 9.1
    texto: "Gestionar las emociones ante el error, mostrando perseverancia y trabajando en equipos heterogéneos."
observaciones: "Materia de modalidad en Humanidades y Ciencias Sociales. Extracción literal Decreto 30/2023."

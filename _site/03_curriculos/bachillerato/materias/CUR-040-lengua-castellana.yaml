  - id: C8
    descripcion: "Leer, interpretar y valorar obras literarias del patrimonio nacional y universal en su contexto."
  - id: C9
    descripcion: "Reflexionar sobre el funcionamiento de la lengua a partir del análisis y la comparación."
  - id: C10
    descripcion: "Utilizar el lenguaje de manera ética y democrática rechazando usos discriminatorios."

name: Publicar GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "llms.txt"
      - "llms-full.txt"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Construir artefacto Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Componer sitio público
        run: |
          set -euo pipefail
          mkdir -p _site
          cp -R docs/. _site/
          cp llms.txt _site/llms.txt
          cp llms-full.txt _site/llms-full.txt

      - name: Verificar que llms.txt y llms-full.txt están en el artefacto
        run: |
          set -euo pipefail
          test -f _site/llms.txt
          test -f _site/llms-full.txt
          test -f _site/index.html
          test -f _site/mcp.html

      - name: Subir artefacto Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Desplegar a GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4

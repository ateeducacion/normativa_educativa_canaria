tipo: resumen-ejecutivo
titulo: "FP en Canarias: Acceso y Evaluación Autonómica"
contenido: |
  Canarias desarrolla el marco estatal de FP mediante una normativa propia en transición hacia la LOFP.
  Claves del sistema:
  1. Ordenación: El Decreto 156/1996 sigue siendo la base histórica de la estructura de ciclos específicos.
  2. Acceso: Regulado por la Orden de 22 de febrero de 2008 (pruebas directas y exenciones).
  3. Evaluación: Se rige por la Orden de 20 de octubre de 2000 y sus actualizaciones técnicas de 2003.
  4. Actualización 2025: Las nuevas instrucciones de junio de 2025 adaptan la evaluación a los Grados D y E de la nueva ley.
fuente: FTE-015
localizacion: Bloque normativo de Formación Profesional en Canarias.
fecha_registro: 2026-04-26
<aviso>: "Normativa supletoria en todo lo que no contradiga al marco estatal RD 659/2023."

tipo: resumen-ejecutivo
titulo: "Gestión de Listas de Empleo y Personal Interino (Canarias)"
contenido: |
  El Decreto 74/2010 regula cómo se organizan las listas de reserva para sustituciones docentes.
  Aspectos clave:
  1. Ordenación: Basada en la nota de oposición y la experiencia docente previa.
  2. Disponibilidad: Posibilidad de pasar a "No disponible" por causas justificadas (hijos, enfermedad) sin perder el puesto.
  3. Llamamientos: Se realizan de forma telemática; el rechazo injustificado conlleva la exclusión de la lista.
  4. Estabilización: El marco actual está afectado por la Ley 20/2021 de reducción de temporalidad.
fuente: FTE-024
localizacion: Decreto 74/2010 (BOC 2010/136).
fecha_registro: 2026-04-26
<aviso>: "Imprescindible para entender el funcionamiento de las sustituciones en centros públicos."

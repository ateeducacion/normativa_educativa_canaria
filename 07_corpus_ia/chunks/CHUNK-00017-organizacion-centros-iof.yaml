id: CHUNK-00017
origen_id: NOR-009
tipo: resumen-ejecutivo
titulo: "Organización de Centros (ROC) e Instrucciones IOF"
contenido: |
  El Reglamento Orgánico de Centros (ROC) y las Instrucciones anuales (IOF) definen el día a día escolar.
  Estructura de gobierno:
  1. Órganos de Gobierno: Dirección, Claustro de Profesorado y Consejo Escolar.
  2. Órganos de Coordinación: Equipos de ciclo (Primaria) y Departamentos (ESO/Bach).
  3. Documentos Clave: Proyecto Educativo (PE), Programación General Anual (PGA) y Plan de Convivencia.
  4. Horarios: Regulación de la jornada lectiva y complementaria según la IOF del curso actual.
fuente: NOR-009, NOR-046, NOR-049
localizacion: Decreto 81/2010 y Resoluciones IOF 2025/2026.
fecha_registro: 2026-04-26
<aviso>: "Las IOF concretan anualmente el marco general del ROC."

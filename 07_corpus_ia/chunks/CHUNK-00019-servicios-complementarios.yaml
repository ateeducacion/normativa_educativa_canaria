id: CHUNK-00019
origen_id: NOR-034
tipo: resumen-ejecutivo
titulo: "Servicios Complementarios: Comedor y Transporte (Canarias)"
contenido: |
  Resumen de la normativa que regula el bienestar y los servicios de apoyo a las familias.
  Comedores Escolares (NOR-034):
  - Prioridad: Alumnado con transporte y familias con rentas bajas o necesidad de conciliación.
  - Subvenciones: Sistema de cuotas por tramos de renta (A a E).
  Transporte Escolar (NOR-035):
  - Gratuidad: Enseñanza obligatoria con residencia a más de 2km (Primaria) o 5km (ESO) del centro.
  - Seguridad: Obligatoriedad de la figura del acompañante/monitor en todos los vehículos.
fuente: FTE-037, FTE-038
localizacion: Órdenes de 24 de abril de 2009 y 2 de agosto de 2006.
fecha_registro: 2026-04-26
<aviso>: "Servicios gestionados por los Consejos Escolares de los centros públicos."

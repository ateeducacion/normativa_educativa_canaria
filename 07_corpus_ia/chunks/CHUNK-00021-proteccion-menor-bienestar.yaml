id: CHUNK-00021
origen_id: NOR-031
tipo: resumen-ejecutivo
titulo: "Protección del Menor y Bienestar en Centros Educativos"
contenido: |
  Marco de protección integral frente a la violencia y atención al bienestar del alumnado en Canarias.
  Puntos fundamentales:
  1. Coordinador de Bienestar: Figura obligatoria en todos los centros para la protección frente a la violencia (LOPIVI).
  2. Protocolos Obligatorios: Detección y actuación ante acoso escolar, riesgo suicida y maltrato infantil.
  3. Atención Temprana: Coordinación con equipos especializados para la detección precoz (0-6 años).
  4. Entornos Seguros: Obligación de los centros de ser espacios de buen trato y convivencia positiva.
fuente: FTE-034, FTE-030
localizacion: Ley 1/1997 Canaria y LOPIVI 8/2021.
fecha_registro: 2026-04-26
<aviso>: "Eje prioritario de la organización de centros y la convivencia escolar."

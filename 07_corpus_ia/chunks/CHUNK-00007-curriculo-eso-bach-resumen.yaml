titulo: "Currículo ESO y Bachillerato en Canarias (Decreto 30/2023)"
contenido: |
  El Decreto 30/2023 es la norma de referencia para la ordenación y el currículo de Secundaria y Bachillerato en Canarias tras la LOMLOE.
  Aspectos esenciales:
  1. Desarrolla a nivel autonómico los reales decretos estatales 217/2022 (ESO) y 243/2022 (Bachillerato).
  2. Define los elementos del currículo: objetivos, competencias clave, competencias específicas, criterios de evaluación, saberes básicos y situaciones de aprendizaje.
  3. Establece la estructura de materias y modalidades aplicables en los centros canarios.
  4. Sus anexos contienen los currículos detallados por materia.
fuente: FTE-009
localizacion: Decreto 30/2023 (BOC 2023/058), artículos 1, 2 y anexos.
